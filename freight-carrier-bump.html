<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freight Carrier Rank Changes</title>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%}
  body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text-primary);transition:background .25s,color .25s}
  .widget{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px 16px;width:100%;height:100%;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:background .25s,border-color .25s;position:relative}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-shrink:0}
  .header-left{display:flex;flex-direction:column;gap:2px}
  .eyebrow{font-size:10.5px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted)}
  .title-row{display:flex;align-items:baseline;gap:12px}
  .title{font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em}
  .header-right{display:flex;align-items:center;gap:14px}
  .dm-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.6;transition:opacity .15s;user-select:none;padding:2px 4px}
  .dm-toggle:hover{opacity:1}
  .dm-icon{font-size:10px;color:var(--text-secondary);display:flex;align-items:center;width:12px;justify-content:center}
  .dm-track{width:28px;height:15px;background:var(--toggle-bg);border-radius:8px;position:relative;transition:background .2s;flex-shrink:0}
  .dm-knob{width:11px;height:11px;background:var(--toggle-knob);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  [data-theme="dark"] .dm-knob{transform:translateX(13px)}
  :root{
    --bg:#f4f6f8;--surface:#fff;--surface2:#f9fafb;--border:#e3e7ed;
    --text-primary:#111827;--text-secondary:#4b5563;--text-muted:#9ca3af;
    --accent:#1a73e8;--accent-dim:#e8f0fd;--accent-text:#1a73e8;
    --green:#1e8a4a;--green-bg:#dcfce7;--red:#c0392b;--red-bg:#fee2e2;
    --toggle-bg:#d1d5db;--toggle-knob:#fff;
    --week-active-bg:#1a73e8;--week-active-text:#fff;--week-inactive:#6b7280;
    --shadow:0 1px 6px rgba(0,0,0,.08),0 4px 20px rgba(0,0,0,.04);
    --chart-bg:#f8fafc;--chart-border:#dce3eb;
    --rank-active-bg:var(--week-active-bg);--rank-active-text:var(--week-active-text);--rank-inactive:var(--week-inactive)}
  [data-theme="dark"]{--rank-active-bg:var(--week-active-bg);--rank-active-text:var(--week-active-text);--rank-inactive:var(--week-inactive);
    --bg:#0d1117;--surface:#161b27;--surface2:#1e2533;--border:#2e3a4e;
    --text-primary:#e8edf5;--text-secondary:#b0bdd0;--text-muted:#6b7f99;
    --accent:#4f93f5;--accent-dim:#1a2d50;--accent-text:#7db3f8;
    --green:#4ade80;--green-bg:#0c2b1c;--red:#fc8181;--red-bg:#2d1214;
    --toggle-bg:#2e3a4e;--toggle-knob:#e8edf5;
    --week-active-bg:#4f93f5;--week-active-text:#0d1117;--week-inactive:#94a3b8;
    --shadow:0 1px 8px rgba(0,0,0,.5);--chart-bg:#0f1520;--chart-border:#1e2a3a;
  }
  .controls-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px;margin-bottom:2px;flex-shrink:0}
  .rank-toggle{display:flex;gap:0;flex-shrink:0}
  .rank-btn{font-size:11px;font-weight:500;padding:5px 14px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--rank-inactive);transition:all .16s;font-family:"Inter",sans-serif}
  .rank-btn:first-child{border-radius:6px 0 0 6px}
  .rank-btn:last-child{border-radius:0 6px 6px 0}
  .rank-btn:not(:first-child){border-left:none}
  .rank-btn.active{background:var(--rank-active-bg);color:var(--rank-active-text);border-color:var(--rank-active-bg);font-weight:600}
  .line-legend{display:flex;align-items:center;justify-content:flex-end;gap:16px}
  .line-legend .leg-item{display:flex;align-items:center;gap:5px;font-size:9.5px;font-weight:500;color:var(--text-muted)}
  .line-legend svg{color:var(--text-secondary);flex-shrink:0}
  .divider{height:1px;background:var(--border);margin:8px 0;flex-shrink:0}
  .chart-wrap{position:relative;width:100%;flex:1;min-height:0;overflow:hidden;border-radius:8px;border:1px solid var(--chart-border);background:var(--chart-bg)}
  canvas{display:block;width:100%;height:100%}

.bump-card{position:absolute;z-index:50;background:var(--surface);border:1px solid var(--chart-border);border-radius:10px;box-shadow:var(--shadow);overflow:visible;min-width:180px;opacity:0;pointer-events:none;transition:opacity .15s;font-size:13px}
.bump-card.visible{opacity:1;pointer-events:none}
.bump-card.pinned{border-color:var(--week-active-bg,#1a73e8);box-shadow:0 0 0 1px var(--week-active-bg,#1a73e8),var(--shadow);cursor:move;pointer-events:auto}
.bump-card-inner{padding:1em 1.1em .85em 1.4em;overflow-y:auto;max-height:100%;border-radius:10px}
.bc-accent{position:absolute;top:0;left:0;bottom:0;width:5px;border-radius:10px 0 0 10px}
.bc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4em}
.bc-cid{font-size:1.8em;font-weight:700}
.bc-pin{font-size:.6em;color:var(--text-muted);opacity:.5}
.bc-name{font-size:.9em;font-weight:500;color:var(--text-secondary);margin-bottom:.6em}
.bc-divider{height:1px;background:var(--chart-border);margin-bottom:.7em;opacity:.6}
.bc-week-row{display:flex;align-items:center;gap:.6em;padding:.3em 0}
.bc-wk-label{font-size:.85em;font-weight:600;color:var(--text-muted);min-width:3.5em}
.bc-rank-badge{font-size:.95em;font-weight:700;padding:.15em .55em;border-radius:5px;display:inline-block}
.bc-val{font-size:.85em;font-weight:600;color:var(--text-primary);flex:1}
.bc-delta{font-size:.8em;font-weight:700;min-width:2.5em;text-align:right}
.ic-handle{position:absolute;z-index:55}
.ic-handle-tl{top:-3px;left:-3px;width:12px;height:12px;cursor:nwse-resize}
.ic-handle-tr{top:-3px;right:-3px;width:12px;height:12px;cursor:nesw-resize}
.ic-handle-bl{bottom:-3px;left:-3px;width:12px;height:12px;cursor:nesw-resize}
.ic-handle-br{bottom:-3px;right:-3px;width:12px;height:12px;cursor:nwse-resize}
.ic-handle-t{top:-3px;left:12px;right:12px;height:6px;cursor:ns-resize}
.ic-handle-b{bottom:-3px;left:12px;right:12px;height:6px;cursor:ns-resize}
.ic-handle-l{left:-3px;top:12px;bottom:12px;width:6px;cursor:ew-resize}
.ic-handle-r{right:-3px;top:12px;bottom:12px;width:6px;cursor:ew-resize}
.ctrl-left{display:flex;align-items:center;gap:6px}
.reset-btn{height:28px;border-radius:6px;border:1px solid var(--border,var(--chart-border));background:var(--surface2,var(--surface));cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;padding:0 10px;transition:all .16s}
.reset-btn:hover{color:var(--text-primary);border-color:var(--text-muted)}
  
  
  .dc-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;justify-content:space-between}
  .dc-filter{display:flex;gap:3px;margin-left:auto;align-items:center}
  .dc-filter-lbl{font-size:9px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-right:2px}
  .dc-periods{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
  .dc-pill{font-size:10.5px;font-weight:600;padding:4px 10px;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--week-inactive);transition:all .16s;font-family:"Inter",sans-serif}
  .dc-pill:hover{color:var(--text-primary);border-color:var(--text-muted)}
  .dc-pill.active{background:var(--week-active-bg);color:var(--week-active-text);border-color:var(--week-active-bg);box-shadow:0 1px 4px rgba(26,115,232,.25)}
  .wk-drill{margin-top:6px;border-top:1px solid var(--border);padding-top:5px}
  .wk-drill-hdr{font-size:8.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
  .wk-drill-row{display:flex;justify-content:space-between;font-size:10px;padding:1px 0}
  .wk-drill-row .wk-lbl{color:var(--text-muted);font-weight:500}
  .wk-drill-row .wk-val{color:var(--text-secondary);font-weight:600;text-align:right}
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="header-left">
      <span class="eyebrow">Hantover Inc. &middot; Freight</span>
      <div class="title-row"><span class="title">Carrier Rank Changes</span></div>
    </div>
    <div class="header-right">
      <div class="dm-toggle" onclick="toggleDark()" title="Toggle dark mode">
        <span class="dm-icon">&#9728;</span>
        <div class="dm-track"><div class="dm-knob"></div></div>
        <span class="dm-icon">&#9790;</span>
      </div>
    </div>
  </div>
  <div class="controls-row">
    <div class="ctrl-left">
    <div class="rank-toggle">
      <button class="rank-btn active" onclick="setMethod('paid')">Total Paid</button>
      <button class="rank-btn" onclick="setMethod('bills')">Total Bills</button>
      <button class="rank-btn" onclick="setMethod('avg_cost')">Avg Cost / Ship</button>
    </div>
    <button class="reset-btn" onclick="resetAll()" title="Reset all">&#8634; Reset</button>
    </div>
    <div class="line-legend">

<div id="entity-filter" style="padding:0 20px 0"></div>

  <div class="chart-wrap" id="wrap"><canvas id="canvas"></canvas></div>
</div>

var ALL_WEEKS=["2-23","3-2","3-9","3-16","3-23","3-30","4-6","4-13","4-20","4-27","5-4","5-11","5-18","5-25","6-1","6-8","6-15","6-22","6-29","7-6"];
/* -- Derived calendar: auto-builds month/quarter/year buckets from ALL_WEEKS. Supports unlimited months & years. Parses legacy "M-D"/"WM-D" (year inferred by month-rollover from YEAR_ANCHOR) and year-aware "YY-M-D"/"WYY-M-D" (year read from key). On single-year data the month keys are bare abbreviations ("Feb"), identical to the prior hardcoded structures. -- */
var YEAR_ANCHOR=2026;
var MONTH_ABBR=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function buildCalendar(allWeeks,yearAnchor){
  var meta={},order=[],prevM=null,yr=yearAnchor;
  allWeeks.forEach(function(rawKey){
    var k=rawKey.charAt(0)==='W'?rawKey.slice(1):rawKey,parts=k.split('-').map(Number),y,m,d;
    if(parts.length===3){y=2000+parts[0];m=parts[1];d=parts[2];}
    else{m=parts[0];d=parts[1];if(prevM!==null&&m<prevM)yr++;y=yr;}
    prevM=m;meta[rawKey]={y:y,m:m,d:d};order.push(rawKey);
  });
  var yset={};order.forEach(function(k){yset[meta[k].y]=1;});
  var years=Object.keys(yset).map(Number).sort(function(a,b){return a-b;}),multiYear=years.length>1;
  function _mk(k){var a=MONTH_ABBR[meta[k].m-1];return multiYear?a+" '"+String(meta[k].y).slice(-2):a;}
  function _qk(k){var q=Math.floor((meta[k].m-1)/3)+1;return multiYear?"Q"+q+" '"+String(meta[k].y).slice(-2):"Q"+q;}
  var cMo={},cMk=[],cQt={},cQk=[],cYr={},cYk=[];
  order.forEach(function(k){
    var a=_mk(k);if(!cMo[a]){cMo[a]=[];cMk.push(a);}cMo[a].push(k);
    var b=_qk(k);if(!cQt[b]){cQt[b]=[];cQk.push(b);}cQt[b].push(k);
    var c=String(meta[k].y);if(!cYr[c]){cYr[c]=[];cYk.push(c);}cYr[c].push(k);
  });
  return {meta:meta,years:years,multiYear:multiYear,MONTHS:cMo,MONTH_KEYS:cMk,QUARTERS:cQt,QUARTER_KEYS:cQk,YEARS:cYr,YEAR_KEYS:cYk};
}
var __CAL=buildCalendar(ALL_WEEKS,YEAR_ANCHOR);
var MONTHS=__CAL.MONTHS,MONTH_KEYS=__CAL.MONTH_KEYS;
var granularity="monthly",activeMonth=MONTH_KEYS[MONTH_KEYS.length-1],activeWeekIdx=ALL_WEEKS.length-1;
function getActiveWeeks(){return granularity==="monthly"?MONTHS[activeMonth]:[ALL_WEEKS[activeWeekIdx]];}
function getPrevWeeks(){if(granularity==="monthly"){var i=MONTH_KEYS.indexOf(activeMonth);return i>0?MONTHS[MONTH_KEYS[i-1]]:null;}return activeWeekIdx>0?[ALL_WEEKS[activeWeekIdx-1]]:null;}
function getPeriodLabel(){return granularity==="monthly"?activeMonth:"W"+ALL_WEEKS[activeWeekIdx].replace("W","");}
function buildDateControl(){var el=document.getElementById("date-control");if(!el)return;var h='<div class="dc-row"><div class="dc-periods">';MONTH_KEYS.forEach(function(m){h+='<button class="dc-pill'+(m===activeMonth?' active':'')+'" onclick="setPeriod(\''+m+'\')">'+m+'</button>';});h+='</div></div>';el.innerHTML=h;}

function setPeriod(p){if(p===activeMonth)return;activeMonth=p;buildDateControl();onDateChange();}

function isMonthKey(k){return MONTHS[k]!=null;}
function wkDrillHTML(monthKey,dataFn,fmtFn){
  if(!isMonthKey(monthKey))return'';
  var wks=MONTHS[monthKey];if(!wks||wks.length<=1)return'';
  var h='<div class="wk-drill"><div class="wk-drill-hdr">Weekly Detail</div>';
  wks.forEach(function(w){var v=dataFn(w);h+='<div class="wk-drill-row"><span class="wk-lbl">W'+w.replace("W","")+'</span><span class="wk-val">'+fmtFn(v)+'</span></div>';});
  return h+'</div>';
}

function getRanks(m){var ranks={};var src=(granularity==="monthly")?getMonthlyData():DATA;for(var pi=0;pi<WEEKS.length;pi++){var wk=WEEKS[pi];var e=[];if(src[wk])Object.keys(src[wk]).forEach(function(k){if(src[wk][k][m]!=null)e.push([k,src[wk][k]]);});e.sort(function(a,b){return b[1][m]-a[1][m]||(a[0]<b[0]?-1:a[0]>b[0]?1:0);});ranks[wk]={};for(var i=0;i<e.length;i++)ranks[wk][e[i][0]]=i+1;}return ranks;}

function drawCanvas(){

  const c=cv.getContext("2d");c.setTransform(dpr,0,0,dpr,0,0);c.clearRect(0,0,W,H);
  const ranks=getRanks(method),prevRanks=animPrev?getRanks(animPrev):null,t=animProgress;
  const cars=getTop20(ranks),p=dark?PAL_D:PAL_L;
  const L=80,R=110,T=44,B=12,cW=W-L-R,cH=H-T-B;

  // yR: rank position — this is where lines and labels anchor
  function yR(rank){return T+(rank-1)/(MAX_RANK-1)*cH;}
  function yRA(cid,wk){

    if(!prevRanks||t>=1)return r!=null?yR(r):null;
    const pr=prevRanks[wk]?prevRanks[wk][cid]:null;
    if(r!=null&&pr!=null)return lerp(yR(pr),yR(r),t);

  // Week headers
  WEEKS.forEach((wk,i)=>{const tw=52,th=22;c.fillStyle=dark?"rgba(96,165,250,0.15)":"rgba(26,115,232,0.08)";c.beginPath();c.roundRect(colX[i]-tw/2,6,tw,th,6);c.fill();c.textAlign="center";c.textBaseline="middle";c.font="700 11px Inter,sans-serif";c.fillStyle=dark?"#93c5fd":"#1a73e8";c.fillText((granularity==="monthly"?wk:"W"+wk),colX[i],17);});
  // Column lines

  // Draw carriers in THREE PASSES: background first, then highlighted on top
  function drawCarrier(cid){
    const pts=carrierPts[cid];
    if(!pts)return;

      c.beginPath();c.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++){const pv=pts[i-1],cu=pts[i],cx=(pv.x+cu.x)/2;c.bezierCurveTo(cx,pv.y,cx,cu.y,cu.x,cu.y);}c.stroke();
      if(dark){c.lineWidth=8;c.globalAlpha=0.3;c.beginPath();c.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++){const pv=pts[i-1],cu=pts[i],cx=(pv.x+cu.x)/2;c.bezierCurveTo(cx,pv.y,cx,cu.y,cu.x,cu.y);}c.stroke();}
    }

    if(isSec&&pts.length>1){
      c.strokeStyle=color;c.lineCap="round";c.lineJoin="round";c.shadowColor=color;c.shadowBlur=dark?12:6;
      c.lineWidth=dark?6:5;c.globalAlpha=dark?0.25:0.15;
      c.beginPath();c.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++){const pv=pts[i-1],cu=pts[i],cx=(pv.x+cu.x)/2;c.bezierCurveTo(cx,pv.y,cx,cu.y,cu.x,cu.y);}c.stroke();c.shadowBlur=0;
    }
    // Main line
    c.strokeStyle=color;c.lineWidth=isPri?5:hasAny?1.8:2.5;
    c.globalAlpha=isPri?1:isSec?0.18:hasAny?(dark?0.25:0.2):(dark?0.65:0.6);
    c.lineCap="round";c.lineJoin="round";
    if(isPri){c.shadowColor=color;c.shadowBlur=dark?14:8;}
    if(pts.length>1){c.beginPath();c.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++){const pv=pts[i-1],cu=pts[i],cx=(pv.x+cu.x)/2;c.bezierCurveTo(cx,pv.y,cx,cu.y,cu.x,cu.y);}c.stroke();}
    c.shadowBlur=0;
    // Dashed extensions

    c.globalAlpha=isPri?0.5:isSec?0.18:hasAny?(dark?0.2:0.15):(dark?0.45:0.4);
    if(f0>0){c.beginPath();c.moveTo(colX[f0-1],pts[0].y);c.lineTo(pts[0].x,pts[0].y);c.stroke();}
    if(fL<WEEKS.length-1){c.beginPath();c.moveTo(pts[pts.length-1].x,pts[pts.length-1].y);c.lineTo(colX[fL+1],pts[pts.length-1].y);c.stroke();}
    c.setLineDash([]);

      if(isPri){c.fillStyle=dark?"#0f1520":"#fff";c.beginPath();c.arc(pt.x,pt.y,dr+3.5,0,Math.PI*2);c.fill();if(dark){c.shadowColor=color;c.shadowBlur=12;}c.strokeStyle=color;c.lineWidth=3;c.beginPath();c.arc(pt.x,pt.y,dr+3.5,0,Math.PI*2);c.stroke();c.shadowBlur=0;}
      else if(isSec){c.globalAlpha=1;c.shadowColor=color;c.shadowBlur=dark?8:4;c.strokeStyle=color;c.lineWidth=1.5;c.beginPath();c.arc(pt.x,pt.y,4,0,Math.PI*2);c.stroke();c.shadowBlur=0;c.globalAlpha=0.25;}
      c.fillStyle=color;c.beginPath();c.arc(pt.x,pt.y,dr,0,Math.PI*2);c.fill();

  }

  // PASS 1: Background carriers (not primary, not secondary)

  // PASS 2: Secondary (if any)
  for(const cid of cars){if(isSecondary(cid))drawCarrier(cid);}
  // PASS 3: Primary (always on top)
  for(const cid of cars){if(isPrimary(cid))drawCarrier(cid);}

  // Labels — at true rank Y positions, with sub-rank tie-breaking matching band order
  function drawLabels(side){
    const items=[];
    for(const cid of cars){
      const pts=[];
      for(let wi=0;wi<WEEKS.length;wi++){const r=ranks[WEEKS[wi]]?ranks[WEEKS[wi]][cid]:null;if(r!=null&&r<=MAX_RANK)pts.push({wi,y:yR(r),rank:r});}

  // Sample every 4px across chart width — O(1) lookup at hover time

      const r=ranks[WEEKS[wi]]?ranks[WEEKS[wi]][cid]:null;

}

// Hover detection — grid lookup, O(carriers) with no interpolation at hover time
function findNearest(cv,mx,my){
  const dots=cv._dots;
  if(dots){let bd=18,bc=null;for(const d of dots){const dist=Math.hypot(mx-d.x,my-d.y);if(dist<bd){bd=dist;bc=d.cid;}}if(bc)return bc;}
  const grid=cv._lineGrid,S=cv._gridSample;
  if(!grid||!S)return null;
  const gi=Math.round(mx/S);
  let best=Infinity,bestCid=null;
  for(const[cid,yArr]of Object.entries(grid)){
    if(!yArr)continue;
    const ly=gi>=0&&gi<yArr.length?yArr[gi]:-1;
    if(ly<0)continue;
    const dy=Math.abs(my-ly);
    if(dy<best){best=dy;bestCid=cid;}
  }
  return bestCid;
}

function updateDOMCard(){

  if(isPinned)html+='<span class="bc-pin">\uD83D\uDCCC pinned</span>';

    else{html+='<span class="bc-val"></span>';}
    if(wi>0){const pR=ranks[WEEKS[wi-1]][cid];if(rank!=null&&pR!=null){const df=pR-rank;if(df!==0){const dc=df>0?(dark?'#4ade80':'#188038'):(dark?'#fc8181':'#c62828');html+='<span class="bc-delta" style="color:'+dc+'">'+(df>0?'\u25B2':'\u25BC')+Math.abs(df)+'</span>';}}}

  bumpCard.querySelector('.bc-accent').style.boxShadow=dark?'0 0 8px '+color:'';
  bumpCard.classList.add('visible');bumpCard.classList.toggle('pinned',isPinned);
  if(!isPinned||bumpCard.style.right!=='auto'){const wR=document.getElementById('wrap').getBoundingClientRect(),wG=document.querySelector('.widget').getBoundingClientRect();bumpCard.style.right=(wG.right-wR.right+14)+'px';bumpCard.style.left='auto';bumpCard.style.top=(wR.top-wG.top+4)+'px';bumpCard.style.width='310px';bumpCard.style.height='auto';bumpCard.style.fontSize='13px';}
}
function inCard(cv,mx,my){if(!bumpCard||!bumpCard.classList.contains('pinned'))return false;const cr=bumpCard.getBoundingClientRect(),cvr=cv.getBoundingClientRect(),cx=cr.left-cvr.left,cy=cr.top-cvr.top;return mx>=cx&&mx<=cx+cr.width&&my>=cy&&my<=cy+cr.height;}

let hovPending=false;
document.getElementById("canvas").addEventListener("mousemove",e=>{
  const cv=e.target,b=cv.getBoundingClientRect(),mx=e.clientX-b.left,my=e.clientY-b.top;
  if(inCard(cv,mx,my)){cv.style.cursor="default";return;}
  const bc=findNearest(cv,mx,my);
  if(bc!==hovKey){hovKey=bc;cv.style.cursor=bc?"pointer":"default";if(!hovPending){hovPending=true;requestAnimationFrame(()=>{hovPending=false;drawCanvas();});}}
},{passive:true});
document.getElementById("canvas").addEventListener("click",e=>{
  const cv=e.target,b=cv.getBoundingClientRect(),mx=e.clientX-b.left,my=e.clientY-b.top;
  if(inCard(cv,mx,my))return;
  const bc=findNearest(cv,mx,my);
  if(pinnedKey){
    if(bc===pinnedKey){/* no-op: click same pinned carrier */}
    else if(bc){pinnedKey=bc;drawCanvas();}
    else{pinnedKey=null;drawCanvas();}
  } else {
    if(bc){pinnedKey=bc;drawCanvas();}
  }
});
document.getElementById("canvas").addEventListener("dblclick",(e)=>{e.preventDefault();resetAll();});
document.getElementById("canvas").addEventListener("mouseleave",()=>{hovKey=null;drawCanvas();});

function animateMethodTransition(){animProgress+=0.06;if(animProgress>=1){animProgress=1;animPrev=null;animFrame=null;drawCanvas();return;}drawCanvas();animFrame=requestAnimationFrame(animateMethodTransition);}
function setMethod(m){if(m===method)return;animPrev=method;animProgress=0;method=m;hovKey=null;document.querySelectorAll(".rank-btn").forEach(b=>{b.classList.toggle("active",b.textContent.toLowerCase().includes(m==="paid"?"total paid":m==="bills"?"total bills":"avg cost"));});if(animFrame)cancelAnimationFrame(animFrame);animFrame=requestAnimationFrame(animateMethodTransition);}
function toggleDark(){dark=!dark;document.documentElement.setAttribute("data-theme",dark?"dark":"");drawCanvas();}
function resetAll(){granularity="monthly";activeMonth=MONTH_KEYS[MONTH_KEYS.length-1];activeWeekIdx=ALL_WEEKS.length-1;activeFilter="all";MAX_RANK=20;buildDateControl();buildFilterControl();WEEKS=MONTH_KEYS.slice();MONTH_DATA=null;hovKey=null;pinnedKey=null;if(bumpCard)bumpCard.classList.remove('visible','pinned');drawCanvas();}
let resizeTimer;
window.addEventListener("resize",()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{const c=document.getElementById("canvas");c._lw=0;c._lh=0;drawCanvas();},100);});
buildDateControl();
buildFilterControl();
onDateChange();
</script>
</body>
