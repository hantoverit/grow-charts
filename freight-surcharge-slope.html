<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FedEx / UPS Surcharge Breakdown — Slope</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#f4f6f8;--surface:#fff;--surface2:#f9fafb;
  --border:#e3e7ed;--text-primary:#111827;--text-secondary:#4b5563;--text-muted:#9ca3af;
  --green:#1e8a4a;--green-bg:#dcfce7;--red:#c0392b;--red-bg:#fee2e2;
  --toggle-bg:#d1d5db;--toggle-knob:#fff;
  --week-active-bg:#1a73e8;--week-active-text:#fff;--week-inactive:#6b7280;
  --shadow:0 1px 6px rgba(0,0,0,.08),0 4px 20px rgba(0,0,0,.04);
  --chart-bg:#f8fafc;--chart-border:#dce3eb;
}
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b27;--surface2:#1e2533;
  --border:#2e3a4e;--text-primary:#e8edf5;--text-secondary:#b0bdd0;--text-muted:#6b7f99;
  --green:#4ade80;--green-bg:#0c2b1c;--red:#fc8181;--red-bg:#2d1214;
  --toggle-bg:#2e3a4e;--toggle-knob:#e8edf5;
  --week-active-bg:#4f93f5;--week-active-text:#0d1117;--week-inactive:#94a3b8;
  --shadow:0 1px 8px rgba(0,0,0,.5);
  --chart-bg:#0f1520;--chart-border:#1e2a3a;
}
[data-theme="dark"] .dm-knob{transform:translateX(13px)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-primary)}
.widget{height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative}
.header{padding:16px 20px 10px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between}
.header-left{display:flex;flex-direction:column;gap:2px}
.header-right{display:flex;align-items:center;gap:10px;padding-top:2px}
.eyebrow{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
.title{font-size:18px;font-weight:800;color:var(--text-primary);line-height:1.2}
.subtitle{font-size:11px;color:var(--text-muted);font-weight:500;margin-top:2px}
.controls{display:flex;align-items:center;justify-content:space-between;padding:0 20px 10px;flex-shrink:0}
.ctrl-left,.ctrl-right{display:flex;align-items:center;gap:6px}
.carrier-btn{font-size:11.5px;font-weight:600;padding:5px 13px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--week-inactive);transition:all .16s;font-family:'Inter',sans-serif}
.carrier-btn:hover{color:var(--text-primary)}
.carrier-btn.active{background:var(--week-active-bg);color:var(--week-active-text);box-shadow:0 1px 5px rgba(26,115,232,.3)}
.reset-btn{height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;padding:0 10px;transition:all .16s}
.reset-btn:hover{color:var(--text-primary);border-color:var(--text-muted)}
.dm-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.6;transition:opacity .15s;user-select:none;padding:2px 4px}
.dm-toggle:hover{opacity:1}
.dm-icon{font-size:10px;color:var(--text-secondary);display:flex;align-items:center;width:12px;justify-content:center}
.dm-track{width:28px;height:15px;background:var(--toggle-bg);border-radius:8px;position:relative;transition:background .2s;flex-shrink:0}
.dm-knob{width:11px;height:11px;background:var(--toggle-knob);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.chart-area{flex:1;margin:0 20px 16px;padding:16px;background:var(--chart-bg);border:1px solid var(--chart-border);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.summary-row{display:flex;gap:12px;margin-bottom:12px;flex-shrink:0}
.stat-card{flex:1;padding:8px 12px;border-radius:6px;background:var(--surface);border:1px solid var(--chart-border)}
.stat-label{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)}
.stat-value{font-size:18px;font-weight:800;line-height:1.3}
.stat-sub{font-size:10px;font-weight:600;color:var(--text-muted);margin-top:1px}
.slope-wrap{flex:1;position:relative;min-height:0;overflow:visible}
.slope-canvas{width:100%;height:100%;display:block}
.info-card{position:absolute;width:280px;min-height:60px;background:var(--surface);border:1px solid var(--chart-border);border-radius:8px;padding:0;box-shadow:var(--shadow);z-index:20;opacity:0;pointer-events:none;transition:opacity .15s;overflow:visible;min-width:180px;max-width:500px;font-size:11px}
.info-card.visible{opacity:1;pointer-events:none}
.info-card.pinned{border-color:var(--week-active-bg);box-shadow:0 0 0 1px var(--week-active-bg),var(--shadow);cursor:move;pointer-events:auto}
.info-card-inner{overflow-y:auto;max-height:100%;border-radius:8px}
.ic-accent{position:absolute;top:0;left:0;bottom:0;width:4px;border-radius:8px 0 0 8px}
.ic-handle{position:absolute;z-index:25}
.ic-handle-tl{top:-3px;left:-3px;width:12px;height:12px;cursor:nwse-resize}
.ic-handle-tr{top:-3px;right:-3px;width:12px;height:12px;cursor:nesw-resize}
.ic-handle-bl{bottom:-3px;left:-3px;width:12px;height:12px;cursor:nesw-resize}
.ic-handle-br{bottom:-3px;right:-3px;width:12px;height:12px;cursor:nwse-resize}
.ic-handle-t{top:-3px;left:12px;right:12px;height:6px;cursor:ns-resize}
.ic-handle-b{bottom:-3px;left:12px;right:12px;height:6px;cursor:ns-resize}
.ic-handle-l{left:-3px;top:12px;bottom:12px;width:6px;cursor:ew-resize}
.ic-handle-r{right:-3px;top:12px;bottom:12px;width:6px;cursor:ew-resize}
.info-card-header{display:flex;align-items:center;justify-content:space-between;padding:.7em .9em .5em;user-select:none;border-bottom:1px solid var(--chart-border)}
.info-card-title{font-size:.9em;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)}
.info-card-pin{font-size:.7em;opacity:0.5;font-weight:600;color:var(--text-muted)}
.info-card-body{padding:.5em .9em .9em;overflow-y:auto}
.ic-grid{display:grid;grid-template-columns:auto 1fr auto;gap:0;align-items:baseline}
.ic-week-block{display:contents}
.ic-week-block+.ic-week-block .ic-wk{border-top:1px solid var(--chart-border);padding-top:.5em;margin-top:.3em}
.ic-week-block+.ic-week-block .ic-val{border-top:1px solid var(--chart-border);padding-top:.5em;margin-top:.3em}
.ic-week-block+.ic-week-block .ic-delta{border-top:1px solid var(--chart-border);padding-top:.5em;margin-top:.3em}
.ic-wk{font-size:.85em;font-weight:700;color:var(--text-primary);padding:.15em 0;white-space:nowrap}
.ic-val{font-size:1em;font-weight:700;color:var(--text-primary);text-align:right;padding:.15em .4em .15em 1em;white-space:nowrap}
.ic-delta{font-size:.78em;font-weight:700;text-align:right;padding:.15em 0;white-space:nowrap;min-width:4.5em}
.ic-carrier-label{font-size:.78em;color:var(--text-muted);padding:.1em 0 .1em 1.2em}
.ic-carrier-val{font-size:.78em;font-weight:600;color:var(--text-secondary);text-align:right;padding:.1em .4em .1em 1em;white-space:nowrap}
.ic-carrier-spacer{/* empty grid cell */}
.ic-total-sep{grid-column:1/-1;height:0;border-top:1.5px solid var(--chart-border);margin-top:.45em}
.ic-total-label{font-size:.9em;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);padding:.45em 0 .2em}
.ic-total-val{font-size:1.1em;font-weight:800;text-align:right;padding:.45em .4em .2em 1em;white-space:nowrap}
.ic-total-spacer{}
.legend{display:flex;gap:12px;margin-left:auto;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:50%}
.legend-label{font-size:10px;font-weight:600;color:var(--text-muted)}

/* === VIEW TOGGLE === */
.view-toggle{display:flex;align-items:center;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px}
.view-btn{font-size:10px;font-weight:600;padding:4px 10px;border-radius:4px;border:none;cursor:pointer;background:transparent;color:var(--text-muted);font-family:'Inter',sans-serif;transition:all .14s}
.view-btn.active{background:var(--week-active-bg);color:var(--week-active-text)}
.view-btn:hover:not(.active){color:var(--text-primary)}
.view-classic,.view-table{display:none}
.view-classic.active{display:flex;flex-direction:column;flex:1;min-height:0}
.view-table.active{display:flex;flex-direction:column;flex:1;min-height:0}
/* Flash overlay for view transitions */
@keyframes flashIn{0%{opacity:.55}100%{opacity:0}}
.flash-overlay{position:absolute;inset:0;background:#fff;pointer-events:none;opacity:0;border-radius:inherit;z-index:10}
[data-theme="dark"] .flash-overlay{background:#e8edf5}
.flash-overlay.active{animation:flashIn .4s ease-out forwards}
/* Staggered row entrance */
@keyframes rowFadeIn{0%{opacity:0}100%{opacity:1}}
.tbl-row{opacity:0;animation:rowFadeIn .25s ease-out forwards}
/* === TABLE — proven alignment: all grids identical, all cells use padding:0 6px === */
.tbl-head,.tbl-row,.tbl-foot{display:grid;grid-template-columns:var(--tbl-cols);padding:0 16px;align-items:center}
.tbl-scroll{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
.tbl-head{height:28px;border-bottom:1.5px solid var(--chart-border);position:sticky;top:0;z-index:2;background:var(--chart-bg)}
.tbl-row{height:44px;border-bottom:1px solid var(--chart-border);cursor:pointer;transition:background .12s}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--row-hover)}
.tbl-row.pinned{background:var(--row-pin);position:relative}
.tbl-row.pinned::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--pin-col,var(--week-active-bg))}
.tbl-foot{height:44px;border-top:2px solid var(--chart-border);position:sticky;bottom:0;z-index:2;background:var(--surface2)}

/* Header cells */
.hc{padding:0 6px;font-size:9px;font-weight:700;color:var(--text-muted)}
.hc-upper{text-transform:uppercase;letter-spacing:.07em}
.hc-center{text-align:center}
.hc-sort{cursor:pointer;user-select:none;transition:color .12s}
.hc-sort:hover{color:var(--text-secondary)}
.hc-sort.active{color:var(--text-primary)}
.sort-arrow{font-size:7px;margin-left:3px;opacity:.4}
.hc-sort.active .sort-arrow{opacity:1}
/* Data cells — plain spans, NO display:flex, NO nesting */
.vc{padding:0 6px;font-size:12px;font-weight:600;color:var(--text-primary);font-variant-numeric:tabular-nums;white-space:nowrap}
.vc-bold{font-weight:700}
.vc-delta{font-size:9px;font-weight:700;margin-left:6px}
/* Footer cells */
.fc{padding:0 6px;font-size:12px;font-weight:600;color:var(--text-primary);font-variant-numeric:tabular-nums;white-space:nowrap}
/* Footer label */
.foot-text{padding:0 6px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-muted)}
/* Rank col */
.rank{text-align:center;padding:0;font-size:11px;font-weight:700;color:var(--text-muted)}
/* Category col */
.cat-label{padding:0 6px;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;transition:color .12s}
/* Spark col */
.spark{display:flex;align-items:center;justify-content:center;padding:0 6px 0 0}
.spark canvas{display:block}

/* === INFO CARD === */
.info-card{position:absolute;width:280px;min-height:60px;background:var(--surface);border:1px solid var(--chart-border);border-radius:8px;padding:0;box-shadow:var(--shadow);z-index:20;opacity:0;pointer-events:none;transition:opacity .15s;overflow:visible;min-width:180px;max-width:500px;font-size:11px}

.ic-handle-t{top:-3px;left:12px;right:12px;height:6px;cursor:ns-resize}
.ic-handle-b{bottom:-3px;left:12px;right:12px;height:6px;cursor:ns-resize}
.ic-handle-l{left:-3px;top:12px;bottom:12px;width:6px;cursor:ew-resize}
.ic-handle-r{right:-3px;top:12px;bottom:12px;width:6px;cursor:ew-resize}

.info-card-body{padding:.5em .9em .9em;overflow-y:auto}

</style>
</head>

<div class="widget">
  <div class="header">
    <div class="header-left">
      <span class="eyebrow">Hantover Inc. &middot; Freight</span>
      <span class="title">Surcharge Breakdown</span>
      <span class="subtitle">FedEx &amp; UPS surcharge spend by category — week over week</span>
    </div>
    <div class="header-right">
      <div class="view-toggle">
        <button class="view-btn active" data-view="classic">Chart</button>
        <button class="view-btn" data-view="table">Table</button>
      </div>
      <div class="dm-toggle" onclick="toggleDark()" title="Toggle dark mode">
        <span class="dm-icon">&#9728;</span>
        <div class="dm-track"><div class="dm-knob"></div></div>
        <span class="dm-icon">&#9790;</span>
      </div>
    </div>
  </div>
  <div class="controls">
    <div class="ctrl-left">
      <button class="carrier-btn active" data-carrier="both">Both</button>
      <button class="carrier-btn" data-carrier="fedex">FedEx</button>
      <button class="carrier-btn" data-carrier="ups">UPS</button>
      <button class="reset-btn" onclick="resetAll()" title="Reset all">&#8634; Reset</button>
    </div>
    <div class="ctrl-right">
      <button class="carrier-btn filter-btn active" data-filter="all">All</button>
      <button class="carrier-btn filter-btn" data-filter="10">Top 10</button>
      <button class="carrier-btn filter-btn" data-filter="5">Top 5</button>
    </div>
  </div>
  <div class="chart-area">
    <div class="summary-row">
      <div class="stat-card"><div class="stat-label">Total Surcharges</div><div class="stat-value" id="s-total">&mdash;</div><div class="stat-sub" id="s-cats">&mdash;</div></div>
      <div class="stat-card"><div class="stat-label">Biggest Mover</div><div class="stat-value" id="s-mover">&mdash;</div><div class="stat-sub" id="s-mover-d">&mdash;</div></div>
      <div class="stat-card"><div class="stat-label">Most Volatile</div><div class="stat-value" id="s-volatile">&mdash;</div><div class="stat-sub" id="s-vol-d">&mdash;</div></div>
    </div>
    <!-- CLASSIC VIEW: Canvas slope chart -->
    <div class="view-classic active" id="viewClassic">
      <div class="slope-wrap" id="slopeWrap">
        <canvas class="slope-canvas" id="slopeCanvas"></canvas>
      </div>
    </div>
    <!-- TABLE VIEW: Ranked table with sparklines -->
    <div class="view-table" id="viewTable">
      <div class="tbl-scroll" id="tblScroll">
        <div class="tbl-head" id="tblHead"></div>
        <div id="tblBody"></div>
        <div class="tbl-foot" id="tblFoot"></div>
      </div>
    </div>
  </div>
</div>

  cardEl.querySelector('.info-card-title').textContent=esc(cat.label);cardEl.querySelector('.info-card-pin').textContent=pinned?'\uD83D\uDCCC pinned':'hover';
  cardEl.querySelector('.info-card-body').innerHTML=html;cardEl.classList.add('visible');cardEl.classList.toggle('pinned',!!pinned);
  if(!pinned||!cardEl.style.left||cardEl.style.right!=='auto'){var cr=$s('.chart-area').getBoundingClientRect(),wr=$s('.widget').getBoundingClientRect();cardEl.style.right='28px';cardEl.style.left='auto';cardEl.style.top=(cr.top-wr.top+8)+'px';cardEl.style.width='280px';cardEl.style.height='auto';cardEl.style.fontSize='11px';}
}
function tableHideCard(){if(tablePinned!==null)return;if(cardEl)cardEl.classList.remove('visible','pinned');}

function buildHeader(){
  var head=$s('#tblHead'),sa=tableSortCol==='rank'?(tableSortDir==='asc'?'\u25B2':'\u25BC'):'\u25B2',sb=tableSortCol==='label'?(tableSortDir==='asc'?'\u25B2':'\u25BC'):'\u25B2';
  head.innerHTML='<span class="hc hc-upper hc-center hc-sort'+(tableSortCol==='rank'?' active':'')+'" data-sort="rank">#<span class="sort-arrow">'+sa+'</span></span><span class="hc hc-upper hc-sort'+(tableSortCol==='label'?' active':'')+'" data-sort="label">Category<span class="sort-arrow">'+sb+'</span></span><span class="hc hc-upper hc-center">Trend</span>'+WEEKS.map(function(w){return '<span class="hc hc-upper">'+w+'</span>'}).join('')+'<span class="hc hc-upper">Total</span>';
  head.querySelectorAll('.hc-sort').forEach(function(el){el.addEventListener('click',function(){var key=el.dataset.sort;if(tableSortCol===key)tableSortDir=tableSortDir==='asc'?'desc':'asc';else{tableSortCol=key;tableSortDir=key==='label'?'asc':'desc';}buildHeader();buildRows()})});
}
function buildRows(){
  var vis=getVisibleCats(),sorted=tableSortCats(vis),body=$s('#tblBody'),pal=dark?PAL_D:PAL_L;
  var scroll=$s('#tblScroll'),st=scroll?scroll.scrollTop:0;body.innerHTML='';
  sorted.forEach(function(cat,ri){
    var ci=cat.baseRank-1,vals=WEEKS.map(function(w){return getVal(cat,w)}),total=vals.reduce(function(s,v){return s+v},0);
    var col=pal[ci%pal.length];
    var row=document.createElement('div');row.className='tbl-row';row.dataset.id=cat.id;
    row.style.animationDelay=(ri*30)+'ms';
    if(tablePinned===cat.id){row.classList.add('pinned');row.style.setProperty('--pin-col',col);}
    row.innerHTML='<span class="rank">'+cat.baseRank+'</span><span class="cat-label" style="color:'+col+'">'+esc(cat.label)+'</span><span class="spark"><canvas width="64" height="28"></canvas></span>'+vals.map(function(v,vi){return '<span class="vc">'+fmtK(v)+(vi>0?fmtDelta(v,vals[vi-1]):'')+'</span>'}).join('')+'<span class="vc vc-bold">'+fmtK(total)+'</span>';
    body.appendChild(row);drawSparkline(row.querySelector('canvas'),vals,col);
    row.addEventListener('click',function(){if(tablePinned===cat.id){tablePinned=null;row.classList.remove('pinned');row.style.removeProperty('--pin-col');tableHideCard();return;}var old=body.querySelector('.tbl-row.pinned');if(old){old.classList.remove('pinned');old.style.removeProperty('--pin-col');}tablePinned=cat.id;row.classList.add('pinned');row.style.setProperty('--pin-col',col);tableShowCard(cat,true);});
    row.addEventListener('mouseenter',function(){if(tablePinned===null)tableShowCard(cat,false);else if(tablePinned!==cat.id)tableShowCard(cat,false)});
    row.addEventListener('mouseleave',function(){if(tablePinned===null)tableHideCard();else{var vis2=getVisibleCats(),pc=vis2.find(function(c){return c.id===tablePinned});if(pc)tableShowCard(pc,true)}});
  });
  if(scroll)scroll.scrollTop=st;buildFooter(vis);
}
function buildFooter(vis){
  var foot=$s('#tblFoot'),wt=WEEKS.map(function(w){return vis.reduce(function(s,c){return s+getVal(c,w)},0)}),gt=wt.reduce(function(s,v){return s+v},0);
  foot.innerHTML='<span></span><span class="foot-text">Total</span><span></span><span class="fc">'+wt.map(function(v){return fmtK(v)}).join('</span><span class="fc">')+'</span><span class="fc">'+fmtK(gt)+'</span>';
}
function tableRefresh(){
  var wc=WEEKS.length,colW=Math.max(70,Math.floor(320/wc));
  document.documentElement.style.setProperty('--tbl-cols','32px 1fr 72px '+('repeat('+wc+','+colW+'px) ')+'80px');
  updateSummary();buildHeader();buildRows();
}
$s('.chart-area').addEventListener('click',function(e){if(activeView!=='table')return;if(e.target.closest('.tbl-row')||e.target.closest('.info-card')||e.target.closest('.tbl-head'))return;if(tablePinned!==null){tablePinned=null;var old=$s('#tblBody').querySelector('.tbl-row.pinned');if(old){old.classList.remove('pinned');old.style.removeProperty('--pin-col');}tableHideCard();}});

// =============================================
// SHARED: Info card, view toggle, controls
// =============================================
function ensureCard(){
  if(cardEl)return;cardEl=document.createElement('div');cardEl.className='info-card';
  cardEl.innerHTML='<div class="ic-accent"></div><div class="ic-handle ic-handle-tl" data-corner="tl"></div><div class="ic-handle ic-handle-tr" data-corner="tr"></div><div class="ic-handle ic-handle-bl" data-corner="bl"></div><div class="ic-handle ic-handle-br" data-corner="br"></div><div class="ic-handle ic-handle-t" data-corner="t"></div><div class="ic-handle ic-handle-b" data-corner="b"></div><div class="ic-handle ic-handle-l" data-corner="l"></div><div class="ic-handle ic-handle-r" data-corner="r"></div><div class="info-card-inner"><div class="info-card-header"><span class="info-card-title"></span><span class="info-card-pin">hover</span></div><div class="info-card-body"></div></div>';
  $s('.widget').appendChild(cardEl);
  cardEl.addEventListener('mousedown',function(e){
    var isPinned=activeView==='classic'?classicPinned!==null:tablePinned!==null;if(!isPinned)return;
    var wr=$s('.widget').getBoundingClientRect(),cr=cardEl.getBoundingClientRect();e.preventDefault();
    var handle=e.target.closest('.ic-handle');
    if(handle){var corner=handle.dataset.corner,sx=e.clientX,sy=e.clientY,sw=cr.width,sh=cr.height,sl=cr.left-wr.left,st=cr.top-wr.top,minW=180,minH=60;
      var cm={tl:'nwse-resize',tr:'nesw-resize',bl:'nesw-resize',br:'nwse-resize',t:'ns-resize',b:'ns-resize',l:'ew-resize',r:'ew-resize'};
      var ov=createOverlay(cm[corner]||'nwse-resize');var raf=null;
      ov.addEventListener('mousemove',function(e2){if(raf)return;raf=requestAnimationFrame(function(){raf=null;var dx=e2.clientX-sx,dy=e2.clientY-sy,nw,nh;
        if(corner==='br'){cardEl.style.width=Math.max(minW,sw+dx)+'px';cardEl.style.height=Math.max(minH,sh+dy)+'px';}
        else if(corner==='bl'){nw=Math.max(minW,sw-dx);cardEl.style.width=nw+'px';cardEl.style.left=(sl+(sw-nw))+'px';cardEl.style.right='auto';cardEl.style.height=Math.max(minH,sh+dy)+'px';}
        else if(corner==='tr'){cardEl.style.width=Math.max(minW,sw+dx)+'px';nh=Math.max(minH,sh-dy);cardEl.style.height=nh+'px';cardEl.style.top=(st+(sh-nh))+'px';}
        else if(corner==='tl'){nw=Math.max(minW,sw-dx);nh=Math.max(minH,sh-dy);cardEl.style.width=nw+'px';cardEl.style.left=(sl+(sw-nw))+'px';cardEl.style.right='auto';cardEl.style.height=nh+'px';cardEl.style.top=(st+(sh-nh))+'px';}
        else if(corner==='r'){cardEl.style.width=Math.max(minW,sw+dx)+'px';}
        else if(corner==='l'){nw=Math.max(minW,sw-dx);cardEl.style.width=nw+'px';cardEl.style.left=(sl+(sw-nw))+'px';cardEl.style.right='auto';}
        else if(corner==='b'){cardEl.style.height=Math.max(minH,sh+dy)+'px';}
        else if(corner==='t'){nh=Math.max(minH,sh-dy);cardEl.style.height=nh+'px';cardEl.style.top=(st+(sh-nh))+'px';}
        cardEl.style.fontSize=Math.max(9,Math.min(20,(cardEl.offsetWidth/280)*11))+'px';})});
      ov.addEventListener('mouseup',function(){ov.remove()},{once:true});return;}
    var ox=e.clientX-(cr.left-wr.left),oy=e.clientY-(cr.top-wr.top);var ov=createOverlay('move');
    ov.addEventListener('mousemove',function(e2){cardEl.style.left=Math.max(0,Math.min(wr.width-40,e2.clientX-wr.left-ox))+'px';cardEl.style.top=Math.max(0,Math.min(wr.height-40,e2.clientY-wr.top-oy))+'px';cardEl.style.right='auto';});
    ov.addEventListener('mouseup',function(){ov.remove()},{once:true});
  });
}

function setView(v){
  if(v===activeView)return;activeView=v;
  document.querySelectorAll('.view-btn').forEach(function(b){b.classList.toggle('active',b.dataset.view===v)});
  // Hide card and reset its position for the new view
  if(cardEl){cardEl.classList.remove('visible','pinned');cardEl.style.left='';cardEl.style.right='';cardEl.style.top='';}
  // Reset pin states
  classicPinned=null;classicHovered=-1;tablePinned=null;
  // Toggle visibility
  $s('#viewClassic').classList.toggle('active',v==='classic');
  $s('#viewTable').classList.toggle('active',v==='table');
  // Initialize the active view
  if(v==='classic'){resize();buildLines();animate();}
  else{tableRefresh();flashElement($s('#tblScroll'));}
}
function resetAll(){
  if(cardEl)cardEl.classList.remove('visible','pinned');
  classicPinned=null;classicHovered=-1;tablePinned=null;tableSortCol='rank';tableSortDir='asc';
  if(activeView==='classic'){animate();}else{buildHeader();buildRows();}
}
function setCarrier(c){
  activeCarrier=c;document.querySelectorAll('.carrier-btn:not(.filter-btn)').forEach(function(b){b.classList.toggle('active',b.dataset.carrier===c)});
  if(cardEl)cardEl.classList.remove('visible','pinned');classicPinned=null;classicHovered=-1;tablePinned=null;
  if(activeView==='classic')classicRefresh();else tableRefresh();
}
function setFilter(f){
  activeFilter=f;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.toggle('active',b.dataset.filter===f)});
  if(cardEl)cardEl.classList.remove('visible','pinned');classicPinned=null;classicHovered=-1;tablePinned=null;
  if(activeView==='classic')classicRefresh();else tableRefresh();
}

document.querySelectorAll('.carrier-btn:not(.filter-btn)').forEach(function(b){b.addEventListener('click',function(){setCarrier(b.dataset.carrier)})});
document.querySelectorAll('.filter-btn').forEach(function(b){b.addEventListener('click',function(){setFilter(b.dataset.filter)})});
document.querySelectorAll('.view-btn').forEach(function(b){b.addEventListener('click',function(){setView(b.dataset.view)})});

// INIT — classic is default
updateSummary();classicInit();
</script>
</body>
</html>
