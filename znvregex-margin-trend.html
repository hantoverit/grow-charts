  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-shrink:0}
  .header-left{display:flex;flex-direction:column;gap:2px}
  .eyebrow{font-size:10.5px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted)}
  .title{font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em}
  .header-right{display:flex;align-items:center;gap:14px}
  .view-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}
  .view-btn{font-size:11.5px;font-weight:600;padding:5px 13px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--week-inactive);transition:all .16s;font-family:"Inter",sans-serif}

  .dm-icon{font-size:10px;color:var(--text-secondary);display:flex;align-items:center;width:12px;justify-content:center}
  .dm-track{width:28px;height:15px;background:var(--toggle-bg);border-radius:8px;position:relative;transition:background .2s;flex-shrink:0}
  .dm-knob{width:11px;height:11px;background:var(--toggle-knob);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  [data-theme="dark"] .dm-knob{transform:translateX(13px)}
  .divider{height:1px;background:var(--border);margin-bottom:12px;flex-shrink:0}
  .chart-area{flex:1;min-height:0;background:var(--chart-bg);border:1px solid var(--chart-border);border-radius:8px;padding:12px 16px 8px;position:relative;transition:background .25s,border-color .25s;overflow:hidden}
  canvas{display:block;width:100%;height:100%}
  .legend{display:flex;gap:16px;justify-content:flex-end;padding:8px 0 0;flex-shrink:0}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:500;color:var(--text-muted)}
  .legend-swatch{width:12px;height:3px;border-radius:2px}
  .legend-dot{width:7px;height:7px;border-radius:50%}
  .tooltip{position:absolute;pointer-events:none;background:var(--tooltip-bg);border:1px solid var(--tooltip-border);border-radius:8px;padding:10px 12px;font-size:11px;box-shadow:0 4px 16px rgba(0,0,0,.15);opacity:0;transition:opacity .12s;z-index:10;min-width:140px}

  .tt-key{color:var(--tooltip-muted);font-weight:500}
  .tt-val{font-weight:600;color:var(--tooltip-text);font-variant-numeric:tabular-nums}
  @keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

let currentView='weekly';
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const chartArea=document.getElementById('chartArea');
const tooltip=document.getElementById('tooltip');
let dpr=window.devicePixelRatio||1;
let W,H,hoverIdx=-1;

// Layout constants
const PAD={top:24,right:58,bottom:40,left:62};

function getData(){return currentView==='monthly'?MONTHLY:WEEKLY;}

function fmt$(v){
  if(v>=1e6)return'$'+((v/1e6).toFixed(v>=1e7?1:2))+'M';
  if(v>=1e3)return'$'+((v/1e3).toFixed(v>=1e5?0:1))+'K';
  return'$'+v.toFixed(0);
}
function fmtPct(v){return v.toFixed(2)+'%';}

function getCSS(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

function resize(){
  const r=chartArea.getBoundingClientRect();
  W=r.width-32; H=r.height-20; // account for padding
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function draw(){
  const data=getData();
  const n=data.length;
  ctx.clearRect(0,0,W,H);

  const plotL=PAD.left, plotR=W-PAD.right, plotT=PAD.top, plotB=H-PAD.bottom;
  const plotW=plotR-plotL, plotH=plotB-plotT;

  // Scales
  const maxMdse=Math.max(...data.map(d=>d.mdse))*1.08;
  const gpVals=data.map(d=>d.gpPct);
  const gpMin=Math.floor(Math.min(...gpVals)-0.5);
  const gpMax=Math.ceil(Math.max(...gpVals)+0.5);

  // Bar geometry
  const barGap=currentView==='monthly'?0.3:0.15;
  const slotW=plotW/n;
  const barW=slotW*(1-barGap);

  // Colors
  const barFill=getCSS('--bar-fill');
  const barFillA=getCSS('--bar-fill-a');
  const lineStroke=getCSS('--line-stroke');
  const gridline=getCSS('--gridline');
  const axisText=getCSS('--axis-text');
  const textPrimary=getCSS('--text-primary');

  // Gridlines (left axis — MDSE)
  const nTicks=5;
  ctx.strokeStyle=gridline;
  ctx.lineWidth=1;
  ctx.font='500 10px Inter,sans-serif';
  ctx.textAlign='right';
  ctx.fillStyle=axisText;
  for(let i=0;i<=nTicks;i++){
    const v=maxMdse*i/nTicks;
    const y=plotB-(v/maxMdse)*plotH;
    ctx.beginPath();ctx.moveTo(plotL,y);ctx.lineTo(plotR,y);ctx.stroke();
    ctx.fillText(fmt$(v),plotL-8,y+3.5);
  }

  // Right axis labels (GP%)
  const gpTicks=5;
  ctx.textAlign='left';
  for(let i=0;i<=gpTicks;i++){
    const v=gpMin+(gpMax-gpMin)*i/gpTicks;
    const y=plotB-((v-gpMin)/(gpMax-gpMin))*plotH;
    ctx.fillStyle=lineStroke;
    ctx.fillText(v.toFixed(1)+'%',plotR+8,y+3.5);
  }

  // Bars
  const barRadius=currentView==='monthly'?4:2;
  data.forEach((d,i)=>{
    const x=plotL+i*slotW+(slotW-barW)/2;
    const barH=(d.mdse/maxMdse)*plotH;
    const y=plotB-barH;
    ctx.fillStyle=(hoverIdx===i)?barFill:barFillA;
    roundedRect(ctx,x,y,barW,barH,barRadius);
    ctx.fill();
  });

  // GP% line
  const linePoints=data.map((d,i)=>{
    const x=plotL+i*slotW+slotW/2;
    const y=plotB-((d.gpPct-gpMin)/(gpMax-gpMin))*plotH;
    return{x,y};
  });

  ctx.strokeStyle=lineStroke;
  ctx.lineWidth=2;
  ctx.lineJoin='round';
  ctx.lineCap='round';
  ctx.beginPath();
  linePoints.forEach((p,i)=>{i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
  ctx.stroke();

  // Dots
  linePoints.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,hoverIdx===i?5:3,0,Math.PI*2);
    ctx.fillStyle=lineStroke;
    ctx.fill();
    if(hoverIdx===i){
      ctx.strokeStyle=getCSS('--surface');
      ctx.lineWidth=2;
      ctx.stroke();
    }
  });

  // X labels
  ctx.fillStyle=axisText;
  ctx.textAlign='center';
  ctx.font='500 10px Inter,sans-serif';
  const labelStep=currentView==='weekly'?Math.ceil(n/20):1;
  data.forEach((d,i)=>{
    if(i%labelStep!==0&&i!==n-1)return;
    const x=plotL+i*slotW+slotW/2;
    let lbl=d.label;
    if(currentView==='weekly'&&d.yr){
      lbl=d.yr===2026?d.label+"'26":d.label;
    }
    ctx.save();
    if(currentView==='weekly'&&n>30){
      ctx.translate(x,plotB+8);
      ctx.rotate(-Math.PI/4);
      ctx.textAlign='right';
      ctx.fillText(lbl,0,0);
    } else {
      ctx.fillText(lbl,x,plotB+16);
    }
    ctx.restore();
  });

  // Axis titles
  ctx.save();
  ctx.font='600 10px Inter,sans-serif';
  ctx.fillStyle=barFill;
  ctx.textAlign='center';
  ctx.translate(14,plotT+plotH/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('MDSE Sales',0,0);
  ctx.restore();

  ctx.save();
  ctx.font='600 10px Inter,sans-serif';
  ctx.fillStyle=lineStroke;
  ctx.textAlign='center';
  ctx.translate(W-8,plotT+plotH/2);
  ctx.rotate(Math.PI/2);
  ctx.fillText('GP %',0,0);
  ctx.restore();

  // Hover crosshair
  if(hoverIdx>=0&&hoverIdx<n){
    const x=plotL+hoverIdx*slotW+slotW/2;
    ctx.strokeStyle=gridline;
    ctx.lineWidth=1;
    ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(x,plotT);ctx.lineTo(x,plotB);ctx.stroke();
    ctx.setLineDash([]);
  }
}

function roundedRect(ctx,x,y,w,h,r){
  r=Math.min(r,h/2,w/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h);
  ctx.lineTo(x,y+h);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function hitTest(mx,my){
  const data=getData();
  const n=data.length;
  const plotL=PAD.left, plotR=W-PAD.right, plotT=PAD.top, plotB=H-PAD.bottom;
  const slotW=(plotR-plotL)/n;
  if(mx<plotL||mx>plotR||my<plotT-10||my>plotB+10)return-1;
  const idx=Math.floor((mx-plotL)/slotW);
  return Math.max(0,Math.min(n-1,idx));
}

function showTooltip(idx,mx,my){
  const data=getData();
  const d=data[idx];
  let label=d.label;
  if(currentView==='weekly'&&d.yr)label+=` (${d.yr})`;

  const delta=idx>0?(d.gpPct-data[idx-1].gpPct):null;
  const deltaHtml=delta!==null?`<div class="tt-row"><span class="tt-key">GP% Δ</span><span class="tt-val" style="color:${delta>=0?getCSS('--green'):getCSS('--red')}">${delta>=0?'+':''}${delta.toFixed(2)}pp</span></div>`:'';

  tooltip.innerHTML=`
    <div class="tt-label">${label}</div>
    <div class="tt-row"><span class="tt-key">MDSE</span><span class="tt-val">${fmt$(d.mdse)}</span></div>
    <div class="tt-row"><span class="tt-key">GP</span><span class="tt-val">${fmt$(d.gp)}</span></div>
    <div class="tt-row"><span class="tt-key">GP%</span><span class="tt-val">${fmtPct(d.gpPct)}</span></div>
    <div class="tt-row"><span class="tt-key">Invoices</span><span class="tt-val">${d.inv.toLocaleString()}</span></div>
    ${deltaHtml}
  `;
  tooltip.classList.add('show');

  // Position
  const tr=chartArea.getBoundingClientRect();
  const tw=tooltip.offsetWidth, th=tooltip.offsetHeight;
  let tx=mx+12, ty=my-th/2;
  if(tx+tw>tr.width-20)tx=mx-tw-12;
  ty=Math.max(4,Math.min(tr.height-th-4,ty));
  tooltip.style.left=tx+'px';
  tooltip.style.top=ty+'px';
}

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const idx=hitTest(mx,my);
  if(idx!==hoverIdx){
    hoverIdx=idx;
    draw();
    if(idx>=0)showTooltip(idx,mx,my);
    else tooltip.classList.remove('show');
  } else if(idx>=0){
    showTooltip(idx,mx,my);
  }
});
canvas.addEventListener('mouseleave',()=>{
  hoverIdx=-1;draw();tooltip.classList.remove('show');
});

function setView(v){
  currentView=v;
  document.querySelectorAll('.view-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.view===v);
  });
  hoverIdx=-1;
  tooltip.classList.remove('show');
  draw();
}

function toggleDark(){
  const html=document.documentElement;
  html.dataset.theme=html.dataset.theme==='dark'?'light':'dark';
  requestAnimationFrame(draw);
}

function init(){
  dpr=window.devicePixelRatio||1;
  resize();
  draw();
}

window.addEventListener('resize',()=>{resize();draw();});
init();
</script>
