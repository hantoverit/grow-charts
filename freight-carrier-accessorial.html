<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrier Accessorial Spend</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f6f8;--surface:#fff;--surface2:#f9fafb;--border:#e3e7ed;
    --text-primary:#111827;--text-secondary:#4b5563;--text-muted:#9ca3af;
    --green:#1e8a4a;--green-bg:#dcfce7;--red:#c0392b;--red-bg:#fee2e2;
    --toggle-bg:#d1d5db;--toggle-knob:#fff;
    --week-active-bg:#1a73e8;--week-active-text:#fff;--week-inactive:#6b7280;
    --shadow:0 1px 6px rgba(0,0,0,.08),0 4px 20px rgba(0,0,0,.04);
    --chart-bg:#f8fafc;--chart-border:#dce3eb;
  }
  [data-theme="dark"] {
    --bg:#0d1117;--surface:#161b27;--surface2:#1e2533;--border:#2e3a4e;
    --text-primary:#e8edf5;--text-secondary:#b0bdd0;--text-muted:#6b7f99;
    --green:#4ade80;--green-bg:#0c2b1c;--red:#fc8181;--red-bg:#2d1214;
    --toggle-bg:#2e3a4e;--toggle-knob:#e8edf5;
    --week-active-bg:#4f93f5;--week-active-text:#0d1117;--week-inactive:#94a3b8;
    --shadow:0 1px 8px rgba(0,0,0,.5);
    --chart-bg:#0f1520;--chart-border:#1e2a3a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%}
  body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text-primary);transition:background .25s,color .25s}
  .widget{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px 16px;width:100%;height:100%;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:background .25s,border-color .25s;position:relative}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-shrink:0}
  .header-left{display:flex;flex-direction:column;gap:2px}
  .eyebrow{font-size:10.5px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted)}
  .title{font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em}
  .header-right{display:flex;align-items:center;gap:14px}
  .week-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}
  .week-btn{font-size:11.5px;font-weight:600;padding:5px 13px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--week-inactive);transition:all .16s;font-family:"Inter",sans-serif}
  .week-btn.active{background:var(--week-active-bg);color:var(--week-active-text);box-shadow:0 1px 5px rgba(26,115,232,.3)}
  .dm-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.6;transition:opacity .15s;user-select:none;padding:2px 4px}
  .dm-toggle:hover{opacity:1}
  .dm-icon{font-size:10px;color:var(--text-secondary);display:flex;align-items:center;width:12px;justify-content:center}
  .dm-track{width:28px;height:15px;background:var(--toggle-bg);border-radius:8px;position:relative;transition:background .2s;flex-shrink:0}
  .dm-knob{width:11px;height:11px;background:var(--toggle-knob);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  [data-theme="dark"] .dm-knob{transform:translateX(13px)}
  .controls-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px;margin-bottom:2px;flex-shrink:0}
  .ctrl-left{display:flex;align-items:center;gap:6px}
  .sort-toggle{display:flex;gap:0;flex-shrink:0}
  .sort-btn{font-size:11px;font-weight:500;padding:5px 14px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text-muted);transition:all .16s;font-family:"Inter",sans-serif}
  .sort-btn:first-child{border-radius:6px 0 0 6px}
  .sort-btn:last-child{border-radius:0 6px 6px 0}
  .sort-btn:not(:first-child){border-left:none}
  .sort-btn.active{background:var(--week-active-bg);color:var(--week-active-text);border-color:var(--week-active-bg);font-weight:600}
  .reset-btn{height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;color:var(--text-muted);font-size:11px;font-weight:600;font-family:"Inter",sans-serif;transition:all .16s;padding:0 10px;opacity:0.7}
  .reset-btn:hover{opacity:1;border-color:var(--text-muted)}
  .reset-btn.has-pins{opacity:1;color:var(--red);border-color:var(--red);background:var(--red-bg)}
  .legend{display:flex;align-items:center;gap:12px;font-size:10px;font-weight:600;color:var(--text-muted)}
  .leg-swatch{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px}
  .divider{height:1px;background:var(--border);margin:8px 0;flex-shrink:0}
  .chart-area{flex:1;min-height:0;background:var(--chart-bg);border:1px solid var(--chart-border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;transition:background .25s,border-color .25s;position:relative}
  .hm-header{display:grid;grid-template-columns:28px minmax(78px,1fr) minmax(200px,4fr) 62px;gap:0;flex-shrink:0;border-bottom:1px solid var(--chart-border)}
  .hm-hcell{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);padding:9px 8px 7px}
  .hm-hcell:first-child{padding-left:12px;text-align:center}
  .hm-hcell:nth-child(2){padding-left:4px}
  .hm-hcell:nth-child(3){padding-left:10px}
  .hm-hcell:last-child{text-align:right;padding-right:12px}
  .hm-scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden}
  .hm-scroll::-webkit-scrollbar{width:5px}
  .hm-scroll::-webkit-scrollbar-track{background:transparent}
  .hm-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .hm-row{display:grid;grid-template-columns:28px minmax(78px,1fr) minmax(200px,4fr) 62px;gap:0;border-bottom:1px solid var(--chart-border);transition:background .12s;cursor:default}
  .hm-row:last-child{border-bottom:none}
  .hm-row.magnified{background:rgba(79,147,245,0.04)}
  [data-theme="dark"] .hm-row.magnified{background:rgba(79,147,245,0.06)}
  .hm-row.magnified .hm-label{font-weight:700}
  .hm-row.magnified .hm-total{font-weight:700;color:var(--text-primary)}
  .hm-rank{font-size:9px;font-weight:700;color:var(--text-muted);padding:10px 4px 10px 12px;display:flex;align-items:center;justify-content:center}
  .hm-label{font-size:11px;font-weight:600;color:var(--text-primary);padding:10px 6px 10px 4px;display:flex;align-items:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hm-bar-cell{padding:4px 8px 4px 6px;display:flex;align-items:center}
  .hm-bar-canvas{width:100%;height:34px;display:block}
  .hm-total{font-size:10.5px;font-weight:600;color:var(--text-secondary);padding:10px 12px 10px 4px;display:flex;align-items:center;justify-content:flex-end;white-space:nowrap}
  .hm-footer{display:grid;grid-template-columns:28px minmax(78px,1fr) minmax(200px,4fr) 62px;gap:0;border-top:2px solid var(--chart-border);flex-shrink:0}
  .hm-fcell{font-size:11px;font-weight:700;color:var(--text-primary);padding:10px 8px;display:flex;align-items:center}
  .hm-fcell:first-child{grid-column:1/3;padding-left:12px;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted)}
  .hm-fcell:last-child{justify-content:flex-end;padding-right:12px}
  .info-card{position:absolute;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);overflow:visible;min-width:180px;transition:opacity .15s;font-size:14px}
  .info-card.hover-card{pointer-events:none}
  .info-card .accent-bar{position:absolute;top:0;left:0;bottom:0;width:4px;border-radius:10px 0 0 10px}
  .info-card-inner{padding:1em 1.1em .85em 1.4em;overflow-y:auto;max-height:100%;border-radius:10px}
  .info-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .info-card-type{font-size:14px;font-weight:700;color:var(--text-primary)}
  .info-card-week{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}
  .info-card-val{font-size:22px;font-weight:700;color:var(--text-primary);margin-bottom:1px}
  .info-card-share{font-size:10px;font-weight:600;color:var(--text-muted);margin-bottom:4px}
  .info-card-delta{font-size:11px;font-weight:600;margin-bottom:8px}
  .info-card-divider{height:1px;background:var(--border);margin:8px 0}
  .info-card-section-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:4px}
  .info-card-row{display:flex;align-items:center;font-size:10px;padding:2px 0}
  .info-card-row-id{font-weight:700;color:var(--text-primary);min-width:80px}
  .info-card-row-bills{font-weight:500;color:var(--text-muted);font-size:9px;white-space:nowrap;min-width:44px;text-align:right}
  .info-card-pin{font-size:9px;color:var(--text-muted);opacity:0.5}
  .ic-handle{position:absolute;z-index:55}
  .ic-handle-tl{top:-3px;left:-3px;width:12px;height:12px;cursor:nwse-resize}
  .ic-handle-tr{top:-3px;right:-3px;width:12px;height:12px;cursor:nesw-resize}
  .ic-handle-bl{bottom:-3px;left:-3px;width:12px;height:12px;cursor:nesw-resize}
  .ic-handle-br{bottom:-3px;right:-3px;width:12px;height:12px;cursor:nwse-resize}
  .ic-handle-t{top:-3px;left:12px;right:12px;height:6px;cursor:ns-resize}
  .ic-handle-b{bottom:-3px;left:12px;right:12px;height:6px;cursor:ns-resize}
  .ic-handle-l{left:-3px;top:12px;bottom:12px;width:6px;cursor:ew-resize}
  .ic-handle-r{right:-3px;top:12px;bottom:12px;width:6px;cursor:ew-resize}
</style>
</head>

let dark=true,viewWeek="all",sortMode="total",hovRow=null,hovSeg=null;

// Dynamic week button generation
(function(){
  const toggle=document.querySelector('.week-toggle');
  WEEKS.forEach(w=>{
    const btn=document.createElement('button');
    btn.className='week-btn';
    btn.id='btn-'+w.replace('-','');
    btn.onclick=()=>setWeek(w);
    btn.textContent='W'+w;
    toggle.appendChild(btn);
  });
})();

function prevWeek(w){const i=WEEKS.indexOf(w);return i>0?WEEKS[i-1]:null;}
function getTotal(carr){return WEEKS.reduce((s,w)=>(s+(DATA[carr][w]||0)),0);}
function getTypeCount(carr){return DETAIL[carr]?Object.keys(DETAIL[carr]).length:0;}
function getWeekVal(carr){return DATA[carr][viewWeek]||0;}
function getWowDelta(carr){const w=viewWeek==="all"?WEEKS[WEEKS.length-1]:viewWeek;const pw=prevWeek(w);if(!pw)return 0;return(DATA[carr][w]||0)-(DATA[carr][pw]||0);}
function getWeekTotal(wk){let s=0;for(const c of Object.keys(DATA))s+=(DATA[c][wk]||0);return s;}
function getSorted(){
  const carriers=Object.keys(DATA);
  if(sortMode==="total")carriers.sort((a,b)=>getTotal(b)-getTotal(a));
  else if(sortMode==="types")carriers.sort((a,b)=>getTypeCount(b)-getTypeCount(a)||(getTotal(b)-getTotal(a)));
  else if(sortMode==="wow")carriers.sort((a,b)=>Math.abs(getWowDelta(b))-Math.abs(getWowDelta(a)));
  return carriers;
}
function fmtShort(v){if(v>=10000)return"$"+(v/1000).toFixed(1)+"k";if(v>=1000)return"$"+v.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0});if(v>=100)return"$"+v.toFixed(0);if(v>0)return"$"+v.toFixed(2);return"$0";}
function fmt(v){return"$"+v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDelta(v){const a=Math.abs(v),s=v>=0?"+":"\u2212";if(a>=1000)return s+"$"+a.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0});return s+"$"+a.toFixed(0);}
function deltaColor(d){return d>0?(dark?"#4ade80":"#1e8a4a"):d<0?(dark?"#fc8181":"#c0392b"):(dark?"#6b7f99":"#9ca3af");}

let globalMaxTotal=0;
(function(){for(const c of Object.keys(DATA)){const tot=getTotal(c);if(tot>globalMaxTotal)globalMaxTotal=tot;}})();

function weekColor(wi,hov){return hov?(dark?WCOL_HOV_D[wi]:WCOL_HOV_L[wi]):(dark?WCOL_D[wi]:WCOL_L[wi]);}

function drawOutlinedText(c,text,x,y,align,fs){
  c.save();c.font=`700 ${fs}px Inter,sans-serif`;c.textAlign=align;c.textBaseline="middle";
  c.strokeStyle=dark?"rgba(0,0,0,0.7)":"rgba(0,0,0,0.3)";c.lineWidth=dark?2.5:2;c.lineJoin="round";
  c.strokeText(text,x,y);c.fillStyle="#fff";c.fillText(text,x,y);c.restore();
}

function drawBar(canvas,carr){
  const dpr=window.devicePixelRatio||1;
  const W=canvas.clientWidth,H=canvas.clientHeight;
  if(!W||!H)return;
  canvas.width=W*dpr;canvas.height=H*dpr;
  const c=canvas.getContext("2d");
  c.setTransform(dpr,0,0,dpr,0,0);c.clearRect(0,0,W,H);
  const total=getTotal(carr);if(total<=0)return;
  const isMag=(hovRow===carr);
  const isIsolate=(viewWeek!=="all");
  const LABEL_R=isIsolate?52:0;
  const activeSegs=WEEKS.filter(w=>(DATA[carr][w]||0)>0).length;
  const totalGaps=SEG_GAP*Math.max(0,activeSegs-1);
  const barArea=W-LABEL_R;
  const barW=Math.max(8,(Math.sqrt(total)/Math.sqrt(globalMaxTotal))*(barArea)-totalGaps);
  const baseH=isMag?22:16,popH=isMag?30:24,R=3;
  const baseY=(H-baseH)/2,popY=(H-popH)/2;
  canvas._segs=[];
  let x=0,segCount=0;
  for(let wi=0;wi<WEEKS.length;wi++){
    const wk=WEEKS[wi];
    const v=DATA[carr][wk]||0;
    if(v<=0)continue;
    if(segCount>0)x+=SEG_GAP;
    segCount++;
    const segW=(v/total)*barW;
    if(segW<0.5){x+=segW;continue;}
    const isHovSeg=(hovSeg&&hovSeg.carr===carr&&hovSeg.wi===wi);
    const isIsolated=isIsolate&&wk===viewWeek;
    const isHidden=isIsolate&&wk!==viewWeek;
    const isPinned=pinnedCards.some(p=>p.carr===carr&&p.week===wk);
    let sy,sh;
    if(isHovSeg||isIsolated){sy=popY;sh=popH;}else{sy=baseY;sh=baseH;}
    const col=weekColor(wi,isHovSeg||isIsolated);
    if(isHidden){c.globalAlpha=0.15;c.fillStyle=weekColor(wi,false);}
    else{c.globalAlpha=1;c.fillStyle=col;}
    c.beginPath();c.roundRect(x,sy,segW,sh,R);c.fill();
    if((isHovSeg||isIsolated)&&dark){
      c.save();c.shadowColor=col;c.shadowBlur=isMag?16:10;c.strokeStyle=col;c.lineWidth=1.5;
      c.beginPath();c.roundRect(x+0.75,sy+0.75,segW-1.5,sh-1.5,R);c.stroke();c.restore();
    }
    if(isPinned){c.save();c.strokeStyle=dark?"rgba(255,255,255,0.6)":"rgba(0,0,0,0.3)";c.lineWidth=2;
    c.beginPath();c.roundRect(x+1,sy+1,segW-2,sh-2,R);c.stroke();c.restore();}
    c.globalAlpha=1;
    if((isHovSeg||isIsolated)&&v>0&&!isHidden){
      const valText=fmtShort(v);c.font="700 9.5px Inter,sans-serif";
      if(c.measureText(valText).width+10<segW)drawOutlinedText(c,valText,x+segW/2,sy+sh/2,"center",9.5);
    }
    canvas._segs.push({carr,wi,wk,x:x-1,y:sy-1,w:segW+2,h:sh+2,v});
    x+=segW;
  }
  if(isIsolate){
    const ai=WEEKS.indexOf(viewWeek);
    const v=DATA[carr][viewWeek]||0;
    if(v===0&&total>0){
      c.save();c.setLineDash([3,3]);c.strokeStyle=dark?"rgba(255,255,255,0.12)":"rgba(0,0,0,0.08)";
      c.lineWidth=1;const dashW=Math.max(20,barW*0.15);
      c.beginPath();c.roundRect(x+SEG_GAP+0.5,baseY+0.5,dashW,baseH-1,R);c.stroke();c.restore();
      c.save();c.font="500 8px Inter,sans-serif";c.textAlign="left";c.textBaseline="middle";
      c.fillStyle=dark?"#6b7f99":"#9ca3af";c.fillText("$0",x+SEG_GAP+dashW+4,H/2);c.restore();
    }
    if(ai>0&&v>0){
      const pv=DATA[carr][WEEKS[ai-1]]||0;
      if(pv>0){const d=v-pv,pct=(d/pv)*100,arrow=d>0?"\u25B2":d<0?"\u25BC":"\u2192";
      c.save();c.font="600 8.5px Inter,sans-serif";c.textAlign="left";c.textBaseline="middle";c.fillStyle=deltaColor(d);c.fillText(arrow+Math.abs(pct).toFixed(0)+"%",x+6,H/2);c.restore();}
      else if(pv===0){c.save();c.font="600 8.5px Inter,sans-serif";c.textAlign="left";c.textBaseline="middle";c.fillStyle=dark?"#4ade80":"#1e8a4a";c.fillText("\u25CF new",x+6,H/2);c.restore();}
    } else if(ai>0&&v===0){
      const pv=DATA[carr][WEEKS[ai-1]]||0;
      if(pv>0){c.save();c.font="600 8.5px Inter,sans-serif";c.textAlign="left";c.textBaseline="middle";c.fillStyle=dark?"#fc8181":"#c0392b";c.fillText("\u25BC gone",x+SEG_GAP+30,H/2);c.restore();}
    }
  }
}

// ── INFO CARD ──
function buildCardHTML(carr,week){
  const wi=WEEKS.indexOf(week);
  const v=DATA[carr][week]||0;
  const pw=prevWeek(week);const pv=pw?(DATA[carr][pw]||0):0;
  const col=dark?WCOL_D[wi]:WCOL_L[wi];
  const types=DETAIL[carr]||{};
  // Gather type spend for this week
  const typeWeek=[];
  for(const[t,wks]of Object.entries(types)){
    if(wks[week]&&wks[week].s>0)typeWeek.push([t,wks[week]]);
  }
  typeWeek.sort((a,b)=>b[1].s-a[1].s);
  const isPinned=pinnedCards.some(p=>p.carr===carr&&p.week===week);
  const weekTot=getWeekTotal(week);
  const sharePct=weekTot>0?((v/weekTot)*100).toFixed(1):"0";
  const shareHTML=`<div class="info-card-share">${sharePct}% of W${week} total (${fmtShort(weekTot)})</div>`;

  let deltaHtml="";
  if(pw){
    if(pv>0&&v>0){const d=v-pv,pct=(d/pv)*100;deltaHtml=`<div class="info-card-delta" style="color:${deltaColor(d)}">${d>0?"\u25B2":"\u25BC"} ${fmtDelta(d)} (${pct>=0?"+":""}${pct.toFixed(1)}%) vs W${pw}</div>`;}
    else if(v>0&&pv===0)deltaHtml=`<div class="info-card-delta" style="color:${dark?"#4ade80":"#1e8a4a"}">\u25CF New this week</div>`;
    else if(v===0&&pv>0)deltaHtml=`<div class="info-card-delta" style="color:${dark?"#fc8181":"#c0392b"}">\u25BC Gone (was ${fmtShort(pv)})</div>`;
  } else deltaHtml=`<div class="info-card-delta" style="color:var(--text-muted)">\u2014 Baseline week</div>`;

  let typeHTML="";
  if(typeWeek.length>0){
    const maxTS=typeWeek[0][1].s;
    const weekCol=dark?WCOL_D[wi]:WCOL_L[wi];
    // Extract RGB from hex for rgba tint
    const hr=parseInt(weekCol.slice(1,3),16),hg=parseInt(weekCol.slice(3,5),16),hb=parseInt(weekCol.slice(5,7),16);
    const barTint=`rgba(${hr},${hg},${hb},${dark?0.25:0.2})`;
    typeHTML=`<div class="info-card-divider"></div><div class="info-card-section-title">Accessorial Type Breakdown</div>`;
    for(const[t,d]of typeWeek.slice(0,8)){
      const barPct=maxTS>0?Math.max(4,(d.s/maxTS)*100):0;
      typeHTML+=`<div class="info-card-row"><span class="info-card-row-id">${t}</span><div style="flex:1;height:14px;position:relative;margin:0 6px;border-radius:3px;overflow:hidden"><div style="position:absolute;left:0;top:0;bottom:0;width:${barPct}%;background:${barTint};border-radius:3px"></div><span style="position:relative;z-index:1;font-size:9px;font-weight:700;color:var(--text-primary);padding-left:4px;line-height:14px">${fmtShort(d.s)}</span></div><span class="info-card-row-bills">${d.b} bill${d.b>1?"s":""}</span></div>`;
    }
    if(typeWeek.length>8)typeHTML+=`<div style="font-size:9px;color:var(--text-muted);padding-top:2px">+${typeWeek.length-8} more</div>`;
  }

  return`<div class="ic-handle ic-handle-tl" data-corner="tl"></div><div class="ic-handle ic-handle-tr" data-corner="tr"></div><div class="ic-handle ic-handle-bl" data-corner="bl"></div><div class="ic-handle ic-handle-br" data-corner="br"></div><div class="ic-handle ic-handle-t" data-corner="t"></div><div class="ic-handle ic-handle-b" data-corner="b"></div><div class="ic-handle ic-handle-l" data-corner="l"></div><div class="ic-handle ic-handle-r" data-corner="r"></div><div class="accent-bar" style="background:${col}${dark?";box-shadow:0 0 8px "+col:""}"></div><div class="info-card-inner"><div class="info-card-header"><span class="info-card-type">${carr} <span style="font-size:10px;font-weight:500;color:var(--text-muted)">${DATA[carr].name}</span></span><span class="info-card-week" style="background:${col};color:${dark?"#0d1117":"#fff"}">W${week}</span></div><div class="info-card-val">${fmtShort(v)}</div>${shareHTML}${deltaHtml}${typeHTML}${isPinned?'<div class="info-card-pin">\uD83D\uDCCC pinned</div>':''}</div>`;
}

function getCardPosition(carr){
  const chartEl=document.getElementById("chart-area");
  const chartH=chartEl.clientHeight;
  const cardEstH=280;
  const y=Math.max(10,Math.round((chartH-cardEstH)/2));
  return{y};
}

function renderCards(){
  document.querySelectorAll(".info-card:not(.pinned)").forEach(el=>el.remove());
  if(hovSeg&&!pinnedCards.some(p=>p.carr===hovSeg.carr&&p.week===WEEKS[hovSeg.wi])){
    const card=document.createElement("div");
    card.className="info-card hover-card";
    card.innerHTML=buildCardHTML(hovSeg.carr,WEEKS[hovSeg.wi]);
    const pos=getCardPosition(hovSeg.carr);
    const caR=document.getElementById("chart-area").getBoundingClientRect(),wgR=document.querySelector(".widget").getBoundingClientRect();
    card.style.right=(wgR.right-caR.right+80)+"px";card.style.top=(caR.top-wgR.top+pos.y)+"px";
    card.style.opacity="1";
    document.querySelector(".widget").appendChild(card);
  }
  document.querySelectorAll(".info-card.pinned").forEach(el=>el.remove());
  pinnedCards.forEach((p,i)=>{
    const el=document.createElement("div");
    el.className=`info-card pinned pin-${i}`;el.style.opacity="1";
    const caRect=document.getElementById("chart-area").getBoundingClientRect(),wgRect=document.querySelector(".widget").getBoundingClientRect();
    const caOffX=caRect.left-wgRect.left,caOffY=caRect.top-wgRect.top;
    el.style.left=(caOffX+(p.x||16+i*20))+"px";
    el.style.top=(caOffY+(p.y||50+i*30))+"px";
    if(p.w)el.style.width=p.w+"px";
    if(p.h){el.style.height=p.h+"px";el.style.overflow="auto";}
    document.querySelector(".widget").appendChild(el);
    el.innerHTML=buildCardHTML(p.carr,p.week);
    setupDrag(el,i);
  });
}

function createOverlay(cursor){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;cursor:'+cursor;
  document.body.appendChild(ov);return ov;
}
function setupDrag(el,idx){
  el.addEventListener("mousedown",e=>{
    const handle=e.target.closest('.ic-handle');
    const cr=el.getBoundingClientRect();
    e.preventDefault();
    if(handle){
      const corner=handle.dataset.corner;
      const sx=e.clientX,sy=e.clientY,sw=cr.width,sh=cr.height;
      const sl=parseInt(el.style.left)||0,st=parseInt(el.style.top)||0;
      const minW=180,minH=100,baseW=260,baseFontSize=14;
      const cursorMap={tl:'nwse-resize',tr:'nesw-resize',bl:'nesw-resize',br:'nwse-resize',t:'ns-resize',b:'ns-resize',l:'ew-resize',r:'ew-resize'};
      const ov=createOverlay(cursorMap[corner]||'nwse-resize');
      let raf=null;
      ov.addEventListener('mousemove',e2=>{
        if(raf)return;raf=requestAnimationFrame(()=>{raf=null;
          const dx=e2.clientX-sx,dy=e2.clientY-sy;let nw,nh;
          if(corner==='br'){el.style.width=Math.max(minW,sw+dx)+'px';el.style.height=Math.max(minH,sh+dy)+'px';}
          else if(corner==='bl'){nw=Math.max(minW,sw-dx);el.style.width=nw+'px';el.style.left=(sl+(sw-nw))+'px';el.style.height=Math.max(minH,sh+dy)+'px';}
          else if(corner==='tr'){el.style.width=Math.max(minW,sw+dx)+'px';nh=Math.max(minH,sh-dy);el.style.height=nh+'px';el.style.top=(st+(sh-nh))+'px';}
          else if(corner==='tl'){nw=Math.max(minW,sw-dx);nh=Math.max(minH,sh-dy);el.style.width=nw+'px';el.style.left=(sl+(sw-nw))+'px';el.style.height=nh+'px';el.style.top=(st+(sh-nh))+'px';}
          else if(corner==='r'){el.style.width=Math.max(minW,sw+dx)+'px';}
          else if(corner==='l'){nw=Math.max(minW,sw-dx);el.style.width=nw+'px';el.style.left=(sl+(sw-nw))+'px';}
          else if(corner==='b'){el.style.height=Math.max(minH,sh+dy)+'px';}
          else if(corner==='t'){nh=Math.max(minH,sh-dy);el.style.height=nh+'px';el.style.top=(st+(sh-nh))+'px';}
          el.style.overflow='auto';
          el.style.fontSize=Math.max(9,Math.min(22,(el.offsetWidth/baseW)*baseFontSize))+'px';
        });
      });
      ov.addEventListener('mouseup',()=>{ov.remove();pinnedCards[idx].w=el.offsetWidth;pinnedCards[idx].h=el.offsetHeight;},{once:true});
      return;
    }
    const ox=e.clientX,oy=e.clientY,sleft=parseInt(el.style.left)||0,stop=parseInt(el.style.top)||0;
    const ov=createOverlay('move');
    ov.addEventListener('mousemove',e2=>{
      el.style.left=(sleft+e2.clientX-ox)+'px';el.style.top=(stop+e2.clientY-oy)+'px';
    });
    ov.addEventListener('mouseup',()=>{ov.remove();const ca2=document.getElementById("chart-area").getBoundingClientRect(),wg2=document.querySelector(".widget").getBoundingClientRect();pinnedCards[idx].x=parseInt(el.style.left)-(ca2.left-wg2.left);pinnedCards[idx].y=parseInt(el.style.top)-(ca2.top-wg2.top);},{once:true});
  });
}

function pinSegment(carr,wi){
  const wk=WEEKS[wi];
  const exists=pinnedCards.findIndex(p=>p.carr===carr&&p.week===wk);
  if(exists>=0)pinnedCards.splice(exists,1);
  else pinnedCards.push({carr,week:wk,x:16+pinnedCards.length*20,y:50+pinnedCards.length*30});
  renderCards();redrawBars();
}

function render(){
  const carriers=getSorted();
  const scroll=document.getElementById("hm-scroll");
  const footer=document.getElementById("hm-footer");

  document.getElementById("total-header").textContent=viewWeek==="all"?"Total":"W"+viewWeek;

  let html="";
  carriers.forEach((carr,idx)=>{
    const total=getTotal(carr);
    const displayTotal=viewWeek==="all"?total:(DATA[carr][viewWeek]||0);
    let trendHtml="";
    if(viewWeek==="all"){
      const lv=DATA[carr][WEEKS[WEEKS.length-1]]||0,pv=DATA[carr][WEEKS[WEEKS.length-2]]||0;
      if(lv>0&&pv>0){const d=lv-pv;trendHtml=`<span style="font-size:8px;color:${deltaColor(d)};margin-left:3px">${d>=0?"\u25B2":"\u25BC"}</span>`;}
      else if(lv>0&&pv===0)trendHtml=`<span style="font-size:8px;color:${dark?"#4ade80":"#1e8a4a"};margin-left:3px">\u25CF</span>`;
      else if(lv===0&&pv>0)trendHtml=`<span style="font-size:8px;color:${dark?"#fc8181":"#c0392b"};margin-left:3px">\u25BC</span>`;
    }
    const label=`<span style="font-weight:700">${carr}</span> <span style="font-size:9px;color:var(--text-muted);margin-left:3px">${DATA[carr].name}</span>`;
    html+=`<div class="hm-row" data-carr="${carr}"><div class="hm-rank">${idx+1}</div><div class="hm-label">${label}</div><div class="hm-bar-cell"><canvas class="hm-bar-canvas" data-carr="${carr}"></canvas></div><div class="hm-total">${displayTotal>0?fmtShort(displayTotal):"\u2014"}${trendHtml}</div></div>`;
  });
  scroll.innerHTML=html;
  requestAnimationFrame(()=>{document.querySelectorAll(".hm-bar-canvas").forEach(cv=>drawBar(cv,cv.dataset.carr));});

  let footTotal=0;
  if(viewWeek==="all")for(const c of carriers)footTotal+=getTotal(c);
  else for(const c of carriers)footTotal+=(DATA[c][viewWeek]||0);
  const footMiddle=viewWeek==="all"?`${carriers.length} carriers \u00b7 ${WEEKS.length} weeks`:`${carriers.filter(c=>(DATA[c][viewWeek]||0)>0).length} active carriers`;
  footer.innerHTML=`<div class="hm-fcell">Total</div><div class="hm-fcell" style="padding-left:10px;font-size:9px;font-weight:600;color:var(--text-muted)">${footMiddle}</div><div class="hm-fcell">${fmt(footTotal)}</div>`;

  const legEl=document.getElementById("legend");
  legEl.innerHTML=WEEKS.map((w,i)=>`<span><span class="leg-swatch" style="background:${dark?WCOL_D[i]:WCOL_L[i]}"></span>W${w}</span>`).join("");

  ["all",...WEEKS].forEach(w=>{const id=w==="all"?"btn-all":"btn-"+w.replace("-","");const el=document.getElementById(id);if(el)el.classList.toggle("active",viewWeek===w);});
  document.querySelectorAll(".sort-btn").forEach(b=>{
    b.classList.toggle("active",b.dataset.sort===sortMode);
  });
  document.getElementById("reset-btn").classList.toggle("has-pins",pinnedCards.length>0);
  renderCards();
}

function redrawBars(){document.querySelectorAll(".hm-bar-canvas").forEach(cv=>drawBar(cv,cv.dataset.carr));}
function resetAll(){pinnedCards=[];hovSeg=null;hovRow=null;viewWeek="all";sortMode="total";document.querySelectorAll(".info-card").forEach(el=>el.remove());render();}
function setWeek(w){viewWeek=w;render();}
function setSort(m){if(m===sortMode)return;sortMode=m;render();}
function toggleDark(){dark=!dark;document.documentElement.setAttribute("data-theme",dark?"dark":"");render();}

// ── EVENTS — RAF throttle ──
let hovPending=false;
document.addEventListener("DOMContentLoaded",()=>{
  const scrollEl=document.getElementById("hm-scroll");

  scrollEl.addEventListener("mousemove",e=>{
    const row=e.target.closest(".hm-row");
    const carr=row?row.dataset.carr:null;
    let newSeg=null;
    if(carr&&row){
      const cv=row.querySelector(".hm-bar-canvas");
      if(cv&&cv._segs){
        const rect=cv.getBoundingClientRect();
        const mx=e.clientX-rect.left,my=e.clientY-rect.top;
        for(const seg of cv._segs){if(mx>=seg.x&&mx<=seg.x+seg.w&&my>=seg.y&&my<=seg.y+seg.h)newSeg={carr:seg.carr,wi:seg.wi};}
      }
    }
    const rowChanged=(carr!==hovRow);
    const segChanged=(!hovSeg&&newSeg)||(!newSeg&&hovSeg)||(hovSeg&&newSeg&&(hovSeg.carr!==newSeg.carr||hovSeg.wi!==newSeg.wi));
    if(rowChanged||segChanged){
      hovRow=carr;hovSeg=newSeg;
      if(!hovPending){hovPending=true;requestAnimationFrame(()=>{
        hovPending=false;
        scrollEl.querySelectorAll(".hm-row").forEach(r=>r.classList.toggle("magnified",hovRow!==null&&r.dataset.carr===hovRow));
        redrawBars();renderCards();
      });}
    }
  },{passive:true});

  scrollEl.addEventListener("mouseleave",()=>{
    hovSeg=null;hovRow=null;
    scrollEl.querySelectorAll(".hm-row").forEach(r=>r.classList.remove("magnified"));
    redrawBars();renderCards();
  });

  scrollEl.addEventListener("click",e=>{if(hovSeg)pinSegment(hovSeg.carr,hovSeg.wi);});
  scrollEl.addEventListener("dblclick",e=>{e.preventDefault();resetAll();});
});

let resizeTimer;window.addEventListener("resize",()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(render,100);});
render();
</script>
