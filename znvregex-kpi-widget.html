<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZNVREGEX KPI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f6f8;--surface:#fff;--surface2:#f9fafb;--border:#e3e7ed;
    --text-primary:#111827;--text-secondary:#4b5563;--text-muted:#9ca3af;
    --accent:#1a73e8;--accent-dim:#e8f0fd;--accent-text:#1a73e8;
    --green:#1e8a4a;--green-bg:#dcfce7;--red:#c0392b;--red-bg:#fee2e2;
    --toggle-bg:#d1d5db;--toggle-knob:#fff;
    --period-active-bg:#1a73e8;--period-active-text:#fff;--period-inactive:#6b7280;
    --shadow:0 1px 6px rgba(0,0,0,.08),0 4px 20px rgba(0,0,0,.04);
    --chart-bg:#f8fafc;--chart-border:#dce3eb;
    --spark-line:#1a73e8;--spark-area:rgba(26,115,232,.08);
  }
  [data-theme="dark"] {
    --bg:#0d1117;--surface:#161b27;--surface2:#1e2533;--border:#2e3a4e;
    --text-primary:#e8edf5;--text-secondary:#b0bdd0;--text-muted:#6b7f99;
    --accent:#4f93f5;--accent-dim:#1a2d50;--accent-text:#7db3f8;
    --green:#4ade80;--green-bg:#0c2b1c;--red:#fc8181;--red-bg:#2d1214;
    --toggle-bg:#2e3a4e;--toggle-knob:#e8edf5;
    --period-active-bg:#4f93f5;--period-active-text:#0d1117;--period-inactive:#94a3b8;
    --shadow:0 1px 8px rgba(0,0,0,.5);
    --chart-bg:#0f1520;--chart-border:#1e2a3a;
    --spark-line:#4f93f5;--spark-area:rgba(79,147,245,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%}
  body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text-primary);transition:background .25s,color .25s}
  .widget{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px 16px;width:100%;height:100%;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:background .25s,border-color .25s}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-shrink:0}
  .header-left{display:flex;flex-direction:column;gap:2px}
  .eyebrow{font-size:10.5px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted)}
  .title{font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em}
  .header-right{display:flex;align-items:center;gap:14px}
  .period-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}
  .period-btn{font-size:11.5px;font-weight:600;padding:5px 13px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--period-inactive);transition:all .16s;font-family:"Inter",sans-serif}
  .period-btn.active{background:var(--period-active-bg);color:var(--period-active-text);box-shadow:0 1px 5px rgba(26,115,232,.3)}
  .dm-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.6;transition:opacity .15s;user-select:none;padding:2px 4px}
  .dm-toggle:hover{opacity:1}
  .dm-icon{font-size:10px;color:var(--text-secondary);display:flex;align-items:center;width:12px;justify-content:center}
  .dm-track{width:28px;height:15px;background:var(--toggle-bg);border-radius:8px;position:relative;transition:background .2s;flex-shrink:0}
  .dm-knob{width:11px;height:11px;background:var(--toggle-knob);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  [data-theme="dark"] .dm-knob{transform:translateX(13px)}
  .divider{height:1px;background:var(--border);margin-bottom:16px;flex-shrink:0}
  .kpi-area{flex:1;min-height:0;background:var(--chart-bg);border:1px solid var(--chart-border);border-radius:8px;padding:16px;display:flex;align-items:center;transition:background .25s,border-color .25s}
  .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;width:100%}
  .kpi-card{
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    padding:14px 14px 12px;
    display:grid;
    grid-template-rows:16px minmax(28px,auto) 32px 56px 16px;
    row-gap:6px;
    position:relative;overflow:hidden;
    transition:background .25s,border-color .25s,transform .16s,box-shadow .16s;
  }
  .kpi-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
  .kpi-card::after{content:"";position:absolute;top:0;left:0;right:0;height:3px;opacity:.5;border-radius:10px 10px 0 0}
  .kpi-card.accent-blue::after{background:var(--accent)}
  .kpi-card.accent-green::after{background:var(--green)}
  .kpi-card.accent-red::after{background:var(--red)}
  .period-badge{display:inline-flex;align-items:center;font-size:9px;font-weight:600;letter-spacing:.07em;padding:0 6px;border-radius:4px;background:var(--accent-dim);color:var(--accent-text);text-transform:uppercase;align-self:center;justify-self:start;height:16px}
  .kpi-label{font-size:10.5px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.07em;line-height:1.35;align-self:start}
  .kpi-value{font-size:20px;font-weight:700;color:var(--text-primary);letter-spacing:-.03em;line-height:1;align-self:center;white-space:nowrap}
  .kpi-deltas{display:flex;flex-direction:column;justify-content:flex-start;gap:5px;align-self:start}
  .delta-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;border-radius:4px;padding:3px 6px;width:fit-content;line-height:1}
  .delta-pill.positive{color:var(--green);background:var(--green-bg)}
  .delta-pill.negative{color:var(--red);background:var(--red-bg)}
  .delta-pill.neutral{color:var(--text-muted);background:transparent}
  .delta-arrow{font-size:11px;line-height:1}
  .kpi-prev{font-size:10px;color:var(--text-secondary);font-weight:400;line-height:1;align-self:center}
  .kpi-prev span{font-weight:600;color:var(--text-primary);opacity:.85}
  .sparkline{position:absolute;bottom:0;left:0;right:0;height:40px;opacity:.55;pointer-events:none}
  @keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .animating .kpi-card{animation:fadeUp .2s ease both}
  .animating .kpi-card:nth-child(1){animation-delay:.00s}
  .animating .kpi-card:nth-child(2){animation-delay:.04s}
  .animating .kpi-card:nth-child(3){animation-delay:.07s}
  .animating .kpi-card:nth-child(4){animation-delay:.10s}
  .animating .kpi-card:nth-child(5){animation-delay:.13s}
</style>
</head>

    btn.textContent=p;
    c.appendChild(btn);
  });
})();

function getWindow(period){
  const n=DAILY.length;
  let days,priorDays;
  if(period==="30d"){days=30;priorDays=30;}
  else if(period==="90d"){days=90;priorDays=90;}
  else if(period==="YTD"){
    // YTD = 2026-01-01 onward
    const ytdStart=DAILY.findIndex(d=>d[0]>="2026-01-01");
    const curr=DAILY.slice(ytdStart);
    const priorLen=curr.length;
    const prior=DAILY.slice(Math.max(0,ytdStart-priorLen),ytdStart);
    return{curr,prior,label:"YTD 2026",priorLabel:"Same span prior"};
  }
  else{
    // All
    return{curr:DAILY,prior:null,label:"All Time",priorLabel:null};
  }
  const curr=DAILY.slice(n-days);
  const prior=DAILY.slice(Math.max(0,n-days*2),n-days);
  return{curr,prior,label:`Last ${days}d`,priorLabel:`Prior ${days}d`};
}

function calcStats(window){
  const mdse=window.reduce((s,d)=>s+d[1],0);
  const gp=window.reduce((s,d)=>s+d[2],0);
  const inv=window.reduce((s,d)=>s+d[3],0);
  const gpPct=mdse?((gp/mdse)*100):0;
  const negRate=window.reduce((s,d)=>s+d[5],0)/window.length;
  return{mdse,gp,gpPct,invCount:inv,negRate,days:window.length};
}

function fmtCurrency(v){
  const abs=Math.abs(v);
  if(abs>=1e6) return(v<0?"-":"")+"$"+(abs/1e6).toFixed(2)+"M";
  if(abs>=1e3) return(v<0?"-":"")+"$"+(abs/1e3).toFixed(1)+"K";
  return"$"+v.toFixed(2);
}
function fmtInt(v){return v.toLocaleString("en-US")}
function fmtPct(v){return v.toFixed(1)+"%"}

function deltaClass(v,invert){
  if(v===0)return"neutral";
  const good=invert?(v<0):(v>0);
  return good?"positive":"negative";
}
function deltaArrow(v){return v===0?"\u2192":v>0?"\u2191":"\u2193"}

function drawSparkline(canvas,values,color){
  const ctx=canvas.getContext("2d");
  const w=canvas.width=canvas.offsetWidth*2;
  const h=canvas.height=canvas.offsetHeight*2;
  ctx.clearRect(0,0,w,h);
  if(values.length<2)return;
  const min=Math.min(...values),max=Math.max(...values);
  const range=max-min||1;
  const pts=values.map((v,i)=>[i/(values.length-1)*w,(1-(v-min)/range)*h*.8+h*.1]);
  // Area
  ctx.beginPath();
  ctx.moveTo(pts[0][0],h);
  pts.forEach(p=>ctx.lineTo(p[0],p[1]));
  ctx.lineTo(pts[pts.length-1][0],h);
  ctx.closePath();
  const grad=ctx.createLinearGradient(0,0,0,h);
  const c=getComputedStyle(document.documentElement);
  grad.addColorStop(0,c.getPropertyValue("--spark-area").trim());
  grad.addColorStop(1,"transparent");
  ctx.fillStyle=grad;
  ctx.fill();
  // Line
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]));
  ctx.strokeStyle=c.getPropertyValue("--spark-line").trim();
  ctx.lineWidth=2;
  ctx.stroke();
}

const METRICS=[
  {key:"mdse",label:"Merchandise Total",fmt:fmtCurrency,accent:"accent-blue",sparkKey:1,invertDelta:false},
  {key:"gp",label:"Gross Profit",fmt:fmtCurrency,accent:"accent-green",sparkKey:2,invertDelta:false},
  {key:"gpPct",label:"Gross Profit %",fmt:fmtPct,accent:"accent-blue",sparkKey:4,invertDelta:false},
  {key:"invCount",label:"Invoice Count",fmt:fmtInt,accent:"accent-blue",sparkKey:3,invertDelta:false},
  {key:"negRate",label:"Negative Margin Rate",fmt:fmtPct,accent:"accent-red",sparkKey:5,invertDelta:true}
];

function render(){
  const grid=document.getElementById("kpi-grid");
  const win=getWindow(currentPeriod);
  const curr=calcStats(win.curr);
  const prev=win.prior?calcStats(win.prior):null;

  grid.innerHTML="";grid.classList.remove("animating");void grid.offsetWidth;grid.classList.add("animating");

  METRICS.forEach(m=>{
    const v=curr[m.key];
    const card=document.createElement("div");
    card.className="kpi-card "+m.accent;

    let dH,pH;
    if(prev){
      const pv=prev[m.key];
      const rd=v-pv;
      const pct=pv!==0?((rd/Math.abs(pv))*100):0;
      const cls=rd===0?"neutral":deltaClass(rd,m.invertDelta);
      const arr=deltaArrow(rd);
      const fmtDelta=m.key==="gpPct"||m.key==="negRate"?
        (rd>=0?"+":"\u2212")+Math.abs(rd).toFixed(1)+"pp":
        m.fmt(Math.abs(rd));
      dH=`<div class="kpi-deltas"><div class="delta-pill ${cls}"><span class="delta-arrow">${arr}</span><span>${rd>=0?"+":"\u2212"}${m.key==="gpPct"||m.key==="negRate"?Math.abs(rd).toFixed(1)+"pp":m.fmt(Math.abs(rd))}</span></div><div class="delta-pill ${cls}"><span class="delta-arrow">${arr}</span><span>${pct>=0?"+":""}${pct.toFixed(1)}%</span></div></div>`;
      pH=`<div class="kpi-prev">${win.priorLabel}: <span>${m.fmt(pv)}</span></div>`;
    }else{
      dH=`<div class="kpi-deltas"><div class="delta-pill neutral"><span>\u2014</span></div></div>`;
      pH=`<div class="kpi-prev">372 days &middot; <span>2025-03 \u2192 2026-04</span></div>`;
    }

    const sparkId="spark-"+m.key;
    card.innerHTML=`<span class="period-badge">${win.label}</span><div class="kpi-label">${m.label}</div><div class="kpi-value">${m.fmt(v)}</div>${dH}${pH}<canvas class="sparkline" id="${sparkId}"></canvas>`;
    grid.appendChild(card);
  });

  // Draw sparklines from monthly data
  requestAnimationFrame(()=>{
    METRICS.forEach(m=>{
      const canvas=document.getElementById("spark-"+m.key);
      if(!canvas)return;
      const vals=MONTHLY.map(row=>m.sparkKey===4?row[5]:row[m.sparkKey]);
      // negRate not in monthly, use GP% inverted feel
      if(m.key==="negRate"){
        // Use daily data sampled for sparkline
        const step=Math.max(1,Math.floor(DAILY.length/50));
        const sampled=[];
        for(let i=0;i<DAILY.length;i+=step)sampled.push(DAILY[i][5]);
        drawSparkline(canvas,sampled);
      }else{
        drawSparkline(canvas,vals);
      }
    });
  });

  // Update period buttons
  document.querySelectorAll(".period-btn").forEach(btn=>{
    btn.classList.toggle("active",btn.textContent===currentPeriod);
  });
}

function setPeriod(p){currentPeriod=p;render();}
function toggleDark(){dark=!dark;document.documentElement.setAttribute("data-theme",dark?"dark":"");requestAnimationFrame(()=>render());}
render();
</script>
</body>
