<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shipment Profile by Service Level — Bubble</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6f8;--surface:#fff;--surface2:#f9fafb;
  --border:#e3e7ed;--text-primary:#111827;--text-secondary:#4b5563;--text-muted:#9ca3af;
  --green:#1e8a4a;--green-bg:#dcfce7;--red:#c0392b;--red-bg:#fee2e2;
  --toggle-bg:#d1d5db;--toggle-knob:#fff;
  --week-active-bg:#1a73e8;--week-active-text:#fff;--week-inactive:#6b7280;
  --shadow:0 1px 6px rgba(0,0,0,.08),0 4px 20px rgba(0,0,0,.04);
  --chart-bg:#f8fafc;--chart-border:#dce3eb;
}
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b27;--surface2:#1e2533;
  --border:#2e3a4e;--text-primary:#e8edf5;--text-secondary:#b0bdd0;--text-muted:#6b7f99;
  --green:#4ade80;--green-bg:#0c2b1c;--red:#fc8181;--red-bg:#2d1214;
  --toggle-bg:#2e3a4e;--toggle-knob:#e8edf5;
  --week-active-bg:#4f93f5;--week-active-text:#0d1117;--week-inactive:#94a3b8;
  --shadow:0 1px 8px rgba(0,0,0,.5);
  --chart-bg:#0f1520;--chart-border:#1e2a3a;
}
[data-theme="dark"] .dm-knob{transform:translateX(13px)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-primary)}
.widget{height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative}
.header{padding:16px 20px 10px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between}
.header-left{display:flex;flex-direction:column;gap:2px}
.header-right{display:flex;align-items:center;gap:10px;padding-top:2px}
.eyebrow{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
.title{font-size:18px;font-weight:800;color:var(--text-primary);line-height:1.2}
.subtitle{font-size:11px;color:var(--text-muted);font-weight:500;margin-top:2px}
.controls{display:flex;align-items:center;justify-content:space-between;padding:0 20px 10px;flex-shrink:0}
.ctrl-left,.ctrl-right{display:flex;align-items:center;gap:6px}
.carrier-btn,.week-btn{font-size:11.5px;font-weight:600;padding:5px 13px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--week-inactive);transition:all .16s;font-family:'Inter',sans-serif}
.carrier-btn:hover,.week-btn:hover{color:var(--text-primary)}
.carrier-btn.active,.week-btn.active{background:var(--week-active-bg);color:var(--week-active-text);box-shadow:0 1px 5px rgba(26,115,232,.3)}
.reset-btn{height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;padding:0 10px;transition:all .16s}
.reset-btn:hover{color:var(--text-primary);border-color:var(--text-muted)}
.reset-btn.has-pins{opacity:1;color:var(--red);border-color:var(--red);background:var(--red-bg)}
.dm-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.6;transition:opacity .15s;user-select:none;padding:2px 4px}
.dm-toggle:hover{opacity:1}
.dm-icon{font-size:10px;color:var(--text-secondary);display:flex;align-items:center;width:12px;justify-content:center}
.dm-track{width:28px;height:15px;background:var(--toggle-bg);border-radius:8px;position:relative;transition:background .2s;flex-shrink:0}
.dm-knob{width:11px;height:11px;background:var(--toggle-knob);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.chart-area{flex:1;margin:0 20px 16px;padding:16px;background:var(--chart-bg);border:1px solid var(--chart-border);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;min-height:0;position:relative}
.summary-row{display:flex;gap:12px;margin-bottom:12px;flex-shrink:0}
.stat-card{flex:1;padding:8px 12px;border-radius:6px;background:var(--surface);border:1px solid var(--chart-border)}
.stat-label{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)}
.stat-value{font-size:18px;font-weight:800;line-height:1.3}
.stat-sub{font-size:10px;font-weight:600;color:var(--text-muted);margin-top:1px}
.bubble-wrap{flex:1;position:relative;min-height:0;overflow:visible}
.bubble-canvas{width:100%;height:100%;display:block}
.legend{display:flex;gap:14px;align-items:center;justify-content:flex-end;margin-bottom:8px;flex-shrink:0}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:50%}
.legend-label{font-size:10px;font-weight:600;color:var(--text-muted)}
.axis-label{position:absolute;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);pointer-events:none}
.axis-label-x{bottom:2px;left:50%;transform:translateX(-50%)}
.axis-label-y{top:50%;left:-2px;transform:rotate(-90deg) translateX(-50%);transform-origin:0 0;white-space:nowrap}
.info-card{position:absolute;width:280px;min-height:60px;background:var(--surface);border:1px solid var(--chart-border);border-radius:8px;padding:0;box-shadow:var(--shadow);z-index:20;opacity:0;pointer-events:none;transition:opacity .15s;overflow:visible;min-width:180px;max-width:500px;font-size:11px}
.info-card.visible{opacity:1;pointer-events:none}
.info-card.pinned{opacity:1;border-color:var(--week-active-bg);box-shadow:0 0 0 1px var(--week-active-bg),var(--shadow);cursor:move;pointer-events:auto}
.info-card-inner{overflow-y:auto;max-height:100%;border-radius:8px}
.ic-accent{position:absolute;top:0;left:0;bottom:0;width:4px;border-radius:8px 0 0 8px}
.ic-handle{position:absolute;z-index:25}
.ic-handle-tl{top:-3px;left:-3px;width:12px;height:12px;cursor:nwse-resize}
.ic-handle-tr{top:-3px;right:-3px;width:12px;height:12px;cursor:nesw-resize}
.ic-handle-bl{bottom:-3px;left:-3px;width:12px;height:12px;cursor:nesw-resize}
.ic-handle-br{bottom:-3px;right:-3px;width:12px;height:12px;cursor:nwse-resize}
.ic-handle-t{top:-3px;left:12px;right:12px;height:6px;cursor:ns-resize}
.ic-handle-b{bottom:-3px;left:12px;right:12px;height:6px;cursor:ns-resize}
.ic-handle-l{left:-3px;top:12px;bottom:12px;width:6px;cursor:ew-resize}
.ic-handle-r{right:-3px;top:12px;bottom:12px;width:6px;cursor:ew-resize}
.info-card-header{display:flex;align-items:center;justify-content:space-between;padding:.7em .9em .5em;user-select:none;border-bottom:1px solid var(--chart-border)}
.info-card-title{font-size:.9em;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)}
.info-card-pin{font-size:.7em;opacity:0.5;font-weight:600;color:var(--text-muted)}
.info-card-body{padding:.5em .9em .9em;overflow-y:auto}
.ic-grid{display:grid;grid-template-columns:auto 1fr auto;gap:0;align-items:baseline}
.ic-week-block{display:contents}
.ic-week-block+.ic-week-block .ic-wk,.ic-week-block+.ic-week-block .ic-val,.ic-week-block+.ic-week-block .ic-delta{border-top:1px solid var(--chart-border);padding-top:.5em;margin-top:.3em}
.ic-wk{font-size:.85em;font-weight:700;color:var(--text-primary);padding:.15em 0;white-space:nowrap}
.ic-val{font-size:1em;font-weight:700;color:var(--text-primary);text-align:right;padding:.15em .4em .15em 1em;white-space:nowrap}
.ic-delta{font-size:.78em;font-weight:700;text-align:right;padding:.15em 0;white-space:nowrap;min-width:4.5em}
.ic-detail-row{display:contents}
.ic-detail-label{font-size:.78em;color:var(--text-muted);padding:.1em 0 .1em 1.2em}
.ic-detail-val{font-size:.78em;font-weight:600;color:var(--text-secondary);text-align:right;padding:.1em .4em .1em 1em;white-space:nowrap}
.ic-detail-spacer{}
.ic-total-sep{grid-column:1/-1;height:0;border-top:1.5px solid var(--chart-border);margin-top:.45em}
.ic-total-label{font-size:.9em;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);padding:.45em 0 .2em}
.ic-total-val{font-size:1.1em;font-weight:800;text-align:right;padding:.45em .4em .2em 1em;white-space:nowrap}
.ic-total-spacer{}
.ic-note{font-size:.72em;color:var(--text-muted);font-style:italic;padding:.4em 0 0;grid-column:1/-1}
@keyframes flashIn{0%{opacity:.55}100%{opacity:0}}
.flash-overlay{position:absolute;inset:0;background:#fff;pointer-events:none;opacity:0;border-radius:inherit;z-index:10}
[data-theme="dark"] .flash-overlay{background:#e8edf5}
.flash-overlay.active{animation:flashIn .4s ease-out forwards}
</style>
</head>

<div class="widget">
  <div class="header">

  </div>
</div>
