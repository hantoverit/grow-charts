<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer MDSE Treemap</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f8;--surface:#fff;--surface2:#f9fafb;--border:#e3e7ed;--text-primary:#111827;--text-secondary:#4b5563;--text-muted:#9ca3af;--green:#1e8a4a;--green-bg:#dcfce7;--red:#c0392b;--red-bg:#fee2e2;--toggle-bg:#d1d5db;--toggle-knob:#fff;--shadow:0 1px 6px rgba(0,0,0,.08),0 4px 20px rgba(0,0,0,.04);--chart-bg:#f8fafc;--chart-border:#dce3eb;--week-active-bg:#1a73e8;--week-active-text:#fff;--accent:#1a73e8;--accent-glow:rgba(26,115,232,.3)}
[data-theme="dark"]{--bg:#0d1117;--surface:#161b27;--surface2:#1e2533;--border:#2e3a4e;--text-primary:#e8edf5;--text-secondary:#b0bdd0;--text-muted:#6b7f99;--green:#4ade80;--green-bg:#0c2b1c;--red:#fc8181;--red-bg:#2d1214;--toggle-bg:#2e3a4e;--toggle-knob:#e8edf5;--shadow:0 1px 8px rgba(0,0,0,.5);--chart-bg:#0f1520;--chart-border:#1e2a3a;--week-active-bg:#4f93f5;--week-active-text:#0d1117;--accent:#4f93f5;--accent-glow:rgba(79,147,245,.4)}
*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text-primary);transition:background .25s,color .25s}
.widget{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px 16px;width:100%;height:100%;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:background .25s,border-color .25s;position:relative;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-shrink:0;flex-wrap:wrap;gap:4px}
.header-left{display:flex;flex-direction:column;gap:2px}
.eyebrow{font-size:10.5px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted)}
.title{font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em}
.header-right{display:flex;align-items:center;gap:10px}
.stats{display:flex;gap:12px;font-size:10px;color:var(--text-secondary)}
.stat-val{font-weight:700;color:var(--text-primary);font-size:11px}
.dm-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.6;transition:opacity .15s;user-select:none;padding:2px 4px}
.dm-toggle:hover{opacity:1}
.dm-icon{font-size:10px;color:var(--text-secondary);display:flex;align-items:center;width:12px;justify-content:center}
.dm-track{width:28px;height:15px;background:var(--toggle-bg);border-radius:8px;position:relative;transition:background .2s;flex-shrink:0}
.dm-knob{width:11px;height:11px;background:var(--toggle-knob);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
[data-theme="dark"] .dm-knob{transform:translateX(13px)}
.controls-row{display:flex;align-items:center;gap:6px;margin-top:6px;margin-bottom:2px;flex-shrink:0;flex-wrap:wrap}
.ctrl-left{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.dropdown-wrap{position:relative}
.dropdown-btn{font:600 10px Inter,sans-serif;padding:4px 9px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text-secondary);cursor:pointer;transition:all .15s;white-space:nowrap}
.dropdown-btn:hover{border-color:var(--text-muted);color:var(--text-primary)}
.dropdown-menu{position:absolute;top:calc(100% + 3px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:7px;box-shadow:var(--shadow);z-index:200;min-width:150px;padding:3px;display:none;max-height:280px;overflow-y:auto}
.dropdown-menu.open{display:block}
.dd-item{font:500 10.5px Inter,sans-serif;padding:5px 10px;border-radius:4px;cursor:pointer;color:var(--text-secondary);transition:all .1s;white-space:nowrap}
.dd-item:hover{background:var(--surface2);color:var(--text-primary)}
.dd-item.active{background:var(--accent);color:var(--week-active-text);font-weight:600}
.dd-sep{height:1px;background:var(--border);margin:3px 6px}
.dd-head{font:600 8.5px Inter,sans-serif;padding:4px 10px 2px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.reset-btn{height:24px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;color:var(--text-muted);font:600 10px Inter,sans-serif;padding:0 8px;transition:all .16s;opacity:.7}
.reset-btn:hover{opacity:1;border-color:var(--text-muted);color:var(--text-primary)}
.export-btn{height:24px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font:600 10px Inter,sans-serif;padding:0 8px;transition:all .16s;opacity:.7}
.export-btn:hover{opacity:1;border-color:var(--text-muted);color:var(--text-primary)}
.slider-wrap{flex:1;display:flex;align-items:center;gap:5px;min-width:100px}
.slider-label{font:600 8.5px Inter,sans-serif;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.slider-container{flex:1;position:relative;height:24px;cursor:pointer;user-select:none}
.slider-track{position:absolute;top:50%;left:0;right:0;height:7px;transform:translateY(-50%);border-radius:4px;overflow:hidden}
.slider-track-bg{width:100%;height:100%;border-radius:4px}
.slider-fill{position:absolute;top:0;height:100%}
.slider-thumb{position:absolute;top:50%;width:13px;height:13px;border-radius:50%;transform:translate(-50%,-50%);cursor:ew-resize;transition:box-shadow .15s;z-index:10}
.slider-thumb:hover,.slider-thumb.active{box-shadow:0 0 0 4px var(--accent-glow)}
.slider-val{font:700 9px Inter,sans-serif;color:var(--text-primary);min-width:28px;text-align:center}
.search-wrap{position:relative;display:flex;align-items:center}
.search-input{font:500 10px Inter,sans-serif;padding:4px 8px 4px 22px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text-primary);width:120px;outline:none;transition:all .15s}
.search-input:focus{border-color:var(--accent);width:160px}
.search-input::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;left:6px;font-size:10px;color:var(--text-muted);pointer-events:none}
.divider{height:1px;background:var(--border);margin:6px 0;flex-shrink:0}
.treemap-wrap{position:relative;width:100%;flex:1;min-height:0;border-radius:8px;overflow:hidden;border:1px solid var(--chart-border);background:var(--chart-bg)}
canvas{display:block;width:100%;height:100%}
.info-card{position:absolute;z-index:50;border-radius:10px;overflow:visible;pointer-events:auto;cursor:move;transition:opacity .15s;display:none}
.info-card.visible{display:block}
.info-card.hover-card{z-index:45;pointer-events:none;cursor:default}
.info-card.pinned{z-index:55;cursor:move;pointer-events:auto}
.ic-inner{padding:0;overflow:hidden;border-radius:10px;width:100%;height:100%;display:flex;flex-direction:column}
.ic-accent{position:absolute;top:0;left:0;bottom:0;width:5px;border-radius:10px 0 0 10px}
.ic-content{padding:12px 12px 10px 18px;flex:1;display:flex;flex-direction:column;overflow:hidden}
.ic-handle{position:absolute;z-index:55}
.ic-handle-tl{top:-3px;left:-3px;width:12px;height:12px;cursor:nwse-resize}
.ic-handle-tr{top:-3px;right:-3px;width:12px;height:12px;cursor:nesw-resize}
.ic-handle-bl{bottom:-3px;left:-3px;width:12px;height:12px;cursor:nesw-resize}
.ic-handle-br{bottom:-3px;right:-3px;width:12px;height:12px;cursor:nwse-resize}
.ic-handle-t{top:-3px;left:12px;right:12px;height:6px;cursor:ns-resize}
.ic-handle-b{bottom:-3px;left:12px;right:12px;height:6px;cursor:ns-resize}
.ic-handle-l{left:-3px;top:12px;bottom:12px;width:6px;cursor:ew-resize}
.ic-handle-r{right:-3px;top:12px;bottom:12px;width:6px;cursor:ew-resize}
</style>
</head>

</div>
<div class="search-wrap"><span class="search-icon">⌕</span><input class="search-input" id="search" type="text" placeholder="Search customer..." /></div>
<div class="slider-wrap">

</div>

</div>
</div>

// ── GP% COLOR ──
function gpHue(gp){
  if(gp<=-50)return 0;
  if(gp<=0)return Math.min(48,(gp+50)/50*48);
  return 48+Math.min(92,gp/20*92);
}
function gpColor(gp,alpha){
  const a=alpha||1,h=gpHue(gp);
  if(isDark()){
    const s=gp<-30?90:gp<-10?85:gp<5?80:gp<15?75:70;
    const l=gp<-30?60:gp<-10?58:gp<5?55:gp<15?52:50;
    return `hsla(${h},${s}%,${l}%,${a})`;
  }
  const s=gp<-10?78:gp<5?72:65;
  const l=gp<-10?46:gp<5?44:gp<15?42:40;
  return `hsla(${h},${s}%,${l}%,${a})`;
}
function gpGlow(gp){return `hsla(${gpHue(gp)},95%,65%,0.55)`}

// ── SQUARIFY ──
function squarify(items,x,y,w,h){
  if(!items.length)return[];
  const rects=[];let remaining=[...items],cx=x,cy=y,cw=w,ch=h;
  while(remaining.length){
    const short=Math.min(cw,ch);
    const remTotal=remaining.reduce((s,it)=>s+it.value,0);
    let row=[remaining[0]],bestRatio=Infinity;
    for(let i=1;i<remaining.length;i++){
      const test=[...row,remaining[i]];
      const testArea=test.reduce((s,it)=>s+it.value,0)/remTotal*(cw*ch);
      const worst=worstRatio(test,testArea,short);
      if(worst>bestRatio)break;
      bestRatio=worst;row=test;
    }
    const rowArea=row.reduce((s,it)=>s+it.value,0)/remTotal*(cw*ch);
    if(bestRatio===Infinity)worstRatio(row,rowArea,short);
    const horiz=cw>=ch;
    let offset=horiz?cy:cx;
    const span=horiz?(cw>0?rowArea/cw:0):(ch>0?rowArea/ch:0);
    const rowSum=row.reduce((s,r)=>s+r.value,0);
    for(const it of row){
      const frac=rowSum>0?it.value/rowSum:0;
      const len=(horiz?ch:cw)*frac;
      if(horiz)rects.push({...it,x:cx,y:offset,w:span,h:len});
      else rects.push({...it,x:offset,y:cy,w:len,h:span});
      offset+=len;
    }
    if(horiz){cx+=span;cw-=span}else{cy+=span;ch-=span}
    remaining=remaining.slice(row.length);
  }
  return rects;
}
function worstRatio(row,area,short){
  if(area<=0||short<=0)return Infinity;
  const s2=short*short;let worst=0;
  const rowSum=row.reduce((s,it)=>s+it.value,0);
  for(const it of row){
    const frac=rowSum>0?it.value/rowSum:0;
    const r=area*frac;if(r<=0)continue;
    const ratio=Math.max(s2*r/(area*area),(area*area)/(s2*r));
    worst=Math.max(worst,ratio);
  }
  return worst;
}

// ── BUILD ITEMS ──
function buildItems(){
  const RAW=buildRAW(selectedMonths);
  let data=RAW.filter(r=>r[2]>0);
  if(filter==='nocargill')data=data.filter(r=>!r[1].includes('CARGILL'));
  else if(filter==='cargillonly')data=data.filter(r=>r[1].includes('CARGILL'));
  else if(filter==='top50')data=[...data].sort((a,b)=>b[2]-a[2]).slice(0,50);
  else if(filter==='top100')data=[...data].sort((a,b)=>b[2]-a[2]).slice(0,100);
  else if(filter==='top250')data=[...data].sort((a,b)=>b[2]-a[2]).slice(0,250);
  return data.map(r=>{
    let raw;
    if(sizeBy==='mdse')raw=r[2];else if(sizeBy==='gp')raw=Math.abs(r[3]);
    else if(sizeBy==='inv')raw=r[5];else raw=r[6];
    if(raw<=0)raw=0.001;
    let val;
    if(compress==='cbrt')val=Math.cbrt(raw);else if(compress==='log')val=Math.log(raw+1);else val=raw;
    const loOpen=sliderLo<=SLIDER_MIN,hiOpen=sliderHi>=SLIDER_MAX;
    const inR=(loOpen||r[4]>=sliderLo)&&(hiOpen||r[4]<=sliderHi);
    const searchHit=!searchTerm||r[0].toUpperCase().includes(searchTerm)||r[1].toUpperCase().includes(searchTerm);
    return{id:String(r[0]),name:r[1],mdse:r[2],gp:r[3],gpPct:r[4],inv:r[5],dates:r[6],value:val,inRange:inR&&searchHit};
  }).sort((a,b)=>b.value-a.value);
}

// ── STATS ──
function updateStats(items){
  const total=items.reduce((s,it)=>s+it.mdse,0);
  const totalGP=items.reduce((s,it)=>s+it.gp,0);
  const gpPct=total>0?(totalGP/total*100):0;
  document.getElementById('st-cust').textContent=items.length.toLocaleString();
  document.getElementById('st-mdse').textContent=total>=1e6?'$'+(total/1e6).toFixed(1)+'M':'$'+(total/1e3).toFixed(0)+'K';
  document.getElementById('st-gp').textContent=gpPct.toFixed(1)+'%';
}

// ── CANVAS DRAW ──
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');

function draw(timestamp){
  const wrap=document.getElementById('wrap');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  if(!W||!H)return;
  const DPR=window.devicePixelRatio||1;
  if(cv._lw!==W||cv._lh!==H){
    cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);
    cv.style.width=W+'px';cv.style.height=H+'px';
    cv._lw=W;cv._lh=H;
  }
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  const items=buildItems();
  updateStats(items);
  const GAP=1.5;
  tiles=squarify(items,GAP,GAP,W-GAP*2,H-GAP*2);
  for(const t of tiles)t.y=H-t.y-t.h;
  for(const t of tiles){if(t.w<5)t.w=5;if(t.h<5)t.h=5;}

  let flashAlphas=null;
  if(isFlashing&&timestamp){
    const elapsed=timestamp-flashStart,dur=700;
    if(elapsed<dur){
      flashAlphas=[];
      for(let i=0;i<tiles.length;i++){
        const stagger=Math.min(1,(i/tiles.length)*1.5),t0=stagger*150;
        const lt=Math.max(0,elapsed-t0),progress=Math.min(1,lt/(dur-t0));
        let fa=progress<0.3?0.55*(progress/0.3):0.55*(1-(progress-0.3)/0.7);
        flashAlphas.push(Math.max(0,fa));
      }
      requestAnimationFrame(draw);
    }else{isFlashing=false}
  }

  const pinnedSet=new Set(pinnedCards.map(p=>p.custId));
  const dk=isDark();
  for(let i=0;i<tiles.length;i++){
    const t=tiles[i];
    const isPinCust=pinnedSet.has(t.id);
    const isHov=i===hovIdx||isPinCust;
    const inRange=t.inRange;
    const tw=Math.max(0,t.w-GAP),th=Math.max(0,t.h-GAP);
    const tx=t.x+GAP/2,ty=t.y+GAP/2;

    ctx.fillStyle=gpColor(t.gpPct);
    ctx.globalAlpha=inRange?(isHov?1:0.88):(isHov?0.35:0.12);
    ctx.fillRect(tx,ty,tw,th);

    if(inRange&&tw>1&&th>1){
      ctx.globalAlpha=dk?0.25:0.18;
      ctx.strokeStyle=dk?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.15)';
      ctx.lineWidth=0.5;
      ctx.strokeRect(tx,ty,tw,th);
    }

    if(isHov&&dk&&inRange){
      ctx.shadowColor=gpGlow(t.gpPct);ctx.shadowBlur=12;
      ctx.fillStyle=gpColor(t.gpPct,0.15);ctx.fillRect(tx,ty,tw,th);ctx.shadowBlur=0;
    }

    if(flashAlphas&&flashAlphas[i]>0){
      ctx.globalAlpha=flashAlphas[i];
      ctx.fillStyle=dk?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.3)';
      ctx.fillRect(tx,ty,tw,th);
    }
    ctx.globalAlpha=1;

    if(inRange&&tw>32&&th>14){
      const fs=Math.min(14,Math.max(8,Math.floor(Math.min(tw,th)*0.22)));
      const maxW=tw-6,lx=tx+3,ly=ty+3;
      ctx.font=`600 ${fs}px Inter,sans-serif`;
      ctx.fillStyle=dk?'rgba(255,255,255,0.92)':'rgba(0,0,0,0.85)';
      ctx.textAlign='left';ctx.textBaseline='top';
      ctx.fillText(t.id,lx,ly,maxW);
      if(th>26){
        const nfs=Math.max(7,fs-2);
        ctx.font=`500 ${nfs}px Inter,sans-serif`;
        ctx.fillStyle=dk?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.5)';
        const mc=Math.floor(maxW/(nfs*0.55));
        const nm=t.name.length>mc?t.name.substring(0,mc)+'…':t.name;
        ctx.fillText(nm,lx,ly+fs+2,maxW);
      }
      if(th>42&&tw>50){
        const vfs=Math.max(7.5,fs-1);
        ctx.font=`700 ${vfs}px Inter,sans-serif`;
        ctx.fillStyle=dk?'rgba(255,255,255,0.8)':'rgba(0,0,0,0.7)';
        const ms=t.mdse>=1e6?'$'+(t.mdse/1e6).toFixed(1)+'M':t.mdse>=1e3?'$'+(t.mdse/1e3).toFixed(0)+'K':'$'+t.mdse.toFixed(0);
        ctx.fillText(ms+' · '+t.gpPct.toFixed(1)+'%',lx,ty+th-vfs-4,maxW);
      }
    }

    if(isHov){
      ctx.strokeStyle=dk?(inRange?'#e8edf5':'rgba(232,237,245,0.4)'):(inRange?'#111827':'rgba(17,24,39,0.3)');
      ctx.lineWidth=inRange?2:1.5;ctx.strokeRect(tx,ty,tw,th);
    }
  }
}

function valFromPct(p){return SLIDER_MIN+(SLIDER_MAX-SLIDER_MIN)*p/100}

function sliderDown(e){
  e.preventDefault();const which=e.target.dataset.which;if(!which)return;
  activeThumb=which;e.target.classList.add('active');
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;cursor:ew-resize';
  document.body.appendChild(ov);const rect=sliderEl.getBoundingClientRect();let rafP=false;
  function move(e2){
    const x=Math.max(0,Math.min(1,(e2.clientX-rect.left)/rect.width));
    const v=Math.round(valFromPct(x*100));
    if(which==='lo')sliderLo=Math.min(v,sliderHi-1);else sliderHi=Math.max(v,sliderLo+1);
    updateSliderVisuals();if(!rafP){rafP=true;requestAnimationFrame(()=>{rafP=false;draw()})}
  }
  ov.addEventListener('mousemove',move);
  ov.addEventListener('mouseup',()=>{ov.remove();activeThumb=null;slThumbLo.classList.remove('active');slThumbHi.classList.remove('active')},{once:true});
}

  el.style.background=dk?'rgba(22,27,39,0.97)':'rgba(255,255,255,0.97)';
  el.style.border=`1px solid ${dk?color:'var(--border)'}`;
  el.style.boxShadow=dk?`0 0 16px ${glow}, 0 4px 24px rgba(0,0,0,.5)`:'0 4px 20px rgba(0,0,0,.12)';
}

let hoverCardEl=null,hoverCardCustId=null;
function showHoverCard(t){
  if(isPinnedId(t.id)){rmHover();return}
  if(hoverCardCustId===t.id)return;
  rmHover();hoverCardCustId=t.id;
  const el=document.createElement('div');
  el.className='info-card visible hover-card';el.innerHTML=buildCardHTML(t);
  styleCard(el,t);const p=cardPosForTile(t);
  el.style.left=p.x+'px';el.style.top=p.y+'px';el.style.width='240px';el.style.height='auto';el.style.pointerEvents='none';
  document.getElementById('widget').appendChild(el);scaleCardText(el);hoverCardEl=el;
}
function rmHover(){if(hoverCardEl){hoverCardEl.remove();hoverCardEl=null;hoverCardCustId=null}document.querySelectorAll('.info-card.hover-card').forEach(e=>e.remove())}

function togglePin(custId){
  const ex=pinnedCards.findIndex(p=>p.custId===custId);
  if(ex>=0)pinnedCards.splice(ex,1);
  else{const ti=tileIdxForCust(custId);const t=ti>=0?tiles[ti]:null;const p=t?cardPosForTile(t):{x:20,y:50};pinnedCards.push({custId,x:p.x,y:p.y})}
  rmHover();renderPins();updReset();draw();
}

function renderPins(){
  document.querySelectorAll('.info-card.pinned').forEach(e=>e.remove());
  pinnedCards.forEach((p,idx)=>{
    const ti=tileIdxForCust(p.custId);const t=ti>=0?tiles[ti]:null;if(!t)return;
    const el=document.createElement('div');el.className='info-card visible pinned';
    el.innerHTML=buildCardHTML(t);styleCard(el,t);
    el.style.left=(p.x||20)+'px';el.style.top=(p.y||50)+'px';el.style.width=(p.w||240)+'px';
    if(p.h){el.style.height=p.h+'px';el.style.overflow='auto'}else el.style.height='auto';
    if(p.fs)el.style.fontSize=p.fs+'px';el.style.cursor='move';
    document.getElementById('widget').appendChild(el);setupDrag(el,idx);scaleCardText(el);
  });
}

function setupDrag(el,idx){
  el.addEventListener('mousedown',e=>{
    const cr=el.getBoundingClientRect();e.preventDefault();e.stopPropagation();
    const handle=e.target.closest('.ic-handle');
    if(handle){
      const corner=handle.dataset.corner,sx=e.clientX,sy=e.clientY,sw=cr.width,sh=cr.height;
      const sl=parseInt(el.style.left)||0,st=parseInt(el.style.top)||0,minW=160,minH=100;
      const cm={tl:'nwse-resize',tr:'nesw-resize',bl:'nesw-resize',br:'nwse-resize',t:'ns-resize',b:'ns-resize',l:'ew-resize',r:'ew-resize'};
      const ov=mkOv(cm[corner]||'nwse-resize');
      ov.addEventListener('mousemove',e2=>{
        const dx=e2.clientX-sx,dy=e2.clientY-sy;let nw,nh;
        if(corner==='br'){el.style.width=Math.max(minW,sw+dx)+'px';el.style.height=Math.max(minH,sh+dy)+'px'}
        else if(corner==='bl'){nw=Math.max(minW,sw-dx);el.style.width=nw+'px';el.style.left=(sl+(sw-nw))+'px';el.style.height=Math.max(minH,sh+dy)+'px'}
        else if(corner==='tr'){el.style.width=Math.max(minW,sw+dx)+'px';nh=Math.max(minH,sh-dy);el.style.height=nh+'px';el.style.top=(st+(sh-nh))+'px'}
        else if(corner==='tl'){nw=Math.max(minW,sw-dx);nh=Math.max(minH,sh-dy);el.style.width=nw+'px';el.style.left=(sl+(sw-nw))+'px';el.style.height=nh+'px';el.style.top=(st+(sh-nh))+'px'}
        else if(corner==='r'){el.style.width=Math.max(minW,sw+dx)+'px'}
        else if(corner==='l'){nw=Math.max(minW,sw-dx);el.style.width=nw+'px';el.style.left=(sl+(sw-nw))+'px'}
        else if(corner==='b'){el.style.height=Math.max(minH,sh+dy)+'px'}
        else if(corner==='t'){nh=Math.max(minH,sh-dy);el.style.height=nh+'px';el.style.top=(st+(sh-nh))+'px'}
        el.style.overflow='auto';const fs=Math.max(9,Math.min(20,(el.offsetWidth/240)*13));
        el.style.fontSize=fs+'px';pinnedCards[idx].fs=fs;scaleCardText(el);
      });
      ov.addEventListener('mouseup',()=>{ov.remove();pinnedCards[idx].w=el.offsetWidth;pinnedCards[idx].h=el.offsetHeight},{once:true});return;
    }
    let moved=false;const ox=e.clientX,oy=e.clientY;
    const sl=parseInt(el.style.left)||0,st=parseInt(el.style.top)||0;
    const ov=mkOv('move');
    ov.addEventListener('mousemove',e2=>{moved=true;el.style.left=(sl+e2.clientX-ox)+'px';el.style.top=(st+e2.clientY-oy)+'px'});
    ov.addEventListener('mouseup',()=>{ov.remove();if(!moved){togglePin(pinnedCards[idx].custId)}else{pinnedCards[idx].x=parseInt(el.style.left);pinnedCards[idx].y=parseInt(el.style.top)}},{once:true});
  });
}

function clearAllPins(){pinnedCards=[];document.querySelectorAll('.info-card').forEach(e=>e.remove());updReset()}
function updReset(){
  const n=pinnedCards.length;
  document.getElementById('btn-reset').style.opacity=n>0?'1':'';
  document.getElementById('st-pin-wrap').style.display=n>0?'':'none';
  document.getElementById('st-pins').textContent=n;
}

// ── INTERACTION ──
function inAnyCard(mx,my){
  const cards=document.querySelectorAll('.info-card.pinned');
  const wr=document.getElementById('wrap').getBoundingClientRect();
  for(const c of cards){const cr=c.getBoundingClientRect();const cx=cr.left-wr.left,cy=cr.top-wr.top;if(mx>=cx&&mx<=cx+cr.width&&my>=cy&&my<=cy+cr.height)return true}
  return false;
}

let hovRAF=false;
cv.addEventListener('mousemove',e=>{
  if(hovRAF)return;hovRAF=true;
  requestAnimationFrame(()=>{hovRAF=false;
    const rect=cv.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
    if(inAnyCard(mx,my)){cv.style.cursor='default';return}
    hovIdx=-1;
    for(let i=tiles.length-1;i>=0;i--){const t=tiles[i];if(mx>=t.x&&mx<=t.x+t.w&&my>=t.y&&my<=t.y+t.h){hovIdx=i;cv.style.cursor='pointer';break}}
    if(hovIdx<0)cv.style.cursor='default';
    if(hovIdx>=0&&tiles[hovIdx].inRange&&!isPinnedId(tiles[hovIdx].id)){showHoverCard(tiles[hovIdx])}else{rmHover()}
    if(!isFlashing)draw();
  });
},{passive:true});

cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  if(inAnyCard(mx,my))return;
  let clickIdx=-1;
  for(let i=tiles.length-1;i>=0;i--){const t=tiles[i];if(mx>=t.x&&mx<=t.x+t.w&&my>=t.y&&my<=t.y+t.h){clickIdx=i;break}}
  if(clickIdx>=0)togglePin(tiles[clickIdx].id);
});

cv.addEventListener('dblclick',e=>{e.preventDefault();hovIdx=-1;clearAllPins();draw()});
cv.addEventListener('mouseleave',()=>{hovIdx=-1;rmHover();if(!isFlashing)draw()});

// ── FLASH ──
function startFlash(){
  isFlashing=true;flashStart=performance.now();
  requestAnimationFrame(draw);setTimeout(()=>renderPins(),750);
}

// ── RESIZE ──
let resizeTimer;
window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{cv._lw=0;cv._lh=0;draw();renderPins()},100)});

// ── INIT ──
updateSliderVisuals();
document.fonts.ready.then(()=>setTimeout(startFlash,50));
</script>
</body>
