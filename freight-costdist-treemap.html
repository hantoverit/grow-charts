<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freight Cost by Account</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f6f8;--surface:#fff;--surface2:#f9fafb;--border:#e3e7ed;
    --text-primary:#111827;--text-secondary:#4b5563;--text-muted:#9ca3af;
    --green:#1e8a4a;--green-bg:#dcfce7;--red:#c0392b;--red-bg:#fee2e2;
    --toggle-bg:#d1d5db;--toggle-knob:#fff;
    --week-active-bg:#1a73e8;--week-active-text:#fff;--week-inactive:#6b7280;
    --shadow:0 1px 6px rgba(0,0,0,.08),0 4px 20px rgba(0,0,0,.04);
  }
  [data-theme="dark"] {
    --bg:#161b27;--surface:#1e2533;--surface2:#252d3d;--border:#2e3a4e;
    --text-primary:#e8edf5;--text-secondary:#b0bdd0;--text-muted:#6b7f99;
    --green:#4ade80;--green-bg:#0c2b1c;--red:#fc8181;--red-bg:#2d1214;
    --toggle-bg:#2e3a4e;--toggle-knob:#e8edf5;
    --week-active-bg:#4f93f5;--week-active-text:#0d1117;--week-inactive:#94a3b8;
    --shadow:0 1px 8px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%}
  body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text-primary);transition:background .25s,color .25s}
  html,body{height:100%}
  .widget{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px 20px;width:100%;height:100%;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:background .25s,border-color .25s}
  .treemap-wrap{flex:1;min-height:0;}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .header-left{display:flex;flex-direction:column;gap:2px}
  .eyebrow{font-size:10.5px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted)}
  .title-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .title{font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em}
  .header-total{font-size:11.5px;color:var(--text-muted);font-weight:400}
  .header-delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;border-radius:4px;padding:2px 6px}
  .header-delta.pos{color:var(--green);background:var(--green-bg)}
  .header-delta.neg{color:var(--red);background:var(--red-bg)}
  .header-right{display:flex;align-items:center;gap:14px}
  .week-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}
  .week-btn{font-size:11.5px;font-weight:600;padding:5px 13px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--week-inactive);transition:all .16s;font-family:"Inter",sans-serif}
  .week-btn.active{background:var(--week-active-bg);color:var(--week-active-text);box-shadow:0 1px 5px rgba(26,115,232,.3)}
  .dm-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.6;transition:opacity .15s;user-select:none;padding:2px 4px}
  .dm-toggle:hover{opacity:1}
  .dm-icon{font-size:10px;color:var(--text-secondary);display:flex;align-items:center;width:12px;justify-content:center}
  .dm-track{width:28px;height:15px;background:var(--toggle-bg);border-radius:8px;position:relative;transition:background .2s;flex-shrink:0}
  .dm-knob{width:11px;height:11px;background:var(--toggle-knob);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  [data-theme="dark"] .dm-knob{transform:translateX(13px)}
  .divider{height:1px;background:var(--border);margin:12px 0}
  .treemap-wrap{position:relative;width:100%;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
  canvas{display:block;width:100%}
  .legend{display:flex;flex-wrap:wrap;gap:5px 10px;margin-top:11px}
  .leg-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text-secondary)}
  .leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="header-left">
      <span class="eyebrow">Hantover Inc. &middot; Freight</span>
      <div class="title-row">
        <span class="title">Cost Distribution by Account</span>
        <span class="header-total" id="header-total"></span>
        <span class="header-delta" id="header-delta" style="display:none"></span>
      </div>
    </div>
    <div class="header-right">
      <div class="week-toggle">
        <button class="week-btn" id="btn-216" onclick="setWeek('2-16')">W2-16</button>
        <button class="week-btn active" id="btn-223" onclick="setWeek('2-23')">W2-23</button>
      </div>
      <div class="dm-toggle" onclick="toggleDark()" title="Toggle dark mode">
        <span class="dm-icon">&#9728;</span>
        <div class="dm-track"><div class="dm-knob"></div></div>
        <span class="dm-icon">&#9790;</span>
      </div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="treemap-wrap" id="wrap"><canvas id="canvas"></canvas></div>
  <div class="legend" id="legend"></div>
</div>
<script>
const RAW={
  "2-16":{AM:1934.20,AT:13210.88,AV:29104.12,CA:5120.33,CO:2387.45,DC:4521.90,FM:1876.33,FR:9102.44,HB:2801.22,HZ:6890.11,KC:87234.18,NW:834.56,WC:4965.71},
  "2-23":{AM:1726.35,AT:12404.52,AV:27684.35,CA:4808.52,CO:2049.26,DC:4088.86,FM:2008.74,FR:8641.71,HB:2519.47,HZ:6136.56,KC:84699.06,NW:722.04,WC:4285.80}
};
const LABELS={AM:"Amelia",AT:"Atlanta",AV:"Avon",CA:"Canada",CO:"Colorado",DC:"DC Metro",FM:"Farmer's Mkt",FR:"Franklin",HB:"Harrisburg",HZ:"Hazleton",KC:"Kansas City",NW:"Northwest",WC:"West Coast"};
const PAL_L=["#1a73e8","#0d47a1","#1565c0","#1976d2","#1e88e5","#2196f3","#42a5f5","#64b5f6","#1a5fa8","#0077b6","#023e8a","#0096c7","#00b4d8"];
const PAL_D=["#4f93f5","#1e5bbf","#2874d4","#3384e0","#4a95f0","#5ba3f5","#7dbaf8","#9ecdfb","#2968b8","#1a8fd1","#1256a8","#1aaddb","#1dc8f0"];

let week="2-23", dark=false, hov=null, lastHov="KC";
let flashAlphas={}, flashFrame=null;
// Cache empty box so we don't recompute every mousemove
let cachedBox=null, cachedW=0;
// Offscreen canvas for spotlight — redraw only when key changes
let spCanvas=null, spKey=null, spWeek=null, spDark=null;

function fmt(v){return"$"+v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtK(v){return v>=1000?"$"+(v/1000).toFixed(1)+"k":fmt(v)}
function fmtD(v){const a=Math.abs(v),s=v>=0?"+":"\u2212";return s+"$"+a.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}
function pal(){return dark?PAL_D:PAL_L}

function squarify(items,x,y,w,h){
  if(!items.length)return[];
  const total=items.reduce((s,i)=>s+i.v,0);
  const rects=[];let rem=[...items],rx=x,ry=y,rw=w,rh=h;
  while(rem.length){
    const horiz=rw>=rh,side=horiz?rh:rw;
    let row=[],rsum=0,best=Infinity;
    for(let i=0;i<rem.length;i++){
      const tr=[...row,rem[i]],ts=rsum+rem[i].v,ra=(ts/total)*rw*rh;
      let worst=0;
      for(const r of tr){const ia=(r.v/total)*rw*rh;worst=Math.max(worst,Math.max((side*side*ia)/(ra*ra),(ra*ra)/(side*side*ia)));}
      if(worst<=best){best=worst;row=tr;rsum=ts;}else break;
    }
    rem=rem.slice(row.length);
    const ra=(rsum/total)*rw*rh;
    let cx=rx,cy=ry;
    for(const item of row){
      const frac=item.v/rsum,hz=rw>=rh;
      let iw,ih;
      if(hz){ih=rh;iw=row.length===1?ra/rh:ra/rh*frac;}
      else{iw=rw;ih=row.length===1?ra/rw:ra/rw*frac;}
      rects.push({...item,x:cx,y:cy,w:iw,h:ih});
      if(hz)cx+=iw;else cy+=ih;
    }
    if(rw>=rh){rx+=ra/rh;rw-=ra/rh;}else{ry+=ra/rw;rh-=ra/rw;}
  }
  return rects;
}

function findEmptyBox(rects,W,H,GAP){
  // Build a fast coverage lookup using a boolean grid
  const STEP=6;
  const cols=Math.ceil(W/STEP), rows=Math.ceil(H/STEP);
  const grid=new Uint8Array(cols*rows);
  for(const r of rects){
    const rx=r.x+GAP,ry=r.y+GAP,rw=r.w-GAP*2,rh=r.h-GAP*2;
    if(rw<=0||rh<=0) continue;
    const c0=Math.max(0,Math.floor(rx/STEP));
    const c1=Math.min(cols-1,Math.ceil((rx+rw)/STEP));
    const r0=Math.max(0,Math.floor(ry/STEP));
    const r1=Math.min(rows-1,Math.ceil((ry+rh)/STEP));
    for(let rr=r0;rr<=r1;rr++) for(let cc=c0;cc<=c1;cc++) grid[rr*cols+cc]=1;
  }
  let bestBox=null,bestArea=0;
  for(let r0=0;r0<rows;r0++){
    for(let c0=0;c0<cols;c0++){
      if(grid[r0*cols+c0]) continue;
      // expand right
      let c1=c0;
      while(c1+1<cols&&!grid[r0*cols+c1+1]) c1++;
      // expand down keeping full width
      let r1=r0;
      outer: while(r1+1<rows){
        for(let cc=c0;cc<=c1;cc++) if(grid[(r1+1)*cols+cc]){break outer;}
        r1++;
      }
      const bw=(c1-c0)*STEP,bh=(r1-r0)*STEP;
      const area=bw*bh;
      if(area>bestArea&&bw>70&&bh>50){bestArea=area;bestBox={x:c0*STEP+GAP,y:r0*STEP+GAP,w:bw,h:bh};}
    }
  }
  return bestBox;
}

// Render spotlight to offscreen canvas — only when key/week/dark changes
function renderSpotlightOffscreen(box){
  const k=lastHov;
  if(!k||!box) return null;
  // Return cached if nothing changed
  if(spCanvas&&spKey===k&&spWeek===week&&spDark===dark&&
     spCanvas.width===Math.round(box.w*2)&&spCanvas.height===Math.round(box.h*2)) return spCanvas;

  const curr=RAW[week],prev=RAW["2-16"];
  const total=Object.values(curr).reduce((a,b)=>a+b,0);
  const v=curr[k]||0,pv=prev[k]||0,d=v-pv,pct=(d/pv*100);
  const sorted=Object.entries(curr).sort((a,b)=>b[1]-a[1]);
  const idx=Math.max(0,sorted.findIndex(([kk])=>kk===k));
  const p=pal();
  const color=p[idx%p.length];
  const isW=week==="2-23";
  const share=(v/total*100);
  const W=box.w, H=box.h;
  const DPR=2; // fixed 2x for crispness

  const oc=document.createElement("canvas");
  oc.width=Math.round(W*DPR); oc.height=Math.round(H*DPR);
  const ctx=oc.getContext("2d");
  ctx.scale(DPR,DPR);

  // Background
  ctx.fillStyle=dark?"#1e2533":"#ffffff";
  ctx.beginPath();ctx.roundRect(0,0,W,H,6);ctx.fill();

  // Border
  ctx.globalAlpha=0.3;
  ctx.strokeStyle=dark?"#2e3a4e":"#e3e7ed";
  ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(0.5,0.5,W-1,H-1,6);ctx.stroke();
  ctx.globalAlpha=1;

  // Accent left bar
  ctx.fillStyle=color;
  ctx.beginPath();ctx.roundRect(0,0,4,H,{upperLeft:6,upperRight:0,lowerLeft:6,lowerRight:0});ctx.fill();

  // -- Layout: divide box into two zones --
  // Top zone: identity (code + name + color bar)
  // Bottom zone: metrics grid
  const PAD=14;
  const px=PAD+6; // left text start (after accent bar)
  const topH=Math.min(H*0.48, 110); // identity zone height

  // ── IDENTITY ZONE ──
  // Code — fill top zone vertically
  const codeFS=Math.min(44,Math.max(18,Math.floor(topH*0.52)));
  ctx.font=`700 ${codeFS}px Inter,sans-serif`;
  ctx.fillStyle=color;
  ctx.textAlign="left";ctx.textBaseline="top";
  ctx.fillText(k, px, PAD);

  // Rank badge (e.g. "#1 of 13")
  const rankFS=Math.min(10,Math.max(8,Math.floor(H*0.058)));
  const rank=idx+1;
  const badgeText=`#${rank} of 13`;
  ctx.font=`600 ${rankFS}px Inter,sans-serif`;
  const bw2=ctx.measureText(badgeText).width+10;
  const bh2=rankFS+6;
  ctx.fillStyle=dark?"#252d3d":"#f1f5f9";
  ctx.beginPath();ctx.roundRect(W-bw2-PAD, PAD+2, bw2, bh2, 4);ctx.fill();
  ctx.fillStyle=dark?"#b0bdd0":"#4b5563";
  ctx.textBaseline="middle";
  ctx.fillText(badgeText, W-bw2-PAD+5, PAD+2+bh2/2);

  // Full name
  const nameFS=Math.min(13,Math.max(9,Math.floor(H*0.076)));
  ctx.font=`500 ${nameFS}px Inter,sans-serif`;
  ctx.fillStyle=dark?"#b0bdd0":"#4b5563";
  ctx.textBaseline="top";
  ctx.fillText(LABELS[k]||k, px, PAD+codeFS+3);

  // Hairline divider between zones
  const divY=topH;
  ctx.globalAlpha=0.25;
  ctx.strokeStyle=dark?"#2e3a4e":"#e3e7ed";
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px,divY);ctx.lineTo(W-PAD,divY);ctx.stroke();
  ctx.globalAlpha=1;

  // ── METRICS ZONE ──
  // Grid: 2 columns x N rows
  const metY=divY+10;
  const metH=H-metY-PAD;
  const col1x=px, col2x=px+Math.floor((W-px-PAD)*0.5)+4;
  const lblFS=Math.min(9.5,Math.max(7.5,Math.floor(H*0.056)));
  const valFS=Math.min(15,Math.max(10,Math.floor(H*0.095)));

  function metricPair(label,value,x,y,valueColor){
    ctx.font=`500 ${lblFS}px Inter,sans-serif`;
    ctx.fillStyle=dark?"#6b7f99":"#9ca3af";
    ctx.textBaseline="top";
    ctx.fillText(label.toUpperCase(),x,y);
    ctx.font=`700 ${valFS}px Inter,sans-serif`;
    ctx.fillStyle=valueColor||(dark?"#e8edf5":"#111827");
    ctx.fillText(value,x,y+lblFS+3);
    return y+lblFS+3+valFS+10;
  }

  let row1Y=metY, row2Y=metY;
  // Col 1: Total Paid, Share
  row1Y=metricPair("Total Paid", fmt(v), col1x, row1Y);
  row1Y=metricPair("Share of Total", share.toFixed(1)+"%", col1x, row1Y);

  // Col 2: WoW delta + prev (W2-23 only), else just prev
  if(isW){
    const isPos=d>=0;
    const arrow=isPos?"\u2191":"\u2193";
    const dtext=arrow+" "+fmtD(d);
    const dcolor=isPos?(dark?"#4ade80":"#1e8a4a"):(dark?"#fc8181":"#c0392b");
    const dbg=isPos?(dark?"#0c2b1c":"#dcfce7"):(dark?"#2d1214":"#fee2e2");

    // Delta pill
    ctx.font=`600 ${Math.min(valFS-1,14)}px Inter,sans-serif`;
    const pillFS2=Math.min(valFS-1,14);
    ctx.font=`600 ${pillFS2}px Inter,sans-serif`;
    const dtw=ctx.measureText(dtext).width;
    const pH=pillFS2+8, pW=Math.min(dtw+14,col2x+W-col2x-PAD-4);
    ctx.fillStyle=dbg;
    ctx.beginPath();ctx.roundRect(col2x,row2Y+lblFS+3,pW,pH,4);ctx.fill();
    ctx.fillStyle=dcolor;
    ctx.textBaseline="middle";
    ctx.fillText(dtext,col2x+7,row2Y+lblFS+3+pH/2);
    ctx.textBaseline="top";
    // label above pill
    ctx.font=`500 ${lblFS}px Inter,sans-serif`;
    ctx.fillStyle=dark?"#6b7f99":"#9ca3af";
    ctx.fillText("WOW CHANGE",col2x,row2Y);
    row2Y+=lblFS+3+pH+10;

    // Pct
    row2Y=metricPair("WoW %", (pct>=0?"+":"")+pct.toFixed(1)+"%", col2x, row2Y,
      isPos?(dark?"#4ade80":"#1e8a4a"):(dark?"#fc8181":"#c0392b"));
  } else {
    row2Y=metricPair("Prev Week Paid", fmt(pv), col2x, row2Y);
  }

  // Prev value (small, bottom) if W2-23
  if(isW&&row1Y+lblFS+valFS+10<H-6){
    metricPair("Prev Week", fmt(pv), col1x, row1Y);
  }

  spCanvas=oc; spKey=k; spWeek=week; spDark=dark;
  return oc;
}

function startFlash(fromWeek,toWeek){
  const from=RAW[fromWeek],to=RAW[toWeek];
  flashAlphas={};
  for(const k of Object.keys(from)){
    const d=to[k]-from[k];
    if(Math.abs(d)>50) flashAlphas[k]={alpha:0,dir:d>0?"green":"red",phase:"in"};
  }
  if(flashFrame) cancelAnimationFrame(flashFrame);
  animateFlash();
}
function animateFlash(){
  let any=false;
  for(const k of Object.keys(flashAlphas)){
    const f=flashAlphas[k];
    if(f.phase==="in"){f.alpha+=0.06;if(f.alpha>=0.52){f.alpha=0.52;f.phase="hold";f.hold=0;}}
    else if(f.phase==="hold"){f.hold++;if(f.hold>14)f.phase="out";}
    else{f.alpha-=0.025;if(f.alpha<=0){delete flashAlphas[k];continue;}}
    any=true;
  }
  drawCanvas();
  if(any) flashFrame=requestAnimationFrame(animateFlash);
  else flashFrame=null;
}

function drawCanvas(){
  const canvas=document.getElementById("canvas");
  const wrap=document.getElementById("wrap");
  if(!wrap.clientWidth) return;
  const dpr=window.devicePixelRatio||1;
  const W=wrap.clientWidth;
  const H=wrap.clientHeight||Math.round(W*0.56);
  if(canvas._lastW!==W||canvas._lastH!==H){
    canvas.width=W*dpr;canvas.height=H*dpr;
    canvas.style.width=W+"px";canvas.style.height=H+"px";
    canvas._lastW=W;canvas._lastH=H;
    cachedBox=null; // invalidate box cache on resize
    spCanvas=null;  // invalidate spotlight cache
  }
  const ctx=canvas.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  const curr=RAW[week];
  const total=Object.values(curr).reduce((a,b)=>a+b,0);
  const sorted=Object.entries(curr).sort((a,b)=>b[1]-a[1]);
  const items=sorted.map(([k,v],i)=>({k,v,i}));
  const p=pal();
  const GAP=3;
  const rects=squarify(items,GAP,GAP,W-GAP*2,H-GAP*2);
  canvas._rects=rects;

  // Recompute empty box only when width changes
  if(!cachedBox||cachedW!==W){
    cachedBox=findEmptyBox(rects,W,H,GAP);
    cachedW=W;
  }

  for(const r of rects){
    const isH=(hov===r.k);
    const rx=r.x+GAP,ry=r.y+GAP,rw=r.w-GAP*2,rh=r.h-GAP*2;
    if(rw<=0||rh<=0) continue;
    ctx.globalAlpha=isH?1:0.88;
    ctx.fillStyle=p[r.i%p.length];
    ctx.beginPath();ctx.roundRect(rx,ry,rw,rh,5);ctx.fill();
    const fl=flashAlphas[r.k];
    if(fl&&fl.alpha>0){
      ctx.globalAlpha=fl.alpha;
      ctx.fillStyle=fl.dir==="green"?"#22c55e":"#ef4444";
      ctx.beginPath();ctx.roundRect(rx,ry,rw,rh,5);ctx.fill();
    }
    if(isH){
      ctx.globalAlpha=1;ctx.strokeStyle="rgba(255,255,255,0.75)";ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(rx+1,ry+1,rw-2,rh-2,4);ctx.stroke();
    }
    ctx.globalAlpha=1;
    const cx=rx+rw/2,pct2=(r.v/total*100);
    if(rw>110&&rh>80){
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillStyle="rgba(255,255,255,0.97)";ctx.font="700 22px Inter,sans-serif";
      ctx.fillText(r.k,cx,ry+rh/2-16);
      ctx.font="600 13px Inter,sans-serif";ctx.fillStyle="rgba(255,255,255,0.88)";
      ctx.fillText(fmtK(r.v),cx,ry+rh/2+5);
      ctx.font="500 11px Inter,sans-serif";ctx.fillStyle="rgba(255,255,255,0.65)";
      ctx.fillText(pct2.toFixed(1)+"%",cx,ry+rh/2+22);
    } else if(rw>70&&rh>50){
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillStyle="rgba(255,255,255,0.97)";ctx.font="700 16px Inter,sans-serif";
      ctx.fillText(r.k,cx,ry+rh/2-8);
      ctx.font="500 11px Inter,sans-serif";ctx.fillStyle="rgba(255,255,255,0.7)";
      ctx.fillText(pct2.toFixed(1)+"%",cx,ry+rh/2+9);
    } else if(rw>36&&rh>26){
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillStyle="rgba(255,255,255,0.95)";ctx.font="700 12px Inter,sans-serif";
      ctx.fillText(r.k,cx,ry+rh/2);
    }
  }

  // Blit spotlight offscreen canvas
  if(cachedBox&&lastHov){
    const oc=renderSpotlightOffscreen(cachedBox);
    if(oc) ctx.drawImage(oc, cachedBox.x, cachedBox.y, cachedBox.w, cachedBox.h);
  }
}

function updateHeader(){
  const curr=RAW[week],prev=RAW["2-16"];
  const total=Object.values(curr).reduce((a,b)=>a+b,0);
  const totalP=Object.values(prev).reduce((a,b)=>a+b,0);
  const d=total-totalP,pct=(d/totalP*100),isW=week==="2-23";
  document.getElementById("header-total").textContent=fmt(total);
  const hd=document.getElementById("header-delta");
  if(isW){hd.style.display="inline-flex";hd.className="header-delta "+(d>=0?"pos":"neg");hd.innerHTML=(d>=0?"&#8593;":"&#8595;")+" "+fmtD(d)+"&nbsp;"+(pct>=0?"+":"")+pct.toFixed(1)+"%";}
  else hd.style.display="none";
}

function updateLegend(){
  const curr=RAW[week];
  const sorted=Object.entries(curr).sort((a,b)=>b[1]-a[1]);
  const p=pal();
  document.getElementById("legend").innerHTML=sorted.map(([k],i)=>
    `<div class="leg-item"><div class="leg-dot" style="background:${p[i%p.length]}"></div><span><b>${k}</b> ${LABELS[k]||""}</span></div>`
  ).join("");
}

// Mousemove — immediate, no throttle, no animation needed
document.getElementById("canvas").addEventListener("mousemove",e=>{
  const c=e.target,b=c.getBoundingClientRect();
  const mx=e.clientX-b.left,my=e.clientY-b.top;
  const GAP=3;
  const f=(c._rects||[]).find(r=>{
    const rx=r.x+GAP,ry=r.y+GAP,rw=r.w-GAP*2,rh=r.h-GAP*2;
    return mx>=rx&&mx<=rx+rw&&my>=ry&&my<=ry+rh;
  });
  if(f){
    c.style.cursor="pointer";
    if(f.k!==lastHov){
      hov=f.k; lastHov=f.k;
      spCanvas=null; // invalidate offscreen cache immediately on key change
      drawCanvas();
    } else if(f.k!==hov){
      hov=f.k; drawCanvas();
    }
  } else {
    c.style.cursor="default";
    if(hov){hov=null;drawCanvas();}
  }
},{passive:true});

function render(fromWeek){
  updateHeader();updateLegend();
  spCanvas=null;
  document.getElementById("btn-216").classList.toggle("active",week==="2-16");
  document.getElementById("btn-223").classList.toggle("active",week==="2-23");
  if(fromWeek&&fromWeek!==week) startFlash(fromWeek,week);
  else drawCanvas();
}
function setWeek(w){const from=week;week=w;hov=null;cachedBox=null;render(from);}
function toggleDark(){dark=!dark;spCanvas=null;document.documentElement.setAttribute("data-theme",dark?"dark":"");render();}
window.addEventListener("resize",()=>{
  const c=document.getElementById("canvas");c._lastW=0;c._lastH=0;cachedBox=null;spCanvas=null;drawCanvas();
});
render();
</script>
