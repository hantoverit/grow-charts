<html data-theme="dark" lang="en">
<head>

<title>Freight Cost by Account</title>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%}
  body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text-primary);transition:background .25s,color .25s}
  .widget{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px 16px;width:100%;height:100%;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:background .25s,border-color .25s}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-shrink:0}
  .header-left{display:flex;flex-direction:column;gap:2px}
  .eyebrow{font-size:10.5px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted)}
  .title{font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em}
  .header-center{display:flex;flex-direction:column;align-items:center;gap:3px}
  .header-total-label{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted)}

  .header-delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;border-radius:4px;padding:2px 6px}

  .header-delta.neg{color:var(--red);background:var(--red-bg)}
  .header-right{display:flex;align-items:center;gap:14px}
  .week-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}

  .dm-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.6;transition:opacity .15s;user-select:none;padding:2px 4px}

  .dm-icon{font-size:10px;color:var(--text-secondary);display:flex;align-items:center;width:12px;justify-content:center}
  .dm-track{width:28px;height:15px;background:var(--toggle-bg);border-radius:8px;position:relative;transition:background .2s;flex-shrink:0}
  .dm-knob{width:11px;height:11px;background:var(--toggle-knob);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}

  .treemap-wrap{position:relative;width:100%;flex:1;min-height:0;border-radius:8px;overflow:hidden;border:1px solid var(--chart-border);background:var(--chart-bg)}

  .wk-drill-hdr{font-size:8.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}

  const rects=[];let rem=[...items],rx=x,ry=y,rw=w,rh=h;
  while(rem.length){
    const horiz=rw>rh*1.4, side=horiz?rh:rw;
    let row=[],rsum=0,best=Infinity;
    for(let i=0;i<rem.length;i++){
      const tr=[...row,rem[i]],ts=rsum+rem[i].v,ra=(ts/total)*rw*rh;
      let worst=0;
      for(const r of tr){const ia=(r.v/total)*rw*rh;worst=Math.max(worst,Math.max((side*side*ia)/(ra*ra),(ra*ra)/(side*side*ia)));}
      if(worst<=best){best=worst;row=tr;rsum=ts;}else break;
    }
    rem=rem.slice(row.length);
    const ra=(rsum/total)*rw*rh;
    let cx=rx,cy=ry;
    for(const item of row){
      const frac=item.v/rsum,hz=rw>rh*1.4;
      let iw,ih;
      if(hz){ih=rh;iw=row.length===1?ra/rh:ra/rh*frac;}
      else{iw=rw;ih=row.length===1?ra/rw:ra/rw*frac;}
      rects.push({...item,x:cx,y:cy,w:iw,h:ih});
      if(hz)cx+=iw;else cy+=ih;
    }
    if(rw>rh*1.4){rx+=ra/rh;rw-=ra/rh;}else{ry+=ra/rw;rh-=ra/rw;}
  }
  return rects;
}

function findEmptyBox(rects,W,H,GAP){
  const STEP=6;
  const cols=Math.ceil(W/STEP),rows=Math.ceil(H/STEP);
  const grid=new Uint8Array(cols*rows);
  for(const r of rects){
    const rx=r.x+GAP,ry=r.y+GAP,rw=r.w-GAP*2,rh=r.h-GAP*2;
    if(rw<=0||rh<=0) continue;
    const c0=Math.max(0,Math.floor(rx/STEP)),c1=Math.min(cols-1,Math.ceil((rx+rw)/STEP));
    const r0=Math.max(0,Math.floor(ry/STEP)),r1=Math.min(rows-1,Math.ceil((ry+rh)/STEP));
    for(let rr=r0;rr<=r1;rr++) for(let cc=c0;cc<=c1;cc++) grid[rr*cols+cc]=1;
  }
  let bestBox=null,bestArea=0;
  for(let r0=0;r0<rows;r0++){
    for(let c0=0;c0<cols;c0++){
      if(grid[r0*cols+c0]) continue;
      let c1=c0;
      while(c1+1<cols&&!grid[r0*cols+c1+1]) c1++;
      let r1=r0;
      outer:while(r1+1<rows){for(let cc=c0;cc<=c1;cc++)if(grid[(r1+1)*cols+cc])break outer;r1++;}
      const bw=(c1-c0)*STEP,bh=(r1-r0)*STEP,area=bw*bh;
      if(area>bestArea&&bw>70&&bh>50){bestArea=area;bestBox={x:c0*STEP+GAP,y:r0*STEP+GAP,w:bw,h:bh};}
    }
  }
  return bestBox;
}

function renderSpotlightOffscreen(box){
  const k=hov||pinnedKey;
  if(!k||!box) return null;
  if(spCanvas&&spKey===k&&spWeek===week&&spDark===dark&&
     spCanvas.width===Math.round(box.w*2)&&spCanvas.height===Math.round(box.h*2)) return spCanvas;

  const curr=getAggRAW(),pw=function(){var p=getPrevWeeks();return p?p[p.length-1]:null;}(),prev=pw?getAggRAWPrev():null;
  const total=Object.values(curr).reduce((a,b)=>a+b,0);
  const v=curr[k]||0,pv=prev?(prev[k]||0):0,d=v-pv,pct=pv?(d/pv*100):0;
  var sorted=Object.entries(curr).sort((a,b)=>b[1]-a[1]);
  if(activeFilter!=="all")sorted=sorted.slice(0,parseInt(activeFilter));
  const idx=Math.max(0,sorted.findIndex(([kk])=>kk===k));
  const p=pal(),color=p[getCI(k)];
  const hasPrev=!!prev,share=(v/total*100);
  const W=box.w,H=box.h,DPR=2;
  const oc=document.createElement("canvas");
  oc.width=Math.round(W*DPR);oc.height=Math.round(H*DPR);
  const ctx=oc.getContext("2d");
  ctx.scale(DPR,DPR);

  ctx.fillStyle=dark?"#1e2533":"#ffffff";
  ctx.beginPath();ctx.roundRect(0,0,W,H,6);ctx.fill();
  ctx.globalAlpha=0.3;
  ctx.strokeStyle=dark?"#2e3a4e":"#e3e7ed";ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(0.5,0.5,W-1,H-1,6);ctx.stroke();
  ctx.globalAlpha=1;
  ctx.fillStyle=color;
  ctx.beginPath();ctx.roundRect(0,0,4,H,{upperLeft:6,upperRight:0,lowerLeft:6,lowerRight:0});ctx.fill();

  const PAD=18,px=PAD+6;
  const codeFS=Math.min(48,Math.max(20,Math.floor(Math.min(H*0.48,110)*0.56)));
  const nameFS=Math.min(15,Math.max(11,Math.floor(H*0.09)));
  const lblFS=Math.min(12,Math.max(10,Math.floor(H*0.07)));
  const valFS=Math.min(18,Math.max(13,Math.floor(H*0.115)));
  const pillFS2=Math.min(valFS-1,14);
  const topH=Math.min(H*0.48,110);
  const metricsH=hasPrev
    ?(lblFS+3+valFS+10)+(lblFS+3+pillFS2+8+10)+(lblFS+3+valFS+10)
    :(lblFS+3+valFS+10)*3;
  const totalContentH=topH+10+metricsH+PAD*2;
  const vOffset=Math.max(0,Math.floor((H-totalContentH)/2));
  ctx.font=`700 ${codeFS}px Inter,sans-serif`;
  ctx.fillStyle=color;ctx.textAlign="left";ctx.textBaseline="top";
  ctx.fillText(k,px,PAD+vOffset);

  const rankFS=Math.min(10,Math.max(8,Math.floor(H*0.058)));
  const acctCount=sorted.length;
  const isPinned=!hov||hov===pinnedKey;
  const badgeText=isPinned?`#${idx+1} of ${acctCount} \u2713`:`#${idx+1} of ${acctCount}`;
  ctx.font=`600 ${rankFS}px Inter,sans-serif`;
  const bw2=ctx.measureText(badgeText).width+10,bh2=rankFS+6;
  ctx.fillStyle=isPinned?(dark?"#1a2d50":"#e8f0fd"):(dark?"#252d3d":"#f1f5f9");
  ctx.beginPath();ctx.roundRect(W-bw2-PAD,PAD+2+vOffset,bw2,bh2,4);ctx.fill();
  ctx.fillStyle=isPinned?(dark?"#7db3f8":"#1a73e8"):(dark?"#b0bdd0":"#4b5563");
  ctx.textBaseline="middle";
  ctx.fillText(badgeText,W-bw2-PAD+5,PAD+2+bh2/2+vOffset);

  ctx.font=`500 ${nameFS}px Inter,sans-serif`;
  ctx.fillStyle=dark?"#d0ddf0":"#4b5563";
  ctx.textBaseline="top";
  ctx.fillText(LABELS[k]||k,px,PAD+codeFS+3+vOffset);

  const divY=topH+vOffset;
  ctx.globalAlpha=0.25;ctx.strokeStyle=dark?"#2e3a4e":"#e3e7ed";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px,divY);ctx.lineTo(W-PAD,divY);ctx.stroke();
  ctx.globalAlpha=1;

  const metY=divY+10,col1x=px,col2x=px+Math.floor((W-px-PAD)*0.5)+4;

  function metricPair(label,value,x,y,valueColor){
    ctx.font=`600 ${lblFS}px Inter,sans-serif`;
    ctx.fillStyle=dark?"#c8d8f0":"#6b7a99";ctx.textBaseline="top";
    ctx.fillText(label.toUpperCase(),x,y);
    ctx.font=`700 ${valFS}px Inter,sans-serif`;
    ctx.fillStyle=valueColor||(dark?"#f0f4ff":"#0f172a");
    ctx.fillText(value,x,y+lblFS+4);
    return y+lblFS+4+valFS+12;
  }

  let row1Y=metY,row2Y=metY;
  row1Y=metricPair("Total Paid",fmt(v),col1x,row1Y);
  row1Y=metricPair("Share of Total",share.toFixed(1)+"%",col1x,row1Y);
  if(row1Y+lblFS+valFS+10<H-6){
    const prevLabel=hasPrev?(granularity==="monthly"?("Prev ("+(function(){var i=MONTH_KEYS.indexOf(activeMonth);return i>0?MONTH_KEYS[i-1]:"";})()+")"):("Prev Week (W"+pw+")")):(granularity==="monthly"?"Prev Month":"Prev Week");
    const prevVal=hasPrev?fmt(pv):"\u2014 \u2014";
    metricPair(prevLabel,prevVal,col1x,row1Y,hasPrev?null:(dark?"#6b7f99":"#9ca3af"));
  }

  if(hasPrev){
    const isPos=d>=0,arrow=isPos?"\u2191":"\u2193",dtext=arrow+" "+fmtD(d);
    const dcolor=isPos?(dark?"#4ade80":"#1e8a4a"):(dark?"#fc8181":"#c0392b");
    const dbg=isPos?(dark?"#0c2b1c":"#dcfce7"):(dark?"#2d1214":"#fee2e2");
    ctx.font=`600 ${pillFS2}px Inter,sans-serif`;
    const dtw=ctx.measureText(dtext).width;
    const pH=pillFS2+8,pW=Math.min(dtw+14,W-col2x-PAD-4);
    ctx.font=`600 ${lblFS}px Inter,sans-serif`;
    ctx.fillStyle=dark?"#c8d8f0":"#6b7a99";ctx.textBaseline="top";
    ctx.fillText(granularity==="monthly"?"MONTH CHANGE":"WOW CHANGE",col2x,row2Y);
    row2Y+=lblFS+3;
    ctx.fillStyle=dbg;ctx.beginPath();ctx.roundRect(col2x,row2Y,pW,pH,4);ctx.fill();
    ctx.fillStyle=dcolor;ctx.font=`600 ${pillFS2}px Inter,sans-serif`;
    ctx.textBaseline="middle";ctx.fillText(dtext,col2x+7,row2Y+pH/2);
    row2Y+=pH+10;
    metricPair((granularity==="monthly"?"MoM %":"WoW %"),(pct>=0?"+":"")+pct.toFixed(1)+"%",col2x,row2Y,dcolor);
  } else {
    metricPair((granularity==="monthly"?"Month Change":"WoW Change"),"\u2014 \u2014",col2x,row2Y,dark?"#6b7f99":"#9ca3af");
    row2Y+=lblFS+4+valFS+12;
    metricPair((granularity==="monthly"?"MoM %":"WoW %"),"\u2014 \u2014",col2x,row2Y,dark?"#6b7f99":"#9ca3af");
  }

  spCanvas=oc;spKey=k;spWeek=week;spDark=dark;
  return oc;
}

function startFlash(fromWeek,toWeek){
  flashAlphas={};
  if(!toWeek){drawCanvas();return;}
  const curr=RAW[toWeek];
  if(!curr){drawCanvas();return;}
  var sorted=Object.entries(curr).sort((a,b)=>b[1]-a[1]);
  if(activeFilter!=="all")sorted=sorted.slice(0,parseInt(activeFilter));
  sorted.forEach(([k],i)=>{
    flashAlphas[k]={alpha:0,phase:"in",delay:Math.floor(i*1.8),hold:0};
  });
  if(flashFrame) cancelAnimationFrame(flashFrame);
  animateFlash();
}
function animateFlash(){
  let any=false;
  for(const k of Object.keys(flashAlphas)){
    const f=flashAlphas[k];
    if(f.delay>0){f.delay--;any=true;continue;}
    if(f.phase==="in"){f.alpha+=0.07;if(f.alpha>=0.55){f.alpha=0.55;f.phase="hold";f.hold=0;}}
    else if(f.phase==="hold"){f.hold++;if(f.hold>10)f.phase="out";}
    else{f.alpha-=0.03;if(f.alpha<=0){delete flashAlphas[k];continue;}}
    any=true;
  }
  drawCanvas();
  if(any) flashFrame=requestAnimationFrame(animateFlash);
  else flashFrame=null;
}

function getDisplayKey(){return hov||pinnedKey;}

function drawCanvas(){
  const canvas=document.getElementById("canvas");
  const wrap=document.getElementById("wrap");
  if(!wrap.clientWidth||!wrap.clientHeight) return;
  const dpr=window.devicePixelRatio||1;
  const W=wrap.clientWidth,H=wrap.clientHeight;
  if(canvas._lastW!==W||canvas._lastH!==H){
    canvas.width=W*dpr;canvas.height=H*dpr;
    canvas.style.width=W+"px";canvas.style.height=H+"px";
    canvas._lastW=W;canvas._lastH=H;
    cachedBox=null;spCanvas=null;
  }
  const ctx=canvas.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  const curr=getAggRAW();
  const total=Object.values(curr).reduce((a,b)=>a+b,0);
  var sorted=Object.entries(curr).sort((a,b)=>b[1]-a[1]);
  if(activeFilter!=="all")sorted=sorted.slice(0,parseInt(activeFilter));
  const totalRaw=total;
  const minData=totalRaw*0.03;
  const boosted=sorted.map(([k,v],i)=>({k,v:Math.max(v,minData),i}));
  const totalBoosted=boosted.reduce((s,r)=>s+r.v,0);
  const items=boosted.map(r=>({...r,v:r.v*(totalRaw/totalBoosted)}));
  const p=pal(),GAP=3;
  const rawRects=squarify(items,GAP,GAP,W-GAP*2,H-GAP*2);
  const rects=rawRects.map(r=>({...r,y:H-r.y-r.h}));
  canvas._rects=rects;

  if(!cachedBox||cachedW!==W||cachedH!==H){
    cachedBox=findEmptyBox(rects,W,H,GAP);
    cachedW=W;cachedH=H;
  }

  const activeKey=getDisplayKey();
  for(const r of rects){
    const isActive=(r.k===activeKey);
    const rx=r.x+GAP,ry=r.y+GAP,rw=r.w-GAP*2,rh=r.h-GAP*2;
    if(rw<=0||rh<=0) continue;
    ctx.globalAlpha=isActive?1:0.85;
    ctx.fillStyle=p[getCI(r.k)];
    ctx.beginPath();ctx.roundRect(rx,ry,rw,rh,5);ctx.fill();
    const fl=flashAlphas[r.k];
    if(fl&&fl.alpha>0){
      ctx.globalAlpha=fl.alpha;
      ctx.fillStyle="rgba(255,255,255,1)";
      ctx.beginPath();ctx.roundRect(rx,ry,rw,rh,5);ctx.fill();
    }
    if(isActive){
      ctx.globalAlpha=1;ctx.strokeStyle="rgba(255,255,255,0.8)";ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(rx+1,ry+1,rw-2,rh-2,4);ctx.stroke();
    }
    ctx.globalAlpha=1;
    const cx=rx+rw/2,pct2=(curr[r.k]/total*100);
    if(rw>110&&rh>70){
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillStyle="rgba(255,255,255,0.97)";ctx.font="700 22px Inter,sans-serif";
      ctx.fillText(r.k,cx,ry+rh/2-16);
      ctx.font="600 13px Inter,sans-serif";ctx.fillStyle="rgba(255,255,255,0.88)";
      ctx.fillText(fmtK(curr[r.k]),cx,ry+rh/2+5);
      ctx.font="500 11px Inter,sans-serif";ctx.fillStyle="rgba(255,255,255,0.65)";
      ctx.fillText(pct2.toFixed(1)+"%",cx,ry+rh/2+22);
    } else if(rw>60&&rh>40){
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillStyle="rgba(255,255,255,0.97)";ctx.font="700 14px Inter,sans-serif";
      ctx.fillText(r.k,cx,ry+rh/2-7);
      ctx.font="500 10px Inter,sans-serif";ctx.fillStyle="rgba(255,255,255,0.72)";
      ctx.fillText(pct2.toFixed(1)+"%",cx,ry+rh/2+8);
    } else if(rw>28&&rh>20){
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillStyle="rgba(255,255,255,0.95)";ctx.font="700 11px Inter,sans-serif";
      ctx.fillText(r.k,cx,ry+rh/2);
    }
  }

  if(cachedBox&&getDisplayKey()){
    const oc=renderSpotlightOffscreen(cachedBox);
    if(oc) ctx.drawImage(oc,cachedBox.x,cachedBox.y,cachedBox.w,cachedBox.h);
  }
}

function updateHeader(){
  const curr=getAggRAW(),pw=function(){var p=getPrevWeeks();return p?p[p.length-1]:null;}(),prev=pw?getAggRAWPrev():null;
  const total=Object.values(curr).reduce((a,b)=>a+b,0);
  document.getElementById("header-total").textContent=fmt(total);
  var lbl=document.querySelector(".header-total-label");
  if(lbl) lbl.textContent=granularity==="monthly"?activeMonth+" Total":"Week "+ALL_WEEKS[activeWeekIdx]+" Total";
  const hd=document.getElementById("header-delta");
  if(prev){
    const totalP=Object.values(prev).reduce((a,b)=>a+b,0);
    const d=total-totalP,pct=(d/totalP*100);
    hd.style.display="inline-flex";
    hd.className="header-delta "+(d>=0?"pos":"neg");
    hd.innerHTML=(d>=0?"&#8593;":"&#8595;")+" "+fmtD(d)+"&nbsp;"+(pct>=0?"+":"")+pct.toFixed(1)+"%";
  } else hd.style.display="none";
}

function updateLegend(){
  const curr=getAggRAW();
  var sorted=Object.entries(curr).sort((a,b)=>b[1]-a[1]);
  if(activeFilter!=="all")sorted=sorted.slice(0,parseInt(activeFilter));
  const p=pal();
  const activeKey=getDisplayKey();
  document.getElementById("legend").innerHTML=sorted.map(([k],i)=>{
    return `<div class="leg-item${k===activeKey?' pinned':''}" onclick="pinKey('${k}')" data-key="${k}">
      <div class="leg-dot" style="background:${p[getCI(k)]}"></div>
      <span><b>${k}</b> ${LABELS[k]||""}</span>
      <span class="leg-pin">${k===pinnedKey?'📌':''}</span>
    </div>`;
  }).join("");
}

function pinKey(k){
  pinnedKey=k;hov=null;spCanvas=null;drawCanvas();updateLegend();
}

document.getElementById("canvas").addEventListener("mousemove",e=>{
  const c=e.target,b=c.getBoundingClientRect();
  const mx=e.clientX-b.left,my=e.clientY-b.top;
  const GAP=3;const rects=c._rects||[];
  const hit=rects.find(r=>{
    const rx=r.x+GAP,ry=r.y+GAP,rw=r.w-GAP*2,rh=r.h-GAP*2;
    return mx>=rx&&mx<=rx+rw&&my>=ry&&my<=ry+rh;
  });
  let activeK=null;
  if(hit){activeK=hit.k;c.style.cursor="pointer";}
  else{
    let bestDist=Infinity;
    for(const r of rects){
      const rx=r.x+GAP,ry=r.y+GAP,rw=r.w-GAP*2,rh=r.h-GAP*2;
      const dist=Math.hypot(mx-(rx+rw/2),my-(ry+rh/2));
      if(dist<bestDist){bestDist=dist;activeK=r.k;}
    }
    c.style.cursor="default";
  }
  if(activeK&&activeK!==hov){hov=activeK;spCanvas=null;drawCanvas();updateLegend();}
  if(activeK) updateTmTip(mx,my); else tmTip.classList.remove('visible');
},{passive:true});

document.getElementById("canvas").addEventListener("click",e=>{
  const c=e.target,b=c.getBoundingClientRect();
  const mx=e.clientX-b.left,my=e.clientY-b.top;
  const GAP=3;
  const f=(c._rects||[]).find(r=>{
    const rx=r.x+GAP,ry=r.y+GAP,rw=r.w-GAP*2,rh=r.h-GAP*2;
    return mx>=rx&&mx<=rx+rw&&my>=ry&&my<=ry+rh;
  });
  if(f) pinKey(f.k);
});

document.getElementById("canvas").addEventListener("dblclick",(e)=>{e.preventDefault();resetAll();});
document.getElementById("canvas").addEventListener("mouseleave",()=>{tmTip.classList.remove('visible');});

function render(fromWeek){
  updateHeader();updateLegend();spCanvas=null;
  WEEKS.forEach(w=>{
    const id="btn-"+w.replace("-","");
    const el=document.getElementById(id);
    if(el) el.classList.toggle("active",week===w);
  });
  if(fromWeek&&fromWeek!==week) startFlash(fromWeek,week);
  else drawCanvas();
}

function resetAll(){granularity="monthly";activeMonth=MONTH_KEYS[MONTH_KEYS.length-1];activeWeekIdx=ALL_WEEKS.length-1;activeFilter="all";buildDateControl();buildFilterControl();pinnedKey=null;if(document.getElementById("spotlight"))document.getElementById("spotlight").remove();render();}
function toggleDark(){dark=!dark;spCanvas=null;document.documentElement.setAttribute("data-theme",dark?"dark":"");render();}
let resizeTimer;
window.addEventListener("resize",()=>{
  clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{
    const c=document.getElementById("canvas");c._lastW=0;c._lastH=0;cachedBox=null;spCanvas=null;drawCanvas();
  },100);
});
buildDateControl();
buildFilterControl();
onDateChange();

/* Treemap weekly drill-down tooltip */
var tmTip=document.getElementById('tm-tip');
function updateTmTip(mx,my){
  if(!hov||granularity!=="monthly"){tmTip.classList.remove('visible');return;}
  var mk=activeMonth;if(!isMonthKey(mk)||MONTHS[mk].length<=1){tmTip.classList.remove('visible');return;}
  var curr=getAggRAW();var v=curr[hov]||0;
  var label=LABELS[hov]||hov;
  var h='<div class="tm-tip-title">'+label+' — '+mk+'</div>';
  h+=wkDrillHTML(mk,function(w){return RAW[w]?RAW[w][hov]||0:0;},function(val){return fmtK(val);});
  tmTip.innerHTML=h;
  var wrap=document.getElementById('wrap');var wr=wrap.getBoundingClientRect();
  tmTip.style.left=Math.min(mx+12,wr.width-204)+'px';
  tmTip.style.top=Math.max(4,my-60)+'px';
  tmTip.classList.add('visible');
}

</script>
