html,body{height:100%;font-family:"Inter",sans-serif;background:#0d1117;color:#e8edf5}
.app{display:flex;flex-direction:column;height:100vh;padding:14px 20px;gap:10px}

.foot .d{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}

// --- Drawing helpers ---
function setFont(weight,size){C.font=weight+" "+size+"px Inter";}

function clip(text,maxW){
  if(C.measureText(text).width<=maxW)return text;
  for(let i=text.length-1;i>1;i--){
    if(C.measureText(text.slice(0,i)+"…").width<=maxW)return text.slice(0,i)+"…";
  }
  return"…";
}

// Compute heights: sqrt-proportional, summing exactly to `total`.
function layout(values,total,gap,minH){
  const n=values.length;
  const usable=total-gap*(n-1);
  // sqrt share
  const sq=values.map(v=>Math.sqrt(Math.max(v,0.1)));
  const sqSum=sq.reduce((a,b)=>a+b,0)||1;
  let heights=sq.map(s=>(s/sqSum)*usable);
  // enforce minimum — steal from largest
  for(let pass=0;pass<5;pass++){
    let deficit=0;
    heights=heights.map(h=>{if(h<minH){deficit+=minH-h;return minH;}return h;});
    if(deficit<=0)break;
    const maxH=Math.max(...heights);
    const largeIdx=heights.map((h,i)=>h>minH*2?i:-1).filter(i=>i>=0);
    const steal=deficit/Math.max(largeIdx.length,1);
    largeIdx.forEach(i=>{heights[i]=Math.max(minH,heights[i]-steal);});
  }
  return heights;
}

function drawBez(x1,y1,x2,y2,thick,c1,c2,hl){
  thick=Math.max(1,thick);
  const cx1=x1+(x2-x1)*.4,cx2=x1+(x2-x1)*.6;
  C.beginPath();
  C.moveTo(x1,y1-thick/2);
  C.bezierCurveTo(cx1,y1-thick/2,cx2,y2-thick/2,x2,y2-thick/2);
  C.lineTo(x2,y2+thick/2);
  C.bezierCurveTo(cx2,y2+thick/2,cx1,y1+thick/2,x1,y1+thick/2);
  C.closePath();
  const g=C.createLinearGradient(x1,0,x2,0);
  const a=hl?.3:.08;
  g.addColorStop(0,rgba(c1,a));g.addColorStop(1,rgba(c2,a));
  C.fillStyle=g;C.fill();
}

function drawNode(x,y,w,h,rgb,label,rightLabel,isHov){
  C.fillStyle=rgba(rgb,isHov?.28:.1);
  C.strokeStyle=rgba(rgb,isHov?.65:.22);
  C.lineWidth=isHov?1.5:.5;
  C.beginPath();C.roundRect(x,y,w,h,4);C.fill();C.stroke();
  if(h<13)return;
  const fs=Math.min(10.5,Math.max(8.5,h*.45));
  setFont("600",fs);
  const pad=5;
  const rlW=rightLabel?C.measureText(rightLabel).width+10:0;
  C.fillStyle=isHov?rgba(rgb,1):"#c8d8f0";C.textAlign="left";
  C.fillText(clip(label||"",w-pad*2-rlW),x+pad,y+h/2+fs*.35);
  if(rightLabel){
    setFont("700",Math.min(9.5,fs));
    C.fillStyle=rgba(rgb,isHov?1:.65);C.textAlign="right";
    C.fillText(rightLabel,x+w-pad,y+h/2+fs*.35);
    C.textAlign="left";
  }
}

function drawOverview(){
  hitboxes=[];
  const colW=W/5.5, nw=colW*.72;
  const x1=colW*.55,x2=colW*2.15,x3=colW*3.75;

  // Headers
  setFont("700",11);C.fillStyle="#7a8da5";C.textAlign="center";
  C.fillText("PAGES BY VENDOR",x1+nw/2,22);
  C.fillText("BOOKS BY CUSTOMER",x2+nw/2,22);
  C.fillText("CUSTOMER LIBRARIES",x3+nw/2,22);
  setFont("500",9);C.fillStyle="#4a5568";
  C.fillText("source → pricing rules",x1+nw/2,35);
  C.fillText("deals → containers",x2+nw/2,35);
  C.fillText("CPC assignment targets",x3+nw/2,35);
  C.textAlign="left";

  const TOP=44,GAP=2,AREA=H-TOP-8;

  // --- Left: vendors ---
  const vendors=Object.entries(DATA.vendors).sort((a,b)=>b[1].total_pages-a[1].total_pages);
  const vH=layout(vendors.map(v=>v[1].total_pages),AREA,GAP,16);
  let py=TOP;const vnodes=[];
  vendors.forEach(([name,v],i)=>{
    const h=vH[i];
    const isH=hov&&hov.id==="v-"+name;
    drawNode(x1,py,nw,h,TEAL,name,v.total_pages.toLocaleString(),isH);
    vnodes.push({id:"v-"+name,name,x:x1,y:py,w:nw,h,type:"vendor",data:v});
    hitboxes.push(vnodes[vnodes.length-1]);
    py+=h+GAP;
  });

  // --- Right: libraries ---
  const libs=Object.entries(DATA.libraries).sort((a,b)=>b[1].pages-a[1].pages);
  const lH=layout(libs.map(l=>l[1].pages),AREA,GAP,8);
  let ly=TOP;const lnodes=[];
  libs.forEach(([name,l],i)=>{
    const h=lH[i];
    const isH=hov&&hov.id==="l-"+name;
    drawNode(x3,ly,nw,h,MAG,name,l.pages+"pg",isH);
    lnodes.push({id:"l-"+name,name,x:x3,y:ly,w:nw,h,type:"library",data:l});
    hitboxes.push(lnodes[lnodes.length-1]);
    ly+=h+GAP;
  });

  // --- Center: books grouped by customer ---
  const bCust={};
  for(const v of Object.values(DATA.vendors))
    for(const b of v.books)
      for(const c of b.customers){
        if(!bCust[c])bCust[c]={count:0,pages:0,items:0};
        bCust[c].count++;bCust[c].pages+=b.pages;bCust[c].items+=b.items;
      }
  const bGroups=Object.entries(bCust).sort((a,b)=>b[1].pages-a[1].pages);
  const bH=layout(bGroups.map(b=>b[1].pages),AREA,GAP,10);
  let by=TOP;const bnodes=[];
  bGroups.forEach(([name,b],i)=>{
    const h=bH[i];
    const isH=hov&&hov.id==="b-"+name;
    drawNode(x2,by,nw,h,IND,name,b.count+(b.count===1?"bk":" bk"),isH);
    bnodes.push({id:"b-"+name,name,x:x2,y:by,w:nw,h,type:"bookgrp",data:b});
    hitboxes.push(bnodes[bnodes.length-1]);
    by+=h+GAP;
  });

  // --- Flows: vendors → book groups ---
  for(const vn of vnodes){
    const vd=DATA.vendors[vn.name];if(!vd)continue;
    for(const bn of bnodes){
      let fl=0;
      for(const bk of vd.books)for(const c of bk.customers)if(c===bn.name)fl+=bk.pages;
      if(!fl)continue;
      const thick=Math.max(1,Math.sqrt(fl)*1.1);
      const hl=hov&&(hov.id===vn.id||hov.id===bn.id);
      drawBez(vn.x+vn.w,vn.y+vn.h/2,bn.x,bn.y+bn.h/2,thick,TEAL,IND,hl);
    }
  }

  // --- Flows: book groups → libraries ---
  for(const bn of bnodes){
    for(const ln of lnodes){
      if(bn.name===ln.name){
        const thick=Math.max(1,Math.sqrt(bn.data.pages)*.85);
        const hl=hov&&(hov.id===bn.id||hov.id===ln.id);
        drawBez(bn.x+bn.w,bn.y+bn.h/2,ln.x,ln.y+ln.h/2,thick,IND,MAG,hl);
      }
    }
  }

  // Redraw nodes on top of flows
  py=TOP;
  vendors.forEach(([name,v],i)=>{
    const h=vH[i];const isH=hov&&hov.id==="v-"+name;
    drawNode(x1,py,nw,h,TEAL,name,v.total_pages.toLocaleString(),isH);py+=h+GAP;
  });
  by=TOP;
  bGroups.forEach(([name,b],i)=>{
    const h=bH[i];const isH=hov&&hov.id==="b-"+name;
    drawNode(x2,by,nw,h,IND,name,b.count+(b.count===1?"bk":" bk"),isH);by+=h+GAP;
  });
  ly=TOP;
  libs.forEach(([name,l],i)=>{
    const h=lH[i];const isH=hov&&hov.id==="l-"+name;
    drawNode(x3,ly,nw,h,MAG,name,l.pages+"pg",isH);ly+=h+GAP;
  });
}

  setFont("700",12);C.fillStyle="#22d3ee";C.fillText(vname,W/2,42);
  setFont("500",10);C.fillStyle="#5a7a90";
  C.fillText(v.total_pages+" pages across "+v.books.length+" books",W/2,56);
  C.textAlign="left";

  const TOP=68,GAP=6,AREA=H-TOP-8;
  const sorted=[...v.books].sort((a,b)=>b.pages-a.pages);
  const bH=layout(sorted.map(b=>b.pages),AREA,GAP,40);

  let by=TOP;
  sorted.forEach((b,i)=>{
    const h=bH[i];
    const isH=hov&&hov.id==="db-"+b.bid;

    // Book node
    drawNode(x2,by,nw,h,IND,b.name,null,isH);
    // Sub-info inside book node
    if(h>30){
      setFont("500",9);C.fillStyle=isH?"#8899b0":"#5a6a80";
      C.fillText(b.pages+" pages · "+b.items+" items · "+b.status,x2+5,by+h/2+13);
    }

    // Page node (left)
    const ph=h*.6;const ppy=by+(h-ph)/2;
    drawNode(x1,ppy,nw,ph,TEAL,b.pages+" pages",b.items+" items",isH);
    drawBez(x1+nw,ppy+ph/2,x2,by+h/2,Math.max(2,ph*.25),TEAL,IND,isH);

    // Library nodes (right)
    const custs=[...new Set(b.customers)];
    if(!custs.length)custs.push("(unassigned)");
    const lhEach=Math.max(18,Math.min(26,(h-4)/custs.length-2));
    let ly=by+Math.max(0,(h-custs.length*(lhEach+2))/2);
    for(const c of custs){
      const isUn=c.includes("unassigned");
      drawNode(x3,ly,nw,lhEach,isUn?AMB:MAG,c,null,isH);
      drawBez(x2+nw,by+h/2,x3,ly+lhEach/2,Math.max(1,lhEach*.15),IND,isUn?AMB:MAG,isH);
      ly+=lhEach+2;
    }

    hitboxes.push({id:"db-"+b.bid,x:x2,y:by,w:nw,h,type:"drill-book",data:b});
    by+=h+GAP;
  });
}

// ============== DRAW ==============
function draw(){
  C.clearRect(0,0,W,H);
  if(mode==="overview")drawOverview();
  else if(mode==="vendor")drawVendorView();
  else drawDrill();
}

// ============== HOVER ==============
cv.addEventListener("mousemove",e=>{
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  let found=null;
  for(const n of hitboxes)if(mx>=n.x&&mx<=n.x+n.w&&my>=n.y&&my<=n.y+n.h){found=n;break;}
  if(found!==hov){hov=found;draw();}
  showTT(e);
},{passive:true});
cv.addEventListener("mouseleave",()=>{hov=null;ttEl.classList.remove("show");draw();});

function tr(l,v){return`<div class="r"><span class="l">${l}</span><span class="v">${v}</span></div>`;}

function showTT(e){
  if(!hov){ttEl.classList.remove("show");return;}
  const n=hov;let h="";

  if(n.type==="vendor"){
    const d=n.data;
    h=`<h3>${n.name}</h3><div class="sub">Vendor — Page Source</div>`;
    h+=tr("Total Pages",d.total_pages.toLocaleString());
    h+=tr("Books",d.books.length);
    h+="<hr>";
    for(const b of d.books.slice(0,10))
      h+=`<div class="r"><span class="l" style="color:#818cf8">${b.customer||"(unassigned)"}</span><span class="v">${b.pages}pg · ${b.items} items</span></div>`;
    if(d.books.length>10)h+=`<div class="r"><span class="l">+${d.books.length-10} more…</span></div>`;
  } else if(n.type==="bookgrp"){
    h=`<h3>${n.name}</h3><div class="sub">Customer — Book Group</div>`;
    h+=tr("Books",n.data.count);h+=tr("Total Pages",n.data.pages.toLocaleString());h+=tr("Total Items",n.data.items.toLocaleString());
  } else if(n.type==="library"){
    const d=n.data;
    h=`<h3>${n.name}</h3><div class="sub">Customer Library</div>`;
    h+=tr("CPC Codes",d.cpcs.length?d.cpcs.join(", "):"(none — needs assignment)");
    h+=tr("Books",d.books);h+=tr("Total Pages",d.pages.toLocaleString());
  } else if(n.type==="vendor-row"){
    const d=n.data;
    h=`<h3>${n.name}</h3><div class="sub">Vendor Overview</div>`;
    h+=tr("Total Pages",d.total_pages.toLocaleString());h+=tr("Books",d.books.length);
    h+="<hr>";
    for(const b of d.books.slice(0,12))
      h+=`<div class="r"><span class="l" style="color:#818cf8">${b.name.substring(0,36)}</span><span class="v">${b.pages}pg</span></div>`;
    if(d.books.length>12)h+=`<div class="r"><span class="l">+${d.books.length-12} more…</span></div>`;
  } else if(n.type==="drill-book"){
    const b=n.data;
    h=`<h3>${b.name}</h3><div class="sub">${b.bid} · ${b.status}</div>`;
    h+=tr("Pages",b.pages);h+=tr("Items",b.items);h+=tr("Customer",b.customer);
    if(b.cpcs.length)h+=tr("CPCs",b.cpcs.join(", "));
    else h+=`<div class="r"><span class="l" style="color:#fbbf24">⚠ No CPC — needs library assignment</span></div>`;
  }

  ttEl.innerHTML=h;ttEl.classList.add("show");
  const r=box.getBoundingClientRect();
  let tx=e.clientX-r.left+16,ty=e.clientY-r.top-8;
  if(tx+390>r.width)tx=e.clientX-r.left-395;
  if(ty+ttEl.offsetHeight>r.height)ty=r.height-ttEl.offsetHeight-8;
  if(ty<0)ty=4;
  ttEl.style.left=tx+"px";ttEl.style.top=ty+"px";
}

resize();
</script>
